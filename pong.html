<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Grizzy vs Lemmings - Pong</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #2d1b0e;
        font-family:
          Segoe UI,
          sans-serif;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #wrap {
        position: relative;
        width: min(100vw, calc(100vh * 1.333));
        height: min(100vh, calc(100vw / 1.333));
      }
      canvas {
        width: 100% !important;
        height: 100% !important;
        border: 3px solid #ff9800;
        border-radius: 8px;
        display: block;
      }
      #hud {
        position: absolute;
        top: 6px;
        left: 0;
        width: 100%;
        pointer-events: none;
        display: flex;
        justify-content: space-between;
        padding: 0 12px;
        box-sizing: border-box;
        color: #fff8e1;
      }
      #hud > div {
        background: rgba(45, 27, 14, 0.75);
        padding: 3px 10px;
        border-radius: 6px;
        font-size: clamp(10px, 1.2vw, 16px);
        border: 1px solid rgba(255, 152, 0, 0.25);
      }
      .hl {
        color: #ff9800;
        font-weight: 700;
      }
      #ctl {
        position: absolute;
        bottom: 6px;
        left: 12px;
        pointer-events: none;
        color: rgba(255, 248, 225, 0.3);
        font-size: clamp(8px, 0.85vw, 12px);
      }
      #rst {
        position: absolute;
        bottom: 2px;
        right: 10px;
        pointer-events: all;
        background: #ff9800;
        border: 2px solid #e65100;
        color: #2d1b0e;
        padding: 2px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 700;
        font-size: clamp(9px, 0.9vw, 13px);
        line-height: 1.4;
      }
      #rst:hover {
        background: #ffb74d;
      }
    </style>

    <script src="js/audio.js"></script>
    <script src="js/save.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/grizzy.js"></script>
    <script src="js/back.js"></script>
  </head>
  <body>
    <div id="wrap">
      <canvas id="c" width="800" height="600"></canvas>
      <div id="hud">
        <div>
          <span class="hl">&#x1F43B;</span> <span id="ps">0</span> -
          <span id="as">0</span> &#x1F42D;
        </div>
        <div>&#x1F33F; Nv <span id="lv">1</span>/40 &middot; <span id="tn"></span></div>
      </div>
      <div id="ctl">&uarr;&darr; mover &middot; 5 goles &middot; ENTER continuar</div>
      <button id="rst">&#x1F504;</button>
    </div>
    <script>
      ;(function () {
        const W = 800,
          H = 600,
          PW = 24,
          BS = 14,
          BH = 14,
          SAVE = 'pong_grizzy'
        const c = document.getElementById('c'),
          ctx = c.getContext('2d')
        let actx = null
        function sfx(f, d) {
          try {
            if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)()
            const o = actx.createOscillator(),
              g = actx.createGain()
            o.connect(g)
            g.connect(actx.destination)
            o.frequency.value = f
            o.type = 'triangle'
            g.gain.setValueAtTime(0.07, actx.currentTime)
            g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + (d || 0.12))
            o.start()
            o.stop(actx.currentTime + (d || 0.12))
          } catch (e) {}
        }
        let pfx = []
        function part(x, y, c, n) {
          n = n || 8
          for (let i = 0; i < n; i++) {
            const a = Math.random() * 6.28,
              s = 1 + Math.random() * 4
            pfx.push({
              x,
              y,
              vx: Math.cos(a) * s,
              vy: Math.sin(a) * s - 2,
              life: 25,
              c: c || '#FFC107',
              r: 2 + Math.random() * 3,
            })
          }
        }
        function drP() {
          for (let i = pfx.length - 1; i >= 0; i--) {
            const p = pfx[i]
            p.x += p.vx
            p.y += p.vy
            p.vy += 0.12
            p.life--
            if (p.life <= 0) pfx.splice(i, 1)
            else {
              ctx.save()
              ctx.globalAlpha = p.life / 25
              ctx.fillStyle = p.c
              ctx.beginPath()
              ctx.arc(p.x, p.y, p.r, 0, 6.28)
              ctx.fill()
              ctx.restore()
            }
          }
        }
        function rr(x, y, w, h, r) {
          if (w < 2 * r) r = w / 2
          if (h < 2 * r) r = h / 2
          ctx.beginPath()
          ctx.moveTo(x + r, y)
          ctx.lineTo(x + w - r, y)
          ctx.quadraticCurveTo(x + w, y, x + w, y + r)
          ctx.lineTo(x + w, y + h - r)
          ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
          ctx.lineTo(x + r, y + h)
          ctx.quadraticCurveTo(x, y + h, x, y + h - r)
          ctx.lineTo(x, y + r)
          ctx.quadraticCurveTo(x, y, x + r, y)
          ctx.closePath()
        }
        let bearSm = 0
        function drawGrizzy(x, y, w, h) {
          const cx = x + w / 2
          ctx.fillStyle = '#8B5E3C'
          rr(x, y, w, h, 5)
          ctx.fill()
          ctx.fillStyle = '#A67C52'
          rr(x + 2, y + h * 0.25, w - 4, h * 0.55, 3)
          ctx.fill()
          ctx.fillStyle = '#6B4226'
          const er = Math.min(5, w * 0.22)
          ctx.beginPath()
          ctx.arc(cx - w * 0.22, y + 3, er, 0, 6.28)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(cx + w * 0.22, y + 3, er, 0, 6.28)
          ctx.fill()
          const ey = y + h * 0.32,
            er2 = Math.max(2.5, w * 0.13)
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.arc(cx - w * 0.2, ey, er2, 0, 6.28)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(cx + w * 0.2, ey, er2, 0, 6.28)
          ctx.fill()
          ctx.fillStyle = '#000'
          ctx.beginPath()
          ctx.arc(cx - w * 0.17, ey, er2 * 0.5, 0, 6.28)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(cx + w * 0.23, ey, er2 * 0.5, 0, 6.28)
          ctx.fill()
          ctx.fillStyle = '#3E2723'
          const ny = y + h * 0.5
          ctx.beginPath()
          ctx.ellipse(cx, ny, w * 0.15, h * 0.04, 0, 0, 6.28)
          ctx.fill()
          const sm = bearSm > 0
          ctx.strokeStyle = '#3E2723'
          ctx.lineWidth = 1.5
          ctx.beginPath()
          if (sm) ctx.arc(cx, ny + 4, w * 0.12, 0.15, Math.PI - 0.15)
          else ctx.arc(cx, ny + 2, w * 0.1, 0.2, Math.PI - 0.2)
          ctx.stroke()
          if (sm) {
            ctx.fillStyle = '#fff'
            ctx.fillRect(cx - 2, ny + 5, 1.5, 2)
            ctx.fillRect(cx + 0.5, ny + 5, 1.5, 2)
          }
        }
        function drawLemming(x, y, w, h, count) {
          count = Math.max(1, count || 1)
          const sh = Math.max(14, Math.floor(h / count))
          for (let i = 0; i < count; i++) {
            const ly = y + i * sh
            ctx.fillStyle = '#7E8A9E'
            rr(x + 1, ly + 2, w - 2, sh - 4, 3)
            ctx.fill()
            const cx = x + w / 2
            if (i === 0) {
              ctx.fillStyle = '#000'
              ctx.beginPath()
              ctx.arc(cx - w * 0.18, ly + sh * 0.32, 2, 0, 6.28)
              ctx.fill()
              ctx.beginPath()
              ctx.arc(cx + w * 0.18, ly + sh * 0.32, 2, 0, 6.28)
              ctx.fill()
              ctx.fillStyle = '#FFB74D'
              ctx.beginPath()
              ctx.arc(cx, ly + sh * 0.48, 2.5, 0, 6.28)
              ctx.fill()
              ctx.fillStyle = '#fff'
              const ty = ly + sh * 0.6
              ctx.fillRect(cx - 2.5, ty, 1.8, 2.5)
              ctx.fillRect(cx + 0.7, ty, 1.8, 2.5)
            } else {
              ctx.fillStyle = '#000'
              ctx.beginPath()
              ctx.arc(cx - w * 0.18, ly + sh * 0.35, 1.5, 0, 6.28)
              ctx.fill()
              ctx.beginPath()
              ctx.arc(cx + w * 0.18, ly + sh * 0.35, 1.5, 0, 6.28)
              ctx.fill()
            }
          }
        }
        function drawHoneyPot(x, y, r) {
          ctx.save()
          ctx.shadowColor = '#FFC107'
          ctx.shadowBlur = 10
          const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r)
          g.addColorStop(0, '#FFE082')
          g.addColorStop(0.4, '#FFC107')
          g.addColorStop(1, '#FF8F00')
          ctx.fillStyle = g
          ctx.beginPath()
          ctx.arc(x, y, r, 0, 6.28)
          ctx.fill()
          ctx.shadowBlur = 0
          ctx.fillStyle = 'rgba(255,255,255,0.4)'
          ctx.beginPath()
          ctx.arc(x - r * 0.25, y - r * 0.3, r * 0.28, 0, 6.28)
          ctx.fill()
          ctx.fillStyle = '#FFF8E1'
          rr(x - r * 0.4, y - r * 0.12, r * 0.8, r * 0.2, 2)
          ctx.fill()
          ctx.fillStyle = '#E65100'
          ctx.font = 'bold ' + r * 0.18 + 'px sans-serif'
          ctx.textAlign = 'center'
          ctx.textBaseline = 'middle'
          ctx.fillText('\uD83C\uDF6F', x, y + r * 0.02)
          ctx.restore()
        }
        const TIERS = [
          {
            name: '\uD83D\uDFE2 El Jard\u00EDn',
            range: [1, 10],
            ph: 90,
            aiSpd: 2.5,
            ballSpd: 5,
            lems: 1,
          },
          {
            name: '\uD83D\uDFE1 El Estanque',
            range: [11, 20],
            ph: 70,
            aiSpd: 3.5,
            ballSpd: 6,
            lems: 2,
          },
          {
            name: '\uD83D\uDD34 La Monta\u00F1a',
            range: [21, 30],
            ph: 55,
            aiSpd: 4.5,
            ballSpd: 7,
            lems: 2,
          },
          { name: '\uD83D\uDFE3 La Cima', range: [31, 40], ph: 40, aiSpd: 6, ballSpd: 8, lems: 3 },
        ]
        function getTier(lv) {
          for (const t of TIERS) if (lv >= t.range[0] && lv <= t.range[1]) return t
          return TIERS[3]
        }
        let player,
          ai,
          ball,
          pScore,
          aScore,
          level,
          gameOver,
          win,
          playerVy,
          pauseTimer,
          saveTimer,
          loopId,
          lastTime,
          msgT,
          msgM,
          msgS
        function init() {
          level = Math.min(40, parseInt(localStorage.getItem(SAVE)) || 1)
          pScore = 0
          aScore = 0
          gameOver = false
          win = false
          playerVy = 0
          bearSm = 0
          saveTimer = 0
          msgT = 0
          startLevel()
          lastTime = 0
          if (loopId) cancelAnimationFrame(loopId)
          loopId = requestAnimationFrame(gameLoop)
        }
        function startLevel() {
          const t = getTier(level)
          player = { x: 30, y: Math.floor((600 - t.ph) / 2), w: PW, h: t.ph }
          ai = { x: 800 - PW - 30, y: Math.floor((600 - t.ph) / 2), w: PW, h: t.ph }
          pScore = 0
          aScore = 0
          gameOver = false
          win = false
          playerVy = 0
          bearSm = 0
          pauseTimer = 60
          msgT = 60
          msgM = '\uD83C\uDF3F Nivel ' + level
          msgS = t.name
          resetBall(Math.random() > 0.5 ? 1 : -1)
          updateUI()
        }
        function resetBall(dir) {
          const t = getTier(level)
          const a = (Math.random() - 0.5) * 0.6
          ball = { x: W / 2, y: H / 2, w: BS, h: BH }
          ball.vx = dir * t.ballSpd * Math.cos(a)
          ball.vy = dir * t.ballSpd * Math.sin(a)
          if (Math.abs(ball.vy) < 1) ball.vy = 1.5 * (dir || 1)
        }
        function updateUI() {
          document.getElementById('ps').textContent = pScore
          document.getElementById('as').textContent = aScore
          document.getElementById('lv').textContent = level
          document.getElementById('tn').textContent = getTier(level).name
        }
        function gameLoop(t) {
          if (!lastTime) lastTime = t
          const dt = t - lastTime
          if (dt >= 16) {
            lastTime = t - Math.min(dt - 16, 4)
            if (!gameOver) tick()
            draw()
          }
          loopId = requestAnimationFrame(gameLoop)
        }
        function tick() {
          if (pauseTimer > 0) {
            pauseTimer--
            return
          }
          const t = getTier(level)
          player.y += playerVy
          if (player.y < 0) player.y = 0
          if (player.y > H - player.h) player.y = H - player.h
          const at = ball.y + ball.h / 2,
            ac = ai.y + ai.h / 2
          if (ac < at - 15) ai.y += t.aiSpd
          else if (ac > at + 15) ai.y -= t.aiSpd
          if (ai.y < 0) ai.y = 0
          if (ai.y > H - ai.h) ai.y = H - ai.h
          ball.x += ball.vx
          ball.y += ball.vy
          if (ball.y <= 0) {
            ball.y = 0
            ball.vy = -ball.vy
          }
          if (ball.y >= H - BH) {
            ball.y = H - BH
            ball.vy = -ball.vy
          }
          if (
            ball.vx < 0 &&
            ball.x <= player.x + player.w &&
            ball.x + ball.w > player.x &&
            ball.y + ball.h > player.y &&
            ball.y < player.y + player.h
          ) {
            ball.vx = -ball.vx
            const off = (ball.y + ball.h / 2 - (player.y + player.h / 2)) / (player.h / 2)
            ball.vy += off * 3
            if (Math.abs(ball.vy) < 1) ball.vy = ball.vx > 0 ? 2 : -2
            ball.x = player.x + player.w
            sfx(330, 0.08)
            bearSm = 10
            part(ball.x, ball.y + BH / 2, '#FFC107', 5)
          }
          if (
            ball.vx > 0 &&
            ball.x + ball.w >= ai.x &&
            ball.x + ball.w < ai.x + ai.w + 10 &&
            ball.y + ball.h > ai.y &&
            ball.y < ai.y + ai.h
          ) {
            ball.vx = -ball.vx
            const off = (ball.y + ball.h / 2 - (ai.y + ai.h / 2)) / (ai.h / 2)
            ball.vy += off * 3
            if (Math.abs(ball.vy) < 1) ball.vy = ball.vx > 0 ? 2 : -2
            ball.x = ai.x - ball.w
            sfx(330, 0.08)
          }
          if (ball.x + ball.w < 0) {
            aScore++
            updateUI()
            sfx(150, 0.15)
            part(5, ball.y + BH / 2, '#FF5252', 10)
            if (aScore >= 5) {
              gameOver = true
              msgT = 9999
              msgM = '\uD83D\uDC80 Perdiste Nivel ' + level
              msgS = 'ENTER para reintentar'
              sfx(110, 0.3)
            } else resetBall(-1)
          }
          if (ball.x > W) {
            pScore++
            updateUI()
            sfx(440, 0.08)
            part(W - 5, ball.y + BH / 2, '#FFC107', 10)
            if (pScore >= 5) {
              gameOver = true
              win = true
              const cur = parseInt(localStorage.getItem(SAVE)) || 0
              if (level >= cur) {
                localStorage.setItem(SAVE, level + 1)
                saveTimer = 90
                sfx(880, 0.15)
              }
              sfx(660, 0.15)
              setTimeout(function () {
                sfx(880, 0.15)
              }, 200)
              if (level >= 40) {
                msgT = 9999
                msgM = '\uD83C\uDFC6 \u00A1CAMPE\u00D3N!'
                msgS = 'Completaste todos los niveles'
              } else {
                msgT = 9999
                msgM = '\uD83C\uDF89 Nivel ' + level + ' Completado'
                msgS = 'ENTER para continuar'
              }
            } else resetBall(1)
          }
          if (bearSm > 0) bearSm--
          if (saveTimer > 0) saveTimer--
          if (msgT > 0 && msgT < 9990) msgT--
        }
        function draw() {
          ctx.clearRect(0, 0, W, H)
          const bg = ctx.createLinearGradient(0, 0, 0, H)
          bg.addColorStop(0, '#2D1B0E')
          bg.addColorStop(1, '#1B3A2D')
          ctx.fillStyle = bg
          ctx.fillRect(0, 0, W, H)
          ctx.setLineDash([10, 10])
          ctx.strokeStyle = 'rgba(255,152,0,0.15)'
          ctx.lineWidth = 2
          ctx.beginPath()
          ctx.moveTo(W / 2, 0)
          ctx.lineTo(W / 2, H)
          ctx.stroke()
          ctx.setLineDash([])
          ctx.fillStyle = 'rgba(255,248,225,0.06)'
          ctx.font = 'bold 60px sans-serif'
          ctx.textAlign = 'center'
          ctx.textBaseline = 'middle'
          ctx.fillText(pScore, 180, 50)
          ctx.fillText(aScore, W - 180, 50)
          const t = getTier(level)
          drawGrizzy(player.x, player.y, player.w, player.h)
          drawLemming(ai.x, ai.y, ai.w, ai.h, t.lems)
          drawHoneyPot(ball.x + BS / 2, ball.y + BH / 2, BS / 2 + 2)
          drP()
          if (saveTimer > 0) {
            ctx.save()
            ctx.globalAlpha = Math.min(1, saveTimer / 30)
            ctx.fillStyle = '#6bcb77'
            ctx.font = 'bold 13px sans-serif'
            ctx.textAlign = 'center'
            ctx.fillText('\u2705 Guardado', W / 2, 16)
            ctx.restore()
          }
          if (msgT > 0 && msgM) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)'
            ctx.fillRect(0, 0, W, H)
            ctx.textAlign = 'center'
            ctx.textBaseline = 'middle'
            ctx.fillStyle = '#FFF8E1'
            ctx.font = 'bold 30px sans-serif'
            ctx.fillText(msgM, W / 2, H / 2 - 15)
            if (msgS) {
              ctx.fillStyle = '#FF9800'
              ctx.font = '15px sans-serif'
              ctx.fillText(msgS, W / 2, H / 2 + 25)
            }
          }
        }
        document.addEventListener('keydown', function (e) {
          if (e.key === 'ArrowUp') {
            playerVy = -6
            e.preventDefault()
          } else if (e.key === 'ArrowDown') {
            playerVy = 6
            e.preventDefault()
          } else if (e.key === 'Enter' && gameOver) {
            if (win && level < 40) {
              level++
              startLevel()
            } else if (level >= 40 && win) {
              level = 1
              init()
            } else startLevel()
          }
        })
        document.addEventListener('keyup', function (e) {
          if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
            playerVy = 0
            e.preventDefault()
          }
        })
        document.getElementById('rst').addEventListener('click', init)
        document.addEventListener(
          'click',
          function () {
            if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)()
          },
          { once: true },
        )
        init()
      })()
    </script>
  </body>
</html>
