<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Grizzy Kong</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #2d1b0e;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', 'Comic Sans MS', sans-serif;
        color: #fff8e1;
        flex-direction: column;
      }
      #wrap {
        position: relative;
        width: min(100vw, calc(100vh * 1.4));
        height: min(100vh, calc(100vw / 1.4));
        overflow: hidden;
      }
      canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        border: 2px solid #ff9800;
        border-radius: 8px;
        background: #1b3a2d;
      }
      #hud {
        position: absolute;
        top: 4px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        font-size: clamp(10px, 1.2vmin, 14px);
        z-index: 10;
        pointer-events: none;
        flex-wrap: wrap;
        justify-content: center;
      }
      #hud span {
        background: rgba(45, 27, 14, 0.8);
        padding: 2px 8px;
        border-radius: 6px;
        border: 1px solid rgba(255, 152, 0, 0.3);
        backdrop-filter: blur(4px);
      }
      #t {
        color: #ffc107;
        font-size: clamp(9px, 1vmin, 12px);
        background: rgba(255, 193, 7, 0.12);
        padding: 1px 6px;
        border-radius: 5px;
        display: inline-block;
      }
      #pb {
        position: absolute;
        bottom: clamp(24px, 4vmin, 36px);
        left: 50%;
        transform: translateX(-50%);
        width: 40%;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
        z-index: 10;
      }
      #pb div {
        height: 100%;
        background: linear-gradient(90deg, #4caf50, #ffc107);
        transition: width 0.3s;
        width: 0%;
      }
      #btns {
        position: absolute;
        bottom: 4px;
        right: 8px;
        z-index: 10;
        display: flex;
        gap: 6px;
      }
      .btn {
        padding: 4px 14px;
        font-size: clamp(10px, 1.2vmin, 13px);
        border: none;
        border-radius: 8px;
        background: rgba(139, 94, 60, 0.8);
        color: #fff8e1;
        cursor: pointer;
        font-weight: bold;
        border: 1px solid rgba(255, 152, 0, 0.3);
        backdrop-filter: blur(4px);
        text-decoration: none;
        display: inline-block;
      }
      .btn:hover {
        background: rgba(255, 152, 0, 0.6);
      }
      #controls {
        position: absolute;
        bottom: clamp(30px, 5vmin, 42px);
        left: 50%;
        transform: translateX(-50%);
        font-size: clamp(8px, 0.9vmin, 11px);
        opacity: 0.5;
        z-index: 10;
        pointer-events: none;
        white-space: nowrap;
      }
    </style>
    <script src="js/audio.js"></script>
    <script src="js/save.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/grizzy.js"></script>
    <script src="js/back.js"></script>
  </head>
  <body>
    <div id="wrap">
      <canvas id="game"></canvas>
      <div id="hud">
        <span>🏆 <span id="sc">0</span></span>
        <span>❤️ <span id="lv">3</span></span>
        <span>⬆️ <span id="fl">1</span>/<span id="tf">5</span></span>
        <span>Nv <span id="lvl">1</span>/40</span>
        <span id="t">🟢 El Bosque</span>
      </div>
      <div id="pb"><div id="pr"></div></div>
      <div id="controls">← → Caminar &nbsp; ↑ Saltar</div>
      <div id="btns">
        <button class="btn" id="rb">🔄</button>
        <a href="index.html" class="btn">←</a>
      </div>
    </div>
    <script>
      // sfx from shared module
      let pfx = [],
        flT = 0,
        svT = 0
      function drP(ctx) {
        for (let i = pfx.length - 1; i >= 0; i--) {
          const p = pfx[i]
          p.x += p.vx
          p.y += p.vy
          p.vy += 0.2
          p.life--
          if (p.life <= 0) pfx.splice(i, 1)
          else {
            ctx.save()
            ctx.globalAlpha = p.life / 20
            ctx.fillStyle = p.c
            ctx.beginPath()
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2)
            ctx.fill()
            ctx.restore()
          }
        }
      }
      function part(x, y, c) {
        for (let i = 0; i < 8; i++)
          pfx.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6 - 3,
            life: 20,
            c: c || '#FFC107',
            r: 2 + Math.random() * 4,
          })
      }
      function doF() {
        flT = 10
        sfx(120)
      }
      function svI() {
        svT = 60
        sfx(660)
      }

      const SAVE = 'donkey_grizzy'
      const canvas = document.getElementById('game'),
        ctx = canvas.getContext('2d')
      let player,
        barrels,
        platforms,
        lives,
        score,
        level,
        gameOver,
        win,
        keys,
        loop,
        frame,
        timer,
        currFloor,
        totalFloors
      let W, H, SCALE
      const G = 0.5

      const TIERS = [
        { name: '🟢 El Bosque', range: [1, 10], floors: 5, barrelSpd: 2.5, spawnRate: 55 },
        { name: '🟡 La Cabaña', range: [11, 20], floors: 6, barrelSpd: 3.2, spawnRate: 42 },
        { name: '🔴 La Cueva', range: [21, 30], floors: 7, barrelSpd: 4.2, spawnRate: 30 },
        { name: '🟣 El Árbol Gigante', range: [31, 40], floors: 8, barrelSpd: 5.5, spawnRate: 20 },
      ]

      function getTier(lv) {
        for (const t of TIERS) if (lv >= t.range[0] && lv <= t.range[1]) return t
        return TIERS[3]
      }

      function resize() {
        const wrap = document.getElementById('wrap')
        const r = 1.4
        W = 800
        H = 600
        let w = window.innerWidth,
          h = window.innerHeight
        if (w / h > r) {
          w = h * r
        } else {
          h = w / r
        }
        wrap.style.width = w + 'px'
        wrap.style.height = h + 'px'
        SCALE = w / W
        canvas.width = W
        canvas.height = H
      }
      window.addEventListener('resize', resize)

      function drawGrizzy(x, y, w, h, faceR) {
        const s = w / 30
        // Body
        ctx.fillStyle = '#8B5E3C'
        ctx.beginPath()
        ctx.ellipse(x + w / 2, y + h / 2, w / 2, h / 2.2, 0, 0, Math.PI * 2)
        ctx.fill()
        // Belly lighter
        ctx.fillStyle = '#A67C52'
        ctx.beginPath()
        ctx.ellipse(x + w / 2, y + h / 2 + 2, w / 3, h / 3, 0, 0, Math.PI * 2)
        ctx.fill()
        // Ears
        ctx.fillStyle = '#6B4226'
        ctx.beginPath()
        ctx.arc(x + w * 0.25, y + h * 0.05, w * 0.12, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(x + w * 0.75, y + h * 0.05, w * 0.12, 0, Math.PI * 2)
        ctx.fill()
        // Eyes
        ctx.fillStyle = '#fff'
        ctx.fillRect(x + w * 0.25 - s * 2, y + h * 0.25, w * 0.13, w * 0.13)
        ctx.fillRect(x + w * 0.6 - s * 2, y + h * 0.25, w * 0.13, w * 0.13)
        ctx.fillStyle = '#222'
        ctx.beginPath()
        ctx.arc(x + w * (faceR ? 0.32 : 0.28), y + h * 0.32, w * 0.035, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(x + w * (faceR ? 0.67 : 0.63), y + h * 0.32, w * 0.035, 0, Math.PI * 2)
        ctx.fill()
        // Nose
        ctx.fillStyle = '#3E2723'
        ctx.beginPath()
        ctx.ellipse(x + w / 2, y + h * 0.45, w * 0.08, w * 0.05, 0, 0, Math.PI * 2)
        ctx.fill()
        // Mouth
        ctx.strokeStyle = '#3E2723'
        ctx.lineWidth = 1.5
        ctx.beginPath()
        ctx.arc(x + w / 2, y + h * 0.52, w * 0.06, 0.1, Math.PI - 0.1)
        ctx.stroke()
        // Hat (adventurer)
        ctx.fillStyle = '#4CAF50'
        ctx.beginPath()
        ctx.ellipse(x + w / 2, y + h * 0.05, w * 0.35, w * 0.08, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillRect(x + w * 0.25, y - h * 0.05, w * 0.5, h * 0.1)
      }

      function drawLemming(x, y, w, h, dir) {
        // Body
        ctx.fillStyle = '#7E8A9E'
        ctx.beginPath()
        ctx.ellipse(x + w / 2, y + h / 2, w / 2.2, h / 2.2, 0, 0, Math.PI * 2)
        ctx.fill()
        // Belly
        ctx.fillStyle = '#B0BEC5'
        ctx.beginPath()
        ctx.ellipse(x + w / 2, y + h / 2 + 1, w / 3.5, h / 3.5, 0, 0, Math.PI * 2)
        ctx.fill()
        // Ears
        ctx.fillStyle = '#90A4AE'
        ctx.beginPath()
        ctx.arc(x + w * 0.2, y + h * 0.1, w * 0.1, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(x + w * 0.8, y + h * 0.1, w * 0.1, 0, Math.PI * 2)
        ctx.fill()
        // Eyes
        ctx.fillStyle = '#222'
        ctx.beginPath()
        ctx.arc(x + w * 0.3, y + h * 0.35, w * 0.04, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(x + w * 0.7, y + h * 0.35, w * 0.04, 0, Math.PI * 2)
        ctx.fill()
        // Eye shine
        ctx.fillStyle = '#fff'
        ctx.beginPath()
        ctx.arc(x + w * (dir > 0 ? 0.32 : 0.28), y + h * 0.33, w * 0.015, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(x + w * (dir > 0 ? 0.72 : 0.68), y + h * 0.33, w * 0.015, 0, Math.PI * 2)
        ctx.fill()
        // Nose
        ctx.fillStyle = '#FFB74D'
        ctx.beginPath()
        ctx.arc(x + w / 2, y + h * 0.48, w * 0.04, 0, Math.PI * 2)
        ctx.fill()
        // Buck teeth
        ctx.fillStyle = '#fff'
        ctx.fillRect(x + w * 0.42, y + h * 0.52, w * 0.06, h * 0.08)
        ctx.fillRect(x + w * 0.52, y + h * 0.52, w * 0.06, h * 0.08)
      }

      function buildStaircase(n) {
        const p = []
        const ground = { x: 0, y: H - 24, w: W, h: 24 }
        p.push(ground)
        const stepW = 110,
          stepShift = 50,
          stepH = 50
        for (let i = 0; i < n; i++) {
          const x = 25 + i * stepShift
          const y = H - 80 - i * stepH
          if (y < 20 || x + stepW > W - 5) break
          p.push({ x, y, w: stepW, h: 12, label: 'Piso ' + (i + 1) })
        }
        return p
      }

      function init() {
        resize()
        level = Math.min(40, parseInt(localStorage.getItem(SAVE)) || 1)
        score = 0
        lives = 3
        startLevel()
        if (loop) clearInterval(loop)
        loop = setInterval(tick, 1000 / 60)
      }

      function startLevel() {
        const t = getTier(level)
        totalFloors = t.floors
        platforms = buildStaircase(t.floors)
        player = { x: 30, y: H - 80, w: 28, h: 34, vy: 0, jump: false }
        barrels = []
        gameOver = false
        win = false
        keys = {}
        frame = 0
        timer = 0
        currFloor = 0
        updateUI()
      }

      function updateUI() {
        document.getElementById('sc').textContent = score
        document.getElementById('lv').textContent = lives
        document.getElementById('lvl').textContent = level
        document.getElementById('fl').textContent = currFloor
        document.getElementById('tf').textContent = totalFloors
        document.getElementById('t').textContent = getTier(level).name
        document.getElementById('pr').style.width =
          Math.min(100, (currFloor / totalFloors) * 100) + '%'
      }

      function update() {
        if (gameOver) return
        if (win) {
          draw()
          return
        }
        if (keys['ArrowLeft']) {
          player.x -= 3.2
        }
        if (keys['ArrowRight']) {
          player.x += 3.2
        }
        if ((keys['ArrowUp'] || keys[' ']) && !player.jump) {
          player.vy = -8.5
          player.jump = true
        }
        player.vy += G
        player.y += player.vy
        player.jump = true
        currFloor = 0
        for (const p of platforms) {
          if (
            player.x + player.w > p.x &&
            player.x < p.x + p.w &&
            player.y + player.h > p.y &&
            player.y + player.h <= p.y + p.h + player.vy + 4 &&
            player.vy >= 0
          ) {
            player.y = p.y - player.h
            player.vy = 0
            player.jump = false
          }
          if (
            player.y + player.h >= p.y &&
            player.y + player.h <= p.y + 20 &&
            player.x + player.w > p.x &&
            player.x < p.x + p.w
          ) {
            if (p.label) currFloor = parseInt(p.label.split(' ')[1])
          }
        }
        if (player.x < 0) player.x = 0
        if (player.x > W - player.w) player.x = W - player.w
        if (player.y > H + 15) {
          hit()
          return
        }
        const topP = platforms[platforms.length - 1]
        if (
          topP &&
          player.y + player.h <= topP.y + 30 &&
          player.x + player.w > topP.x &&
          player.x < topP.x + topP.w &&
          player.y + player.h < topP.y + 5
        ) {
          win = true
          score += 100 * level
          if (level < 40 && level >= (parseInt(localStorage.getItem(SAVE)) || 0)) {
            localStorage.setItem(SAVE, level + 1)
            svI()
          }
          sfx(660)
          setTimeout(() => sfx(880), 150)
          setTimeout(() => sfx(1100), 300)
          updateUI()
          draw()
          return
        }
        frame++
        timer++
        const t = getTier(level)
        if (timer >= t.spawnRate) {
          const upper = platforms.filter((p) => p.label && p.y < H - 100)
          if (upper.length > 0) {
            const p = upper[Math.floor(Math.random() * upper.length)]
            const dir = Math.random() > 0.5 ? 1 : -1
            const bx = dir > 0 ? p.x - 10 : p.x + p.w + 5
            barrels.push({
              x: bx,
              y: p.y - 12,
              w: 18,
              h: 18,
              vx: dir * t.barrelSpd,
              vy: 0,
              from: p.label,
            })
            if (level > 15 && Math.random() < 0.3) {
              const p2 = upper[Math.floor(Math.random() * upper.length)]
              const d2 = Math.random() > 0.5 ? 1 : -1
              barrels.push({
                x: d2 > 0 ? p2.x - 10 : p2.x + p2.w + 5,
                y: p2.y - 12,
                w: 18,
                h: 18,
                vx: d2 * t.barrelSpd,
                vy: 0,
                from: p2.label,
              })
            }
          }
          timer = 0
        }
        for (let i = barrels.length - 1; i >= 0; i--) {
          const b = barrels[i]
          b.vy += G * 0.55
          b.x += b.vx
          b.y += b.vy
          for (const p of platforms) {
            if (
              b.x + b.w > p.x &&
              b.x < p.x + p.w &&
              b.y + b.h > p.y &&
              b.y + b.h <= p.y + p.h + b.vy + 5 &&
              b.vy >= 0
            ) {
              b.y = p.y - b.h
              b.vy = 0
            }
          }
          if (b.x < 3) {
            b.vx = -b.vx
            b.x = 4
          }
          if (b.x + b.w > W - 3) {
            b.vx = -b.vx
            b.x = W - b.w - 4
          }
          if (
            player.x < b.x + b.w &&
            player.x + player.w > b.x &&
            player.y < b.y + b.h &&
            player.y + player.h > b.y
          ) {
            hit()
            barrels.splice(i, 1)
            continue
          }
          if (b.x < -80 || b.x > W + 80 || b.y > H + 20) barrels.splice(i, 1)
        }
        updateUI()
      }

      function hit() {
        lives--
        doF()
        updateUI()
        sfx(200)
        if (lives <= 0) {
          gameOver = true
          sfx(110)
          draw()
          return
        }
        player.x = 30
        player.y = H - 80
        player.vy = 0
        barrels = []
      }

      function advance() {
        if (level < 40) {
          level++
          clearInterval(loop)
          loop = setInterval(tick, 1000 / 60)
          startLevel()
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H)
        // Sky gradient
        const sky = ctx.createLinearGradient(0, 0, 0, H)
        sky.addColorStop(0, '#1B3A2D')
        sky.addColorStop(0.3, '#2D5016')
        sky.addColorStop(0.6, '#4A2F1A')
        sky.addColorStop(1, '#2D1B0E')
        ctx.fillStyle = sky
        ctx.fillRect(0, 0, W, H)
        // Background trees
        ctx.fillStyle = 'rgba(76,175,80,0.06)'
        for (let i = 0; i < 15; i++) {
          const tw = 20 + Math.sin(i * 2) * 10,
            th = 80 + Math.sin(i * 3) * 30
          ctx.beginPath()
          ctx.ellipse(i * 60 - 10, H - 24 - th, tw / 2, th / 2, 0, 0, Math.PI * 2)
          ctx.fill()
        }
        // Platforms
        for (const p of platforms) {
          if (p.label) {
            ctx.fillStyle = '#5D4037'
            ctx.fillRect(p.x, p.y, p.w, p.h)
            ctx.fillStyle = '#795548'
            ctx.fillRect(p.x, p.y, p.w, 3)
            ctx.fillStyle = 'rgba(139,94,60,0.4)'
            for (let rx = p.x + 12; rx < p.x + p.w - 12; rx += 22) ctx.fillRect(rx, p.y - 1, 4, 3)
            ctx.fillStyle = 'rgba(255,255,255,0.05)'
            for (let lx = p.x + 18; lx < p.x + p.w - 18; lx += 14) ctx.fillRect(lx, p.y - 18, 3, 18)
          } else {
            ctx.fillStyle = '#3E2723'
            ctx.fillRect(p.x, p.y, p.w, p.h)
            ctx.fillStyle = '#5D4037'
            ctx.fillRect(p.x, p.y, p.w, 3)
          }
        }
        // Grizzy boss at top right (throws lemmings)
        const bossX = W - 75,
          bossY = 10
        ctx.fillStyle = '#6B4226'
        ctx.beginPath()
        ctx.ellipse(bossX + 30, bossY + 25, 30, 25, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#8B5E3C'
        ctx.beginPath()
        ctx.ellipse(bossX + 30, bossY + 28, 22, 20, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#A67C52'
        ctx.beginPath()
        ctx.ellipse(bossX + 30, bossY + 30, 14, 12, 0, 0, Math.PI * 2)
        ctx.fill()
        // Eyes red angry
        ctx.fillStyle = '#fff'
        ctx.beginPath()
        ctx.arc(bossX + 22, bossY + 18, 5, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(bossX + 38, bossY + 18, 5, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#E53935'
        ctx.beginPath()
        ctx.arc(bossX + 23, bossY + 19, 2.5, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(bossX + 39, bossY + 19, 2.5, 0, Math.PI * 2)
        ctx.fill()
        // Angry eyebrows
        ctx.strokeStyle = '#3E2723'
        ctx.lineWidth = 3
        ctx.beginPath()
        ctx.moveTo(bossX + 17, bossY + 12)
        ctx.lineTo(bossX + 26, bossY + 15)
        ctx.stroke()
        ctx.beginPath()
        ctx.moveTo(bossX + 43, bossY + 12)
        ctx.lineTo(bossX + 34, bossY + 15)
        ctx.stroke()
        // Snout
        ctx.fillStyle = '#FFB74D'
        ctx.beginPath()
        ctx.ellipse(bossX + 30, bossY + 30, 8, 5, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#3E2723'
        ctx.beginPath()
        ctx.arc(bossX + 30, bossY + 30, 3, 0, Math.PI * 2)
        ctx.fill()
        // Hat
        ctx.fillStyle = '#E53935'
        ctx.fillRect(bossX + 15, bossY - 5, 30, 8)
        ctx.fillRect(bossX + 10, bossY + 3, 40, 4)

        // Goal flag
        const topP = platforms[platforms.length - 1]
        if (topP) {
          ctx.fillStyle = '#4CAF50'
          ctx.fillRect(topP.x + topP.w / 2 - 2, topP.y - 35, 4, 35)
          ctx.fillStyle = '#FFC107'
          ctx.beginPath()
          ctx.moveTo(topP.x + topP.w / 2 + 2, topP.y - 35)
          ctx.lineTo(topP.x + topP.w / 2 + 28, topP.y - 25)
          ctx.lineTo(topP.x + topP.w / 2 + 2, topP.y - 15)
          ctx.fill()
          ctx.fillStyle = '#8B5E3C'
          ctx.font = 'bold 10px sans-serif'
          ctx.textAlign = 'center'
          ctx.fillText('🏁', topP.x + topP.w / 2 + 14, topP.y - 22)
        }

        // Barrels as lemmings
        for (const b of barrels) {
          drawLemming(b.x, b.y, b.w, b.h, b.vx > 0 ? 1 : -1)
          // Rolling motion lines
          ctx.strokeStyle = 'rgba(255,255,255,0.2)'
          ctx.lineWidth = 1
          for (let r = -1; r <= 1; r += 2) {
            ctx.beginPath()
            ctx.arc(b.x + b.w / 2, b.y + b.h / 2, b.w / 2 - 3, r * 0.5, timer * 0.1 + r * 1.5)
            ctx.stroke()
          }
        }

        // Player as Grizzy
        const faceR = keys['ArrowRight'] || (!keys['ArrowLeft'] && true)
        drawGrizzy(player.x, player.y, player.w, player.h, faceR)

        // Floor labels
        for (const p of platforms) {
          if (p.label) {
            ctx.fillStyle = 'rgba(255,248,225,0.2)'
            ctx.font = '8px sans-serif'
            ctx.textAlign = 'left'
            ctx.fillText(p.label.split(' ')[1], p.x + 6, p.y - 6)
          }
        }

        if (win) {
          ctx.fillStyle = 'rgba(0,0,0,0.6)'
          ctx.fillRect(0, 0, W, H)
          ctx.textAlign = 'center'
          if (level >= 40) {
            ctx.fillStyle = '#FFC107'
            ctx.font = 'bold 30px sans-serif'
            ctx.fillText('🎉 ¡GRIZZY GANÓ!', W / 2, 180)
            ctx.fillStyle = '#FFF8E1'
            ctx.font = '16px sans-serif'
            ctx.fillText('Todos los niveles completados', W / 2, 220)
          } else {
            ctx.fillStyle = '#4CAF50'
            ctx.font = 'bold 26px sans-serif'
            ctx.fillText('🎉 NIVEL ' + level + ' COMPLETO', W / 2, 170)
            ctx.fillStyle = '#FFC107'
            ctx.font = '14px sans-serif'
            ctx.fillText('ENTER para continuar', W / 2, 210)
          }
        }
        drP(ctx)
        if (flT > 0) {
          flT--
          ctx.fillStyle = 'rgba(229,57,53,' + flT / 20 + ')'
          ctx.fillRect(0, 0, W, H)
        }
        if (svT > 0) {
          svT--
          ctx.fillStyle = '#4CAF50'
          ctx.font = 'bold 14px sans-serif'
          ctx.textAlign = 'center'
          ctx.fillText('✅ Guardado', W / 2, 20)
        }
        if (gameOver) {
          ctx.fillStyle = 'rgba(0,0,0,0.75)'
          ctx.fillRect(0, 0, W, H)
          ctx.textAlign = 'center'
          ctx.fillStyle = '#E53935'
          ctx.font = 'bold 34px sans-serif'
          ctx.fillText('GAME OVER', W / 2, 180)
          ctx.fillStyle = '#FFC107'
          ctx.font = '15px sans-serif'
          ctx.fillText('Nivel ' + level + ' - ' + score + 'pts', W / 2, 220)
          ctx.fillStyle = '#FFF8E1'
          ctx.font = '13px sans-serif'
          ctx.fillText('ENTER para reintentar', W / 2, 250)
        }
      }

      document.addEventListener('keydown', (e) => {
        keys[e.key] = true
        if (e.key === 'ArrowUp' || e.key === ' ') e.preventDefault()
        if (win && e.key === 'Enter') advance()
        if (gameOver && e.key === 'Enter') {
          clearInterval(loop)
          init()
        }
      })
      document.addEventListener('keyup', (e) => {
        keys[e.key] = false
      })
      document.getElementById('rb').addEventListener('click', () => {
        clearInterval(loop)
        init()
      })
      window.addEventListener('resize', resize)
      function tick() {
        update()
        draw()
      }
      init()
    </script>
  </body>
</html>
