<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Come Cocos - Grizzy</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #wrap {
        width: 100vw; height: 100vh;
        display: flex; align-items: center; justify-content: center;
        background: #111;
      }
      canvas { display: block; }
      #ui {
        position: absolute; top: 10px; right: 10px;
        display: flex; gap: 8px; z-index: 10;
      }
      #ui a, #ui button {
        color: #fff; background: rgba(0,0,0,0.5);
        border: 1px solid #555; border-radius: 6px;
        padding: 5px 10px; font: bold 14px sans-serif;
        cursor: pointer; text-decoration: none;
      }
      #ui a:hover, #ui button:hover { background: rgba(0,0,0,0.8); }
      #overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.75); z-index: 20; cursor: pointer;
      }
      #overlay h1 { color: #ffc107; font: bold 48px sans-serif; }
      #overlay p { color: #eee; font: 18px sans-serif; margin-top: 14px; }
      .blink { animation: pulse 1s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="c"></canvas>
      <div id="ui">
        <button id="restartBtn">Reiniciar</button>
        <a href="index.html">Salir</a>
      </div>
      <div id="overlay">
        <h1>COME COCOS</h1>
        <p class="blink">Presiona ENTER para empezar</p>
        <p style="color:#999;font-size:14px">Flechas / WASD</p>
      </div>
    </div>
    <script>
    ;(function(){
      const canvas = document.getElementById('c')
      const ctx = canvas.getContext('2d')

      const CELL = 24
      const COLS = 30
      const ROWS = 33
      const W = 1, E = 0
      const DIRS = [[0,-1],[0,1],[-1,0],[1,0]]

      const MAP = [
        '111111111111111111111111111111',
        '100000000000001100000000000001',
        '101101110111010010111011101101',
        '100001000100010010001001000001',
        '101101010101010010101010101101',
        '100000010001000000010001000001',
        '101101110101011111010101110101',
        '100001000100000000001001000001',
        '101101011101110111011010101101',
        '100000000000000000000000000001',
        '101101110111011111011101110101',
        '100001000100010001000100010001',
        '101101010101010101010101010101',
        '100000010001000000010001000001',
        '111101011101011111010111010111',
        '000000000000010001000000000000',
        '111101011101010000010111010111',
        '100000010001000000010001000001',
        '101101010101011111010101010101',
        '100001000100010001000100010001',
        '101101110111010010111011101101',
        '100000000000000000000000000001',
        '101101110111011111011101110101',
        '100001000100010001000100010001',
        '101101010101010101010101010101',
        '100000010001000000010001000001',
        '111101011101011111010111010111',
        '000000000000010001000000000000',
        '111101011101010000010111010111',
        '100000010001000000010001000001',
        '101101010101011111010101010101',
        '100001000100010001000100010001',
        '111111111111111111111111111111',
      ]

      let map = []
      let pellets = []
      let pelletCount = 0
      let player = {}
      let enemies = []
      let score = 0
      let lives = 3
      let level = 1
      let state = 'start'
      let lastTime = 0
      let cellSize = 1
      let offsetX = 0, offsetY = 0
      let scaredTimer = 0
      let SCARED_DURATION = 5

      function buildMap() {
        map = []
        for (let r = 0; r < ROWS; r++) {
          map[r] = []
          for (let c = 0; c < COLS; c++) {
            map[r][c] = MAP[r][c] === '1' ? W : E
          }
        }
      }

      function initPellets() {
        pellets = []
        pelletCount = 0
        for (let r = 0; r < ROWS; r++) {
          pellets[r] = []
          for (let c = 0; c < COLS; c++) {
            if (map[r][c] === E && !(c === 1 && r === 1)) {
              pellets[r][c] = 1
              pelletCount++
            } else {
              pellets[r][c] = 0
            }
          }
        }
        const powerCount = Math.max(4 - Math.floor((level - 1) / 10), 1)
        const corners = [[1,1],[1,COLS-2],[ROWS-2,1],[ROWS-2,COLS-2]]
        for (let i = 0; i < powerCount; i++) {
          const [pr, pc] = corners[i]
          if (pellets[pr] && pellets[pr][pc]) {
            pellets[pr][pc] = 2
          }
        }
      }

      function isWall(c, r) {
        if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return true
        return map[r][c] === W
      }

      function enemyCount() {
        return Math.min(4 + Math.floor(level / 3), 8)
      }

      function enemySpeed() {
        return Math.min(2.5 + level * 0.15, 5)
      }

      function initPlayer() {
        player = {
          col: 1, row: 1,
          dir: -1,
          nextDir: -1,
          speed: 3,
          moving: false,
          progress: 0,
          fromX: 1, fromY: 1,
          toX: 1, toY: 1,
          alive: true,
        }
      }

      function spawnEnemy() {
        let c, r, attempts = 0
        do {
          c = Math.floor(Math.random() * COLS)
          r = Math.floor(Math.random() * ROWS)
          attempts++
        } while ((isWall(c, r) || (c === player.col && r === player.row)) && attempts < 100)
        enemies.push({
          col: c, row: r,
          dir: Math.floor(Math.random() * 4),
          speed: enemySpeed(),
          moving: false,
          progress: 0,
          fromX: c, fromY: r,
          toX: c, toY: r,
          scared: false,
          respawnTimer: 0,
        })
      }

      function initEnemies() {
        enemies = []
        for (let i = 0; i < enemyCount(); i++) spawnEnemy()
      }

      function bfs(sr, sc, tr, tc) {
        if (sr === tr && sc === tc) return -1
        const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false))
        const parent = Array.from({ length: ROWS }, () => Array(COLS).fill(null))
        const queue = [[sr, sc]]
        visited[sr][sc] = true
        while (queue.length > 0) {
          const [r, c] = queue.shift()
          for (let i = 0; i < 4; i++) {
            const nr = r + DIRS[i][1]
            const nc = c + DIRS[i][0]
            if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue
            if (visited[nr][nc] || isWall(nc, nr)) continue
            visited[nr][nc] = true
            parent[nr][nc] = [r, c, i]
            if (nr === tr && nc === tc) {
              let cr = tr, cc = tc
              while (parent[cr][cc][0] !== sr || parent[cr][cc][1] !== sc) {
                const p = parent[cr][cc]
                cr = p[0]
                cc = p[1]
              }
              return parent[cr][cc][2]
            }
            queue.push([nr, nc])
          }
        }
        return -1
      }

      function getBestDir(e) {
        if (e.scared) {
          const validDirs = []
          for (let i = 0; i < 4; i++) {
            const d = DIRS[i]
            const nc = e.col + d[0]
            const nr = e.row + d[1]
            if (!isWall(nc, nr)) validDirs.push(i)
          }
          return validDirs.length > 0 ? validDirs[Math.floor(Math.random() * validDirs.length)] : -1
        }
        return bfs(e.row, e.col, player.row, player.col)
      }

      function moveEntity(e, dt, isPlayer) {
        if (e.moving) {
          e.progress += e.speed * dt
          if (e.progress >= 1) {
            e.col = e.toX
            e.row = e.toY
            e.fromX = e.toX
            e.fromY = e.toY
            e.progress = 0
            e.moving = false
          }
        }
        if (!e.moving) {
          let targetDir = isPlayer ? e.nextDir : getBestDir(e)
          if (targetDir >= 0 && targetDir <= 3) {
            const d = DIRS[targetDir]
            const nc = e.col + d[0]
            const nr = e.row + d[1]
            if (!isWall(nc, nr)) {
              e.dir = targetDir
              e.moving = true
              e.fromX = e.col
              e.fromY = e.row
              e.toX = nc
              e.toY = nr
              e.progress = 0
              if (isPlayer) e.nextDir = -1
            }
          }
          if (!e.moving && e.dir >= 0 && e.dir <= 3) {
            const d = DIRS[e.dir]
            const nc = e.col + d[0]
            const nr = e.row + d[1]
            if (!isWall(nc, nr)) {
              e.moving = true
              e.fromX = e.col
              e.fromY = e.row
              e.toX = nc
              e.toY = nr
              e.progress = 0
            } else if (!isPlayer) {
              e.dir = getBestDir(e)
            }
          }
        }
      }

      function checkCollision() {
        if (pellets[player.row] && pellets[player.row][player.col] === 1) {
          pellets[player.row][player.col] = 0
          pelletCount--
          score += 10
          if (pelletCount === 0) {
            if (level >= 40) {
              state = 'win'
            } else {
              level++
              initPellets()
              initEnemies()
              scaredTimer = 0
            }
            return
          }
        } else if (pellets[player.row] && pellets[player.row][player.col] === 2) {
          pellets[player.row][player.col] = 0
          pelletCount--
          score += 50
          scaredTimer = SCARED_DURATION
          for (const e of enemies) {
            e.scared = true
            e.respawnTimer = 0
          }
        }
        for (const e of enemies) {
          if (e.col === player.col && e.row === player.row) {
            if (e.scared) {
              score += 200
              e.scared = false
              e.respawnTimer = 3
              e.col = Math.floor(COLS / 2)
              e.row = Math.floor(ROWS / 2)
              e.moving = false
            } else {
              lives--
              if (lives <= 0) {
                state = 'gameover'
              } else {
                initPlayer()
                initEnemies()
                scaredTimer = 0
              }
              return
            }
          }
        }
      }

      function update() {
        if (state !== 'playing') return
        if (player.alive) {
          moveEntity(player, 0.016, true)
        }
        for (const e of enemies) {
          if (e.respawnTimer > 0) {
            e.respawnTimer -= 0.016
            if (e.respawnTimer <= 0) {
              e.col = Math.floor(COLS / 2)
              e.row = Math.floor(ROWS / 2)
              e.moving = false
            }
          } else {
            moveEntity(e, 0.016, false)
          }
        }
        if (scaredTimer > 0) {
          scaredTimer -= 0.016
          if (scaredTimer <= 0) {
            for (const e of enemies) e.scared = false
          }
        }
        checkCollision()
      }

      function drawMaze() {
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const x = offsetX + c * cellSize
            const y = offsetY + r * cellSize
            if (map[r][c] === W) {
              ctx.fillStyle = '#333'
              ctx.fillRect(x, y, cellSize, cellSize)
              ctx.strokeStyle = '#555'
              ctx.lineWidth = 0.5
              ctx.strokeRect(x, y, cellSize, cellSize)
            } else {
              ctx.fillStyle = '#000'
              ctx.fillRect(x, y, cellSize, cellSize)
              if (pellets[r] && pellets[r][c] === 1) {
                ctx.fillStyle = '#FFD54F'
                ctx.beginPath()
                ctx.arc(x + cellSize / 2, y + cellSize / 2, cellSize * 0.1, 0, Math.PI * 2)
                ctx.fill()
              } else if (pellets[r] && pellets[r][c] === 2) {
                const pulse = Math.sin(Date.now() * 0.005) * 0.1 + 0.3
                ctx.fillStyle = '#FFD54F'
                ctx.beginPath()
                ctx.arc(x + cellSize / 2, y + cellSize / 2, cellSize * pulse, 0, Math.PI * 2)
                ctx.fill()
              }
            }
          }
        }
      }

      function drawEntity(col, row, moving, progress, fromX, fromY, toX, toY, color, size) {
        let px, py
        if (moving) {
          px = fromX + (toX - fromX) * progress
          py = fromY + (toY - fromY) * progress
        } else {
          px = col
          py = row
        }
        const cx = offsetX + px * cellSize + cellSize / 2
        const cy = offsetY + py * cellSize + cellSize / 2
        const r = cellSize * size
        ctx.fillStyle = color
        ctx.beginPath()
        ctx.arc(cx, cy, r, 0, Math.PI * 2)
        ctx.fill()
        return { cx, cy }
      }

      function drawPlayer() {
        if (!player.alive) return
        const pos = drawEntity(
          player.col, player.row, player.moving, player.progress,
          player.fromX, player.fromY, player.toX, player.toY,
          '#FFD54F', 0.42
        )
        let mouthAngle = 0
        if (player.moving) mouthAngle = Math.abs(Math.sin(Date.now() * 0.01)) * 0.8
        let angle = 0
        if (player.dir >= 0 && player.dir <= 3) {
          const d = DIRS[player.dir]
          angle = Math.atan2(d[1], d[0])
        }
        ctx.fillStyle = '#000'
        ctx.beginPath()
        ctx.moveTo(pos.cx, pos.cy)
        ctx.arc(pos.cx, pos.cy, cellSize * 0.42, angle - mouthAngle, angle + mouthAngle)
        ctx.closePath()
        ctx.fill()
        const perpX = -Math.sin(angle) * cellSize * 0.1
        const perpY = Math.cos(angle) * cellSize * 0.1
        const fwdX = Math.cos(angle) * cellSize * 0.04
        const fwdY = Math.sin(angle) * cellSize * 0.04
        ctx.fillStyle = '#000'
        ctx.beginPath()
        ctx.arc(pos.cx + perpX + fwdX, pos.cy + perpY + fwdY, cellSize * 0.04, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(pos.cx - perpX + fwdX, pos.cy - perpY + fwdY, cellSize * 0.04, 0, Math.PI * 2)
        ctx.fill()
      }

      function drawEnemies() {
        for (const e of enemies) {
          let color = '#E53935'
          if (e.scared) {
            if (scaredTimer < 2 && Math.floor(Date.now() / 200) % 2 === 0) {
              color = '#FFF'
            } else {
              color = '#2196F3'
            }
          }
          drawEntity(e.col, e.row, e.moving, e.progress, e.fromX, e.fromY, e.toX, e.toY, color, 0.38)
        }
      }

      function drawHUD() {
        ctx.fillStyle = '#fff'
        ctx.font = 'bold ' + Math.max(14, cellSize * 0.7) + 'px monospace'
        ctx.textAlign = 'left'
        ctx.textBaseline = 'top'
        ctx.fillText('NIVEL: ' + level, 10, 10)
        ctx.fillText('PTS: ' + score, 10, 10 + cellSize * 0.9)
        ctx.textAlign = 'right'
        let h = ''
        for (let i = 0; i < lives; i++) h += '● '
        ctx.fillText(h, canvas.width - 10, 10)
      }

      function drawOverlay(title, sub) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'
        ctx.fillRect(0, 0, canvas.width, canvas.height)
        ctx.fillStyle = '#ffc107'
        ctx.font = 'bold ' + Math.max(28, cellSize * 1.5) + 'px sans-serif'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20)
        if (sub) {
          ctx.fillStyle = '#aaa'
          ctx.font = Math.max(14, cellSize * 0.7) + 'px sans-serif'
          ctx.fillText(sub, canvas.width / 2, canvas.height / 2 + 20)
        }
      }

      function render() {
        ctx.fillStyle = '#000'
        ctx.fillRect(0, 0, canvas.width, canvas.height)
        drawMaze()
        drawEnemies()
        drawPlayer()
        drawHUD()
        if (state === 'start') drawOverlay('COME COCOS', 'Presiona ENTER')
        else if (state === 'gameover') drawOverlay('GAME OVER', 'Puntos: ' + score + '  ENTER para reiniciar')
        else if (state === 'win') drawOverlay('¡GANASTE!', 'Nivel 40 completado · Puntos: ' + score)
      }

      function loop(time) {
        update()
        render()
        requestAnimationFrame(loop)
      }

      function startGame() {
        buildMap()
        initPlayer()
        initEnemies()
        initPellets()
        score = 0
        lives = 3
        level = 1
        scaredTimer = 0
        state = 'playing'
        document.getElementById('overlay').style.display = 'none'
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          if (state === 'start' || state === 'gameover' || state === 'win') startGame()
          return
        }
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') player.nextDir = 0
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') player.nextDir = 1
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') player.nextDir = 2
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') player.nextDir = 3
      })

      document.getElementById('restartBtn').addEventListener('click', startGame)
      document.getElementById('overlay').addEventListener('click', () => {
        if (state === 'start' || state === 'gameover' || state === 'win') startGame()
      })

      function resize() {
        const w = window.innerWidth
        const h = window.innerHeight
        const aspect = COLS / ROWS
        let cw, ch
        if (w / h > aspect) { ch = h * 0.9; cw = ch * aspect }
        else { cw = w * 0.95; ch = cw / aspect }
        canvas.width = Math.floor(cw)
        canvas.height = Math.floor(ch)
        cellSize = canvas.width / COLS
      }
      window.addEventListener('resize', resize)
      resize()
      buildMap()
      initPlayer()
      initEnemies()
      requestAnimationFrame(loop)
    })()
    </script>
  </body>
</html>
