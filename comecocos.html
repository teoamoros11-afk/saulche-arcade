<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Come Cocos - Grizzy</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #wrap {
        width: 100vw; height: 100vh;
        display: flex; align-items: center; justify-content: center;
        background: #111;
      }
      canvas { display: block; }
      #ui {
        position: absolute; top: 10px; right: 10px;
        display: flex; gap: 8px; z-index: 10;
      }
      #ui a, #ui button {
        color: #fff; background: rgba(0,0,0,0.5);
        border: 1px solid #555; border-radius: 6px;
        padding: 5px 10px; font: bold 14px sans-serif;
        cursor: pointer; text-decoration: none;
      }
      #ui a:hover, #ui button:hover { background: rgba(0,0,0,0.8); }
      #overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.75); z-index: 20; cursor: pointer;
      }
      #overlay h1 { color: #ffc107; font: bold 48px sans-serif; }
      #overlay p { color: #eee; font: 18px sans-serif; margin-top: 14px; }
      .blink { animation: pulse 1s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="c"></canvas>
      <div id="ui">
        <button id="restartBtn">Reiniciar</button>
        <a href="index.html">Salir</a>
      </div>
      <div id="overlay">
        <h1>COME COCOS</h1>
        <p class="blink">Presiona ENTER para empezar</p>
        <p style="color:#999;font-size:14px">Flechas / WASD</p>
      </div>
    </div>
    <script>
    ;(function(){
      const canvas = document.getElementById('c')
      const ctx = canvas.getContext('2d')

      const CELL = 24
      const COLS = 28
      const ROWS = 31
      const W = 1, E = 0

      const MAP = [
        '1111111111111111111111111111',
        '1000000000001100000000000001',
        '1011110111101101111011110101',
        '1011110111101101111011110101',
        '1011110111101101111011110101',
        '1000000000000000000000000001',
        '1011110110111111011011110101',
        '1011110110111111011011110101',
        '1000000110001100011000000001',
        '1111110111101101111011111101',
        '1111110111101101111011111101',
        '1111110110000000011011111101',
        '1111110110111111011011111101',
        '1111110110111111011011111101',
        '111111110011    110011111111',
        '1111110110111111011011111101',
        '1111110110100001011011111101',
        '1111110110100001011011111101',
        '1111110110100001011011111101',
        '1111110110000000011011111101',
        '1000000000000000000000000001',
        '1011110111101101111011110101',
        '1011110111101101111011110101',
        '1000110000000000000000110001',
        '1110110110111111011011011101',
        '1110110110111111011011011101',
        '1000000110001100011000000001',
        '1011111110110011011111110101',
        '1011111110110011011111110101',
        '1000000000000000000000000001',
        '1111111111111111111111111111',
      ]

      let map = []
      let player = {}
      let score = 0
      let lives = 3
      let state = 'start'
      let lastTime = 0
      let cellSize = 1
      let offsetX = 0, offsetY = 0

      function buildMap() {
        map = []
        for (let r = 0; r < ROWS; r++) {
          map[r] = []
          for (let c = 0; c < COLS; c++) {
            map[r][c] = MAP[r][c] === '1' ? W : E
          }
        }
      }

      function isWall(c, r) {
        if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return true
        return map[r][c] === W
      }

      function initPlayer() {
        player = {
          col: 1, row: 1,
          dir: -1,
          nextDir: -1,
          speed: 5,
          moving: false,
          progress: 0,
          fromX: 1, fromY: 1,
          toX: 1, toY: 1,
          alive: true,
        }
      }

      function resize() {
        const w = window.innerWidth
        const h = window.innerHeight
        const aspect = COLS / ROWS
        let cw, ch
        if (w / h > aspect) {
          ch = h * 0.9
          cw = ch * aspect
        } else {
          cw = w * 0.95
          ch = cw / aspect
        }
        canvas.width = Math.floor(cw)
        canvas.height = Math.floor(ch)
        cellSize = canvas.width / COLS
        offsetX = 0
        offsetY = 0
      }

      function drawMaze() {
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const x = offsetX + c * cellSize
            const y = offsetY + r * cellSize
            if (map[r][c] === W) {
              ctx.fillStyle = '#333'
              ctx.fillRect(x, y, cellSize, cellSize)
              ctx.strokeStyle = '#555'
              ctx.lineWidth = 0.5
              ctx.strokeRect(x, y, cellSize, cellSize)
            } else {
              ctx.fillStyle = '#000'
              ctx.fillRect(x, y, cellSize, cellSize)
            }
          }
        }
      }

      function drawPlayer() {
        if (!player.alive) return
        let px, py
        if (player.moving) {
          px = player.fromX + (player.toX - player.fromX) * player.progress
          py = player.fromY + (player.toY - player.fromY) * player.progress
        } else {
          px = player.col
          py = player.row
        }
        const cx = offsetX + px * cellSize + cellSize / 2
        const cy = offsetY + py * cellSize + cellSize / 2
        const r = cellSize * 0.42

        ctx.fillStyle = '#FFD54F'
        ctx.beginPath()
        ctx.arc(cx, cy, r, 0, Math.PI * 2)
        ctx.fill()

        let mouthAngle = 0
        if (player.moving) {
          mouthAngle = Math.abs(Math.sin(Date.now() * 0.01)) * 0.8
        }
        const dirs = [[0,-1],[0,1],[-1,0],[1,0]]
        let angle = 0
        if (player.dir >= 0 && player.dir <= 3) {
          const d = dirs[player.dir]
          angle = Math.atan2(d[1], d[0])
        }
        ctx.fillStyle = '#000'
        ctx.beginPath()
        ctx.moveTo(cx, cy)
        ctx.arc(cx, cy, r, angle - mouthAngle, angle + mouthAngle)
        ctx.closePath()
        ctx.fill()

        const eyeOff = 0.25
        const perpX = -Math.sin(angle) * r * eyeOff
        const perpY = Math.cos(angle) * r * eyeOff
        const fwdX = Math.cos(angle) * r * 0.15
        const fwdY = Math.sin(angle) * r * 0.15
        ctx.fillStyle = '#000'
        ctx.beginPath()
        ctx.arc(cx + perpX + fwdX, cy + perpY + fwdY, r * 0.08, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(cx - perpX + fwdX, cy - perpY + fwdY, r * 0.08, 0, Math.PI * 2)
        ctx.fill()
      }

      function drawHUD() {
        ctx.fillStyle = '#fff'
        ctx.font = 'bold ' + Math.max(14, cellSize * 0.7) + 'px monospace'
        ctx.textAlign = 'left'
        ctx.textBaseline = 'top'
        ctx.fillText('PTS: ' + score, 10, canvas.height - 30)
        ctx.textAlign = 'right'
        let h = ''
        for (let i = 0; i < lives; i++) h += '● '
        ctx.fillText(h, canvas.width - 10, canvas.height - 30)
      }

      function drawOverlay(title, sub) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'
        ctx.fillRect(0, 0, canvas.width, canvas.height)
        ctx.fillStyle = '#ffc107'
        ctx.font = 'bold ' + Math.max(28, cellSize * 1.5) + 'px sans-serif'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20)
        if (sub) {
          ctx.fillStyle = '#aaa'
          ctx.font = Math.max(14, cellSize * 0.7) + 'px sans-serif'
          ctx.fillText(sub, canvas.width / 2, canvas.height / 2 + 20)
        }
      }

      function update() {
        if (state !== 'playing' || !player.alive) return

        if (player.moving) {
          player.progress += player.speed * 0.016
          if (player.progress >= 1) {
            player.col = player.toX
            player.row = player.toY
            player.fromX = player.toX
            player.fromY = player.toY
            player.progress = 0
            player.moving = false
          }
        }

        if (!player.moving) {
          const dirs = [[0,-1],[0,1],[-1,0],[1,0]]
          if (player.nextDir >= 0 && player.nextDir <= 3) {
            const d = dirs[player.nextDir]
            const nc = player.col + d[0]
            const nr = player.row + d[1]
            if (!isWall(nc, nr)) {
              player.dir = player.nextDir
              player.moving = true
              player.fromX = player.col
              player.fromY = player.row
              player.toX = nc
              player.toY = nr
              player.progress = 0
              player.nextDir = -1
            }
          }
          if (!player.moving && player.dir >= 0 && player.dir <= 3) {
            const d = dirs[player.dir]
            const nc = player.col + d[0]
            const nr = player.row + d[1]
            if (!isWall(nc, nr)) {
              player.moving = true
              player.fromX = player.col
              player.fromY = player.row
              player.toX = nc
              player.toY = nr
              player.progress = 0
            }
          }
        }
      }

      function render() {
        ctx.fillStyle = '#000'
        ctx.fillRect(0, 0, canvas.width, canvas.height)
        drawMaze()
        drawPlayer()
        drawHUD()
        if (state === 'start') drawOverlay('COME COCOS', 'Presiona ENTER')
        else if (state === 'gameover') drawOverlay('GAME OVER', 'Puntos: ' + score + '  ENTER para reiniciar')
      }

      function loop(time) {
        const dt = Math.min(0.05, (time - lastTime) / 1000)
        lastTime = time
        update()
        render()
        requestAnimationFrame(loop)
      }

      function startGame() {
        buildMap()
        initPlayer()
        score = 0
        lives = 3
        state = 'playing'
        document.getElementById('overlay').style.display = 'none'
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          if (state === 'start' || state === 'gameover') startGame()
          return
        }
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') player.nextDir = 0
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') player.nextDir = 1
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') player.nextDir = 2
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') player.nextDir = 3
      })

      document.getElementById('restartBtn').addEventListener('click', startGame)
      document.getElementById('overlay').addEventListener('click', () => {
        if (state === 'start' || state === 'gameover') startGame()
      })

      window.addEventListener('resize', resize)
      resize()
      buildMap()
      initPlayer()
      requestAnimationFrame(loop)
    })()
    </script>
  </body>
</html>
