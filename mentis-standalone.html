<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>🧠 MENTIS — El Desafío del Saber</title>
  <meta name="description" content="100 pisos de puzzles matemáticos, lógica, estrategia y memoria.">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MENTIS">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <style>
:root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #12122a;
  --bg-tertiary: #1a1a3e;
  --bg-card: rgba(20, 20, 50, 0.7);
  --bg-glass: rgba(255, 255, 255, 0.04);
  --bg-glass-hover: rgba(255, 255, 255, 0.08);
  --border-glass: rgba(255, 255, 255, 0.08);
  --border-active: rgba(255, 255, 255, 0.15);
  --text-primary: #f0e8d0;
  --text-secondary: #a090b0;
  --text-muted: #605070;
  --gold: #ffd700;
  --gold-dim: #b8960a;
  --gold-glow: rgba(255, 215, 0, 0.3);
  --purple: #7c4dff;
  --purple-dim: #5a36cc;
  --purple-glow: rgba(124, 77, 255, 0.3);
  --blue: #448aff;
  --blue-dim: #2a5fc4;
  --blue-glow: rgba(68, 138, 255, 0.3);
  --green: #4caf50;
  --green-dim: #388e3c;
  --green-glow: rgba(76, 175, 80, 0.3);
  --red: #ef5350;
  --red-dim: #c62828;
  --red-glow: rgba(239, 83, 80, 0.3);
  --cyan: #00bcd4;
  --orange: #ff9800;
  --pink: #e91e63;
  --success: #4caf50;
  --error: #ef5350;
  --warning: #ff9800;
  --info: #448aff;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
  --shadow-gold: 0 0 20px var(--gold-glow);
  --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-display: 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'Cascadia Code', 'Fira Code', monospace;
  --transition-fast: 0.15s ease;
  --transition-normal: 0.3s ease;
  --transition-slow: 0.5s ease;
  --z-base: 1;
  --z-hud: 100;
  --z-modal: 200;
  --z-toast: 300;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-main);-webkit-font-smoothing:antialiased;touch-action:none;-webkit-user-select:none;user-select:none}
a{color:var(--gold);text-decoration:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit;background:none;color:inherit}
input,textarea{font-family:inherit;outline:none;border:none}
canvas{display:block}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--purple-dim);border-radius:2px}
::selection{background:var(--purple);color:#fff}
@font-face{font-family:'Segoe UI';src:local('Segoe UI'),local('-apple-system'),local('system-ui')}

#app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:10}
#game-canvas{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity var(--transition-slow),visibility var(--transition-slow);z-index:var(--z-base)}
.screen.active{opacity:1;visibility:visible}
.container{width:100%;max-width:520px;padding:20px;margin:0 auto}
.row{display:flex;gap:12px}
.row.center{justify-content:center}
.col{display:flex;flex-direction:column;gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.flex-center{display:flex;align-items:center;justify-content:center}
.gap-sm{gap:6px}
.gap-md{gap:12px}
.gap-lg{gap:20px}
.mt-sm{margin-top:8px}
.mt-md{margin-top:16px}
.mt-lg{margin-top:24px}
.mb-sm{margin-bottom:8px}
.mb-md{margin-bottom:16px}
.text-center{text-align:center}
.text-gold{color:var(--gold)}
.text-muted{color:var(--text-muted)}
.text-success{color:var(--success)}
.text-error{color:var(--error)}
.font-bold{font-weight:700}
.font-mono{font-family:var(--font-mono)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border-radius:var(--radius-md);font-size:15px;font-weight:600;transition:all var(--transition-fast);position:relative;overflow:hidden}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple-dim));color:#fff;box-shadow:0 4px 15px var(--purple-glow)}
.btn-primary:hover{box-shadow:0 6px 25px var(--purple-glow);transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#1a1a2e;box-shadow:0 4px 15px var(--gold-glow)}
.btn-gold:hover{box-shadow:0 6px 25px var(--gold-glow);transform:translateY(-1px)}
.btn-ghost{background:var(--bg-glass);border:1px solid var(--border-glass);color:var(--text-primary)}
.btn-ghost:hover{background:var(--bg-glass-hover);border-color:var(--border-active)}
.btn-sm{padding:8px 18px;font-size:13px}
.btn-lg{padding:16px 36px;font-size:17px}
.btn-icon{padding:10px;border-radius:50%;width:40px;height:40px}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.card{background:var(--bg-card);border:1px solid var(--border-glass);border-radius:var(--radius-lg);padding:20px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.card-hover:hover{border-color:var(--border-active);background:var(--bg-glass-hover);transform:translateY(-2px);transition:all var(--transition-normal)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-gold{background:var(--gold-glow);color:var(--gold)}
.badge-purple{background:var(--purple-glow);color:var(--purple)}
.badge-green{background:var(--green-glow);color:var(--green)}
.badge-red{background:var(--red-glow);color:var(--red)}
.progress-bar{height:6px;border-radius:3px;background:var(--bg-glass);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width var(--transition-normal);background:linear-gradient(90deg,var(--purple),var(--gold))}
.progress-fill.gold{background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
.progress-fill.green{background:var(--green)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:var(--z-modal);opacity:0;visibility:hidden;transition:all var(--transition-normal);backdrop-filter:blur(4px)}
.modal-overlay.active{opacity:1;visibility:visible}
.modal{background:var(--bg-secondary);border:1px solid var(--border-glass);border-radius:var(--radius-xl);padding:30px;max-width:420px;width:90%;transform:scale(0.9);transition:transform var(--transition-normal);box-shadow:var(--shadow-lg)}
.modal-overlay.active .modal{transform:scale(1)}
.toast-container{position:fixed;top:20px;right:20px;z-index:var(--z-toast);display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg-tertiary);border:1px solid var(--border-glass);border-radius:var(--radius-md);padding:12px 18px;font-size:13px;box-shadow:var(--shadow-md);transform:translateX(120%);opacity:0;transition:all var(--transition-normal);pointer-events:auto;max-width:320px}
.toast.show{transform:translateX(0);opacity:1}
.toast-success{border-color:var(--green-dim);box-shadow:0 4px 15px var(--green-glow)}
.toast-error{border-color:var(--red-dim);box-shadow:0 4px 15px var(--red-glow)}
.toast-info{border-color:var(--blue-dim);box-shadow:0 4px 15px var(--blue-glow)}
.tooltip{position:relative}
.tooltip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%) scale(0.8);background:var(--bg-tertiary);color:var(--text-primary);padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:all var(--transition-fast);border:1px solid var(--border-glass)}
.tooltip:hover::after{opacity:1;transform:translateX(-50%) scale(1)}

.tower-scroll{position:relative;width:100%;max-width:400px;height:420px;overflow:hidden;mask-image:linear-gradient(to bottom,transparent,black 5%,black 95%,transparent);-webkit-mask-image:linear-gradient(to bottom,transparent,black 5%,black 95%,transparent)}
.tower-list{display:flex;flex-direction:column;gap:4px;padding:60px 10px;transition:transform var(--transition-slow)}
.floor-btn{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:var(--radius-md);background:var(--bg-glass);border:1px solid var(--border-glass);transition:all var(--transition-fast);font-size:13px;width:100%;text-align:left}
.floor-btn:hover{background:var(--bg-glass-hover);border-color:var(--border-active)}
.floor-btn.current{border-color:var(--gold);background:var(--gold-glow);box-shadow:0 0 15px var(--gold-glow)}
.floor-btn.locked{opacity:0.4}
.floor-btn.completed{border-color:var(--green-dim);background:var(--green-glow)}
.floor-num{font-weight:700;color:var(--text-muted);min-width:40px}
.floor-btn.current .floor-num{color:var(--gold)}
.floor-btn.completed .floor-num{color:var(--green)}
.floor-zone{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-left:auto}
.zone-badge{padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600}
.zone-logic{background:rgba(124,77,255,0.2);color:var(--purple)}
.zone-math{background:rgba(68,138,255,0.2);color:var(--blue)}
.zone-visual{background:rgba(0,188,212,0.2);color:var(--cyan)}
.zone-strategy{background:rgba(255,152,0,0.2);color:var(--orange)}
.zone-memory{background:rgba(233,30,99,0.2);color:var(--pink)}
.zone-mixed{background:rgba(255,215,0,0.2);color:var(--gold)}
.stars{display:flex;gap:2px;margin-left:auto}
.star{font-size:12px;color:var(--text-muted)}
.star.filled{color:var(--gold);text-shadow:0 0 6px var(--gold-glow)}
.floor-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.floor-dot.locked{background:var(--text-muted)}
.floor-dot.current{background:var(--gold);box-shadow:0 0 8px var(--gold-glow)}
.floor-dot.completed{background:var(--green)}

.puzzle-area{width:100%;min-height:320px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:10px 0}
.puzzle-question{font-size:18px;line-height:1.6;text-align:center;max-width:480px;color:var(--text-primary);margin-bottom:8px}
.puzzle-question .highlight{color:var(--gold);font-weight:700}
.puzzle-question .emoji{font-size:24px}
.puzzle-canvas-wrap{position:relative;border-radius:var(--radius-md);overflow:hidden;background:var(--bg-primary);border:1px solid var(--border-glass)}
.puzzle-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:480px}
.puzzle-option{display:flex;align-items:center;justify-content:center;padding:14px 8px;border-radius:var(--radius-md);background:var(--bg-glass);border:1px solid var(--border-glass);font-size:15px;font-weight:600;transition:all var(--transition-fast);cursor:pointer;text-align:center;min-height:52px}
.puzzle-option:hover{background:var(--bg-glass-hover);border-color:var(--border-active);transform:translateY(-1px)}
.puzzle-option.selected{background:var(--blue-glow);border-color:var(--blue)}
.puzzle-option.correct{background:var(--green-glow);border-color:var(--green);animation:pulse 0.4s ease}
.puzzle-option.wrong{background:var(--red-glow);border-color:var(--red);animation:shake 0.4s ease}
.puzzle-option:active{transform:scale(0.97)}
.puzzle-option .label{color:var(--text-muted);margin-right:8px;font-size:12px}
.puzzle-hint{font-size:13px;color:var(--text-muted);text-align:center;padding:10px 16px;border-radius:var(--radius-md);background:var(--bg-glass);max-width:480px;width:100%;margin-top:8px}
.puzzle-hint .hint-number{display:inline-block;padding:1px 8px;border-radius:10px;background:var(--purple-glow);color:var(--purple);font-size:11px;margin-right:6px}
.puzzle-maze{display:grid;gap:1px;background:var(--text-muted);border-radius:var(--radius-sm);overflow:hidden}
.maze-cell{width:100%;aspect-ratio:1;transition:background var(--transition-fast)}
.maze-wall{background:var(--bg-primary)}
.maze-path{background:var(--bg-tertiary)}
.maze-player{background:var(--gold);box-shadow:0 0 8px var(--gold-glow)}
.maze-goal{background:var(--green);box-shadow:0 0 8px var(--green-glow)}
.maze-visited{background:rgba(124,77,255,0.3)}
.grid-puzzle{display:grid;gap:2px;border-radius:var(--radius-sm);overflow:hidden}
.grid-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border-radius:2px;transition:all var(--transition-fast);cursor:pointer}
.grid-cell:hover{transform:scale(1.05)}
.grid-cell.selected{box-shadow:0 0 0 2px var(--gold);z-index:1}
.grid-cell.flipped{background:var(--bg-tertiary);border:1px solid var(--border-glass)}
.grid-cell.matched{background:var(--green-glow);border-color:var(--green);opacity:0.6}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.puzzle-enter{animation:fadeIn 0.4s ease forwards}
.puzzle-enter:nth-child(2){animation-delay:0.1s}
.puzzle-enter:nth-child(3){animation-delay:0.2s}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--gold-glow)}50%{box-shadow:0 0 20px var(--gold-glow)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scaleIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes particleFloat{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-100px) rotate(720deg);opacity:0}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(200px) rotate(720deg);opacity:0}}
@keyframes rainbow{0%{color:var(--red)}20%{color:var(--gold)}40%{color:var(--green)}60%{color:var(--blue)}80%{color:var(--purple)}100%{color:var(--red)}}
.anim-float{animation:float 3s ease-in-out infinite}
.anim-glow{animation:glow 2s ease-in-out infinite}
.anim-shimmer{background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);background-size:200% 100%;animation:shimmer 3s infinite}
.anim-scale-in{animation:scaleIn 0.4s ease forwards}
.anim-slide-up{animation:slideUp 0.5s ease forwards}
.anim-slide-down{animation:slideDown 0.3s ease forwards}
.anim-delay-1{animation-delay:0.1s}
.anim-delay-2{animation-delay:0.2s}
.anim-delay-3{animation-delay:0.3s}
.anim-delay-4{animation-delay:0.4s}
.anim-delay-5{animation-delay:0.5s}


  </style>
</head>

  const size = 5 + Math.floor(Math.min(diff, 5)) * 2
  const grid = Array.from({ length: size }, () => Array.from({ length: size }, () => ({ n: true, s: true, e: true, w: true, visited: false })))
  function carve(cx, cy) {
    grid[cy][cx].visited = true
    const dirs = shuffle([[0, -1, 'n', 's'], [0, 1, 's', 'n'], [1, 0, 'e', 'w'], [-1, 0, 'w', 'e']])
    for (const [dx, dy, dir, opp] of dirs) {
      const nx = cx + dx, ny = cy + dy
      if (nx < 0 || nx >= size || ny < 0 || ny >= size) continue
      if (!grid[ny][nx].visited) {
        grid[cy][cx][dir] = false
        grid[ny][nx][opp] = false
        carve(nx, ny)
      }
    }
  }
  carve(0, 0)
  const endX = size - 1, endY = size - 1
  let solution = []
  function solve(x, y, path) {
    if (x === endX && y === endY) { solution = [...path, { x, y }]; return true }
    if (grid[y][x]._solved) return false
    grid[y][x]._solved = true
    const dirs = [[0, -1, 'n'], [0, 1, 's'], [1, 0, 'e'], [-1, 0, 'w']]
    for (const [dx, dy, dir] of shuffle(dirs)) {

        if (nx >= 0 && nx < size && ny >= 0 && ny < size && !grid[ny][nx]._solved) {
          if (solve(nx, ny, [...path, { x, y }])) return true
        }
      }
    }
    return false
  }
  solve(0, 0, [])
  const solutionLen = solution.length - 1
  const answer = solutionLen
  const options = shuffle([answer, answer - 1, answer + 1, answer - 2].filter(v => v > 0))
  const optAnswer = options.indexOf(answer)
  return new PuzzleQuestion({

(function() {
import PuzzleEngine, { PuzzleQuestion } from './Engine.js'

function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]] }; return a }

function genOptions(correct, count = 4) {
  const opts = new Set([correct])
  let attempts = 0
  while (opts.size < count && attempts < 50) {
    const d = correct + Math.floor(Math.random() * 8 - 4)
    if (d >= 1 && d !== correct) opts.add(d)
    attempts++
  }
  while (opts.size < count) opts.add(opts.size + 1)
  const arr = shuffle([...opts])
  return { options: arr.map(o => String(o)), answer: arr.indexOf(correct) }
}

function genTowersOfHanoi(diff) {
  const disks = 3 + Math.floor(Math.min(diff, 3))
  const minMoves = Math.pow(2, disks) - 1
  const { options, answer } = genOptions(minMoves, 4)
  return new PuzzleQuestion({
    text: `🗼 Torres de Hanoi\n${disks} discos.\nPásalos todos al tercer poste.\nSolo puedes mover un disco a la vez y no puedes poner un disco grande sobre uno pequeño.\n\n¿Cuál es el número MÍNIMO de movimientos?`,
    options,
    answer,
    data: { category: 'strategy', subType: 'hanoi', disks, minMoves }
  })
}

function genBridgeCrossing(diff) {
  const times = shuffle([1, 2, 5, 8, 10, 13].slice(0, 4 + Math.floor(Math.min(diff, 2))))
  const sorted = [...times].sort((a, b) => a - b)
  const n = times.length
  let optimal = 0
  if (n <= 2) optimal = Math.max(...sorted)
  else if (n === 3) optimal = sorted[0] + sorted[1] + sorted[2]
  else {
    const a = sorted[0], b = sorted[1]
    for (let i = n - 1; i >= 0; i -= 2) {
      if (i === 1) { optimal += b; break }
      if (i === 2) { optimal += a + sorted[1] + sorted[2]; break }
      optimal += Math.min(2 * a + sorted[i] + sorted[i - 1], a + 2 * b + sorted[i])
    }
  }
  const { options, answer } = genOptions(optimal, 4)
  return new PuzzleQuestion({
    text: `🌉 ${n} personas cruzan un puente. Llevan una linterna.\nTiempos: ${times.join(', ')} segundos.\nEl puente solo soporta a 2 personas a la vez.\nSin linterna no pueden cruzar.\n\n¿Cuál es el tiempo MÍNIMO total (en segundos)?`,
    options: options.map(o => o + 's'),
    answer,
    data: { category: 'strategy', subType: 'bridge', optimal }
  })
}

function genWaterJug(diff) {
  const cap1 = 5 + Math.floor(Math.random() * (3 + diff * 2))
  const cap2 = 3 + Math.floor(Math.random() * (3 + diff))
  const target = 2 + Math.floor(Math.random() * Math.min(cap1, cap2) - 1)
  if (target < 1) target = 1
  const answer = target
  const { options: opts, answer: optAns } = genOptions(target, 4)
  return new PuzzleQuestion({
    text: `🫗 Jarras de agua.\nJarra A: ${cap1} litros\nJarra B: ${cap2} litros\nTienes un grifo que llena las jarras.\nPuedes llenar, vaciar, o verter de una a otra.\n\n¿Cuántos litros puedes medir EXACTAMENTE?`,
    options: opts.map(o => o + 'L'),
    answer: optAns,
    data: { category: 'strategy', subType: 'water', target }
  })
}

function genOptimization(diff) {
  const items = [
    { name: 'Manzanas', value: 3, weight: 2 },
    { name: 'Pan', value: 5, weight: 3 },
    { name: 'Agua', value: 4, weight: 2 },
    { name: 'Libro', value: 6, weight: 4 },
    { name: 'Linterna', value: 2, weight: 1 },
    { name: 'Manta', value: 3, weight: 3 },
    { name: 'Comida', value: 7, weight: 5 },
    { name: 'Botiquín', value: 8, weight: 3 },
  ]
  const selected = shuffle(items).slice(0, 4 + Math.floor(Math.min(diff, 2)))
  const capacity = selected.reduce((s, i) => s + i.weight, 0) / 2 + Math.floor(Math.random() * 2)
  const cap = Math.floor(capacity)
  const dp = Array(cap + 1).fill(0)
  for (const item of selected) {
    for (let w = cap; w >= item.weight; w--) {
      dp[w] = Math.max(dp[w], dp[w - item.weight] + item.value)
    }
  }
  const optimal = Math.max(...dp)
  const { options, answer } = genOptions(optimal, 4)
  const listStr = selected.map(i => `${i.name}: ${i.value}pts, ${i.weight}kg`).join('\n')
  return new PuzzleQuestion({
    text: `🎒 Mochila (capacidad: ${cap}kg)\n\n${listStr}\n\n¿Cuál es el valor MÁXIMO que puedes llevar?`,
    options: options.map(o => o + ' pts'),
    answer,
    data: { category: 'strategy', subType: 'optimize', optimal }
  })
}

    options: options.map(o => o + ' viajes'),
    answer,
    data: { category: 'strategy', subType: 'river', trips: boatTrips }
  })
}

  const engine = new PuzzleEngine({ category: 'strategy' })
  const generators = [genTowersOfHanoi, genOptimization, genWaterJug, genRiverCrossing]
  if (Math.random() > 0.5) generators.push(genBridgeCrossing)
  generators.forEach(g => engine.register(g))
  return engine

function genSequence(diff) {

  const len = 3 + Math.floor(Math.min(diff, 5))

    else pool = [...symbols]
  }

  const correct = seq[seq.length - 1]

  return new PuzzleQuestion({

    options: opts,

  })

function genPairs(diff) {
  const pairCount = 3 + Math.floor(Math.min(diff, 3))
  const selected = shuffle(CARD_SYMBOLS).slice(0, pairCount)
  const deck = shuffle([...selected, ...selected])
  const positions = deck.map((s, i) => ({ s, i }))
  let moves = 0
  const revealed = new Set()
  for (let i = 0; i < deck.length; i++) {
    if (revealed.has(i)) continue
    for (let j = i + 1; j < deck.length; j++) {
      if (revealed.has(j)) continue
      if (deck[i] === deck[j]) { revealed.add(i); revealed.add(j); moves++; break }
    }
  }
  const optimalMoves = pairCount
  const answer = optimalMoves
  const opts = shuffle([answer, answer + 1, answer + 2, answer + 3])
  return new PuzzleQuestion({
    text: `🃏 Encuentra los ${pairCount} pares iguales.\nCartas boca abajo: ${pairCount * 2}\n\n¿Cuál es el número MÍNIMO de movimientos para encontrar todos los pares?`,

  })

  for (let r = 0; r < size; r++) {
    display.push(nums.slice(r * size, (r + 1) * size).join(' '))

  const toRemove = Math.floor(Math.random() * total)

  const opts = shuffle([correct, ...Array.from({ length: 3 }, () => Math.floor(Math.random() * total) + 1).filter(v => v !== correct)])

(function() {


class AdaptiveDifficulty {
  constructor() {
    this._history = []
    this._lastAdjustment = 0
  }

  recordResult(category, correct, time) {
    this._history.push({ category, correct, time, ts: Date.now() })
    if (this._history.length > 100) this._history.shift()
  }

  getAdjustment() {
    const recent = this._history.slice(-20)
    if (recent.length < 5) return 0
    const correct = recent.filter(r => r.correct).length / recent.length
    const avgTime = recent.reduce((s, r) => s + r.time, 0) / recent.length
    if (correct > 0.85 && avgTime < 8) return 1
    if (correct < 0.45) return -1
    return 0
  }

  getCategoryWeaknesses() {
    const byCat = {}
    for (const r of this._history) {
      if (!byCat[r.category]) byCat[r.category] = { total: 0, correct: 0 }
      byCat[r.category].total++
      if (r.correct) byCat[r.category].correct++
    }
    const weaknesses = Object.entries(byCat)
      .map(([cat, data]) => ({ category: cat, rate: data.correct / data.total, total: data.total }))
      .sort((a, b) => a.rate - b.rate)
    return weaknesses.filter(w => w.total >= 3)
  }

  getRecommendedDifficulty() {
    const stats = __module_.core_Store.store.get('stats')
    const adjust = this.getAdjustment()
    const base = Math.min(10, Math.max(1, Math.floor(stats.puzzlesSolved / 20) + 1))
    return Math.min(10, Math.max(1, base + adjust))
  }
}

(function() {


function getDailySeed() {
  const d = new Date()
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
}

class DailyChallenge {
  constructor() { this._today = null }

  generate() {
    const seed = getDailySeed()
    if (this._today && this._today.seed === seed) return this._today
    const catKeys = Object.keys(__module_.puzzles_Registry.CATEGORIES)
    const category = catKeys[Math.abs(this._hash(seed)) % catKeys.length]
    const engine = __module_.puzzles_Registry.getEngine(category)
    const puzzle = engine.generate(5 + (Math.abs(this._hash(seed + '_diff')) % 5))
    this._today = { seed, category, puzzle, date: seed }
    return this._today
  }

  getScore() {
    try {
      const stored = localStorage.getItem('mentis_daily_' + getDailySeed())
      return stored ? JSON.parse(stored) : null
    } catch { return null }
  }

  saveScore(result) {
    localStorage.setItem('mentis_daily_' + getDailySeed(), JSON.stringify({
      ...result,
      seed: getDailySeed(),
      timestamp: Date.now()
    }))
  }

  _hash(str) {
    let h = 0
    for (let i = 0; i < str.length; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i)
      h |= 0
    }
    return h
  }
}

window.__module_systems_Daily = window.__module_systems_Daily || {};
window.__module_systems_Daily.DailyChallenge = class DailyChallenge;

(function() {
class ParticleEngine {
  constructor(canvas) {
    this._canvas = canvas
    this._ctx = canvas?.getContext('2d')
    this._particles = []
    this._running = false
  }

  emit(x, y, count = 10, config = {}) {
    for (let i = 0; i < count; i++) {
      this._particles.push({
        x, y,
        vx: (Math.random() - 0.5) * (config.speed || 4),
        vy: (Math.random() - 0.5) * (config.speed || 4) - 2,
        life: config.life || 40 + Math.random() * 30,
        maxLife: config.life || 60,
        size: config.size || 2 + Math.random() * 3,
        color: config.color || this._randomColor(),
        type: config.type || 'circle',
        gravity: config.gravity ?? 0.08,
        fade: config.fade ?? true,
      })
    }
  }

  emitStar(x, y) { this.emit(x, y, 15, { color: '#ffd700', size: 3, speed: 5 }) }
  emitCorrect(x, y) { this.emit(x, y, 20, { color: '#4caf50', size: 4, speed: 6 }) }
  emitWrong(x, y) { this.emit(x, y, 8, { color: '#ef5350', size: 3, speed: 3 }) }
  emitLevelUp() {
    const cx = this._canvas?.width / 2 || 200
    const cy = this._canvas?.height / 2 || 200
    this.emit(cx, cy, 40, { color: '#ffd700', size: 5, speed: 8, life: 60 })
    this.emit(cx, cy, 20, { color: '#7c4dff', size: 4, speed: 6, life: 50 })
  }
  emitConfetti() {
    for (let i = 0; i < 60; i++) {
      this._particles.push({
        x: Math.random() * (this._canvas?.width || 400),
        y: -10 - Math.random() * 50,
        vx: (Math.random() - 0.5) * 3,
        vy: 1 + Math.random() * 2,
        life: 120 + Math.random() * 60,
        maxLife: 180,
        size: 4 + Math.random() * 4,
        color: ['#ffd700','#7c4dff','#448aff','#4caf50','#ef5350','#ff9800'][Math.floor(Math.random() * 6)],
        type: 'rect',
        gravity: 0.02,
        fade: true,
      })
    }
  }

  _randomColor() {
    return ['#ffd700','#7c4dff','#448aff','#4caf50','#00bcd4','#e91e63'][Math.floor(Math.random() * 6)]
  }

  update(dt) {
    for (let i = this._particles.length - 1; i >= 0; i--) {
      const p = this._particles[i]
      p.x += p.vx
      p.y += p.vy
      p.vy += p.gravity
      p.vx *= 0.98
      p.life--
      if (p.life <= 0 || p.y > (this._canvas?.height || 600) + 20) {
        this._particles.splice(i, 1)
      }
    }
  }

  render(ctx) {
    if (!ctx) ctx = this._ctx
    if (!ctx) return
    for (const p of this._particles) {
      ctx.save()
      const alpha = p.fade ? Math.max(0, p.life / p.maxLife) : 1
      ctx.globalAlpha = alpha
      ctx.fillStyle = p.color
      if (p.type === 'rect') {
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size)
      } else {
        ctx.beginPath()
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2)
        ctx.fill()
      }
      ctx.restore()
    }
  }

  clear() { this._particles = [] }
  get count() { return this._particles.length }
}

window.__module_ui_Particles = window.__module_ui_Particles || {};
window.__module_ui_Particles.ParticleEngine = class ParticleEngine;

(function() {
class TransitionEngine {
  constructor(canvas) {
    this._canvas = canvas
    this._ctx = canvas?.getContext('2d')
    this._active = null
  }

  fadeOut(duration = 300) {
    return this._run('fade', 0, 1, duration)
  }

  fadeIn(duration = 300) {
    return this._run('fade', 1, 0, duration)
  }

  wipe(direction = 'left', duration = 400) {
    return this._run('wipe', 0, 1, duration, { direction })
  }

  _run(type, from, to, duration, opts = {}) {
    return new Promise(resolve => {
      const start = performance.now()
      this._active = { type, from, to, duration, opts, start, resolve }
      if (!this._canvas) { resolve(); return }
    })
  }

  update(now) {
    if (!this._active) return
    const { from, to, duration, start, resolve } = this._active
    const elapsed = now - start
    const t = Math.min(1, elapsed / duration)
    const eased = 1 - Math.pow(1 - t, 3)
    this._active.progress = from + (to - from) * eased
    if (t >= 1) {
      this._active = null
      resolve()
    }
  }

  render(ctx) {
    if (!this._active) return
    const { type, direction, progress } = this._active
    if (type === 'fade') {
      ctx.fillStyle = `rgba(10,10,26,${progress})`
      ctx.fillRect(0, 0, this._canvas.width, this._canvas.height)
    } else if (type === 'wipe') {
      const w = this._canvas.width * progress
      ctx.fillStyle = '#0a0a1a'
      if (direction === 'left') ctx.fillRect(this._canvas.width - w, 0, w, this._canvas.height)
      else ctx.fillRect(0, 0, w, this._canvas.height)
    }
  }

  isActive() { return !!this._active }
}

window.__module_ui_Transitions = window.__module_ui_Transitions || {};
window.__module_ui_Transitions.TransitionEngine = class TransitionEngine;
})();

    ty += 20
  }
  const opts = p.puzzle.options || []
  const totalOpts = opts.length
  const cols = totalOpts <= 4 ? 2 : 2
  const rows = Math.ceil(totalOpts / cols)
  const bw = (VW - 40) / cols
  const bh = 44
  const startY = Math.max(ty + 20, 280)
  for (let i = 0; i < totalOpts; i++) {
    const col = i % cols, row = Math.floor(i / cols)
    const bx = 14 + col * (bw + 6)
    const by = startY + row * (bh + 6)
    let bg = 'rgba(255,255,255,0.06)'
    let tc = COLORS.textPrimary
    if (puzzleAnswered) {
      if (i === p.puzzle.answer) { bg = 'rgba(76,175,80,0.25)'; tc = '#4caf50' }
      else if (i === p._selected) { bg = 'rgba(239,83,80,0.25)'; tc = '#ef5350' }
    }
    ctx.fillStyle = bg
    roundRect(ctx, bx, by, bw, bh, 8)
    ctx.fill()
    ctx.fillStyle = tc
    ctx.font = 'bold 13px sans-serif'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    const label = String.fromCharCode(65 + i)
    ctx.fillText(`${label}. ${opts[i]}`, bx + bw / 2, by + bh / 2)
  }
  if (puzzleAnswered) {
    const isCorrect = p._selected === p.puzzle.answer
    ctx.fillStyle = isCorrect ? '#4caf50' : '#ef5350'
    ctx.font = 'bold 14px sans-serif'
    ctx.textAlign = 'center'
    ctx.fillText(isCorrect ? '✓ ¡Correcto!' : '✗ Incorrecto', VW / 2, startY + rows * (bh + 6) + 30)
    const timeTaken = Math.floor((Date.now() - p._startTime) / 1000)
    if (isCorrect) {
      ctx.fillStyle = COLORS.gold
      ctx.font = '11px sans-serif'
      ctx.fillText(`+${25 + Math.max(0, 15 - timeTaken) * 2} XP · ${timeTaken}s`, VW / 2, startY + rows * (bh + 6) + 52)
    }
  }
  if (!puzzleAnswered) {
    ctx.fillStyle = 'rgba(255,255,255,0.2)'
    ctx.font = '10px sans-serif'
    ctx.fillText('Toca una opción o presiona 1-4 / A-D', VW / 2, startY + rows * (bh + 6) + 26)
  }
  particles.render(ctx)
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, VH)
  grad.addColorStop(0, '#0a0a1a')
  grad.addColorStop(0.5, '#0f0f2a')
  grad.addColorStop(1, '#1a0a2e')
  ctx.fillStyle = grad
  ctx.fillRect(0, 0, VW, VH)
  ctx.fillStyle = 'rgba(124,77,255,0.04)'
  for (let i = 0; i < 5; i++) {
    const x = (Math.sin(Date.now() * 0.0001 + i * 1.5) * 0.5 + 0.5) * VW
    const y = (Math.cos(Date.now() * 0.00008 + i * 2) * 0.5 + 0.5) * VH
    ctx.beginPath()
    ctx.arc(x, y, 30 + i * 10, 0, Math.PI * 2)
    ctx.fill()
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath()
  ctx.roundRect(x, y, w, h, r)
}

function handleCanvasClick(nx, ny) {
  const screen = screens.getCurrent()
  if (screen === 'title' || screen === null) {
    screens.show('menu')
    audio.click()
    return
  }
  if (screen === 'menu') {
    const opt = getMenuOption(nx, ny)
    if (opt === 'play') { screens.show('tower'); hud.show() }
    else if (opt === 'daily') { screens.show('daily') }
    else if (opt === 'achievements') { screens.show('achievements') }
    else if (opt === 'stats') { screens.show('stats') }
    else if (opt === 'settings') { screens.show('settings') }
    if (opt) audio.click()
    return
  }
  if (screen === 'tower') {
    loadFloor(__module_core_Store.store.get('tower.currentFloor'))
    screens.show('floor')
    return
  }
  if (screen === 'floor') {
    if (solvedCount >= 2) {
      tower.advance()
      setTimeout(() => loadFloor(__module_core_Store.store.get('tower.currentFloor')), 100)
      return
    }
    const actualIdx = currentPuzzles.findIndex((p, i) => !p.solved && i >= solvedCount)
    if (actualIdx >= 0) {
      const p = currentPuzzles[actualIdx]
      p._startTime = Date.now()
      p._selected = -1
      puzzleAnswered = false
      screens.show('puzzle')
    }
    return
  }
  if (screen === 'puzzle') {
    if (puzzleAnswered) {
      puzzleAnswered = false
      const actualIdx = currentPuzzles.findIndex((p, i) => !p.solved && i >= solvedCount)
      if (actualIdx >= 0) {
        const p = currentPuzzles[actualIdx]
        if (p._selected === p.puzzle.answer) {
          p.solved = true
          const cat = p.puzzle.data?.category
          const time = (Date.now() - p._startTime) / 1000
          const floor = __module_core_Store.store.get('tower.currentFloor')
          __module_core_EventBus.events.emit('puzzle:solved', { correct: true, category: cat, time, xp: 25 + Math.max(0, 15 - Math.floor(time)) * 2, stars: time < 8 ? 3 : time < 15 ? 2 : 1, floor })
          particles.emitCorrect(VW / 2, VH / 2)
        } else {
          const floor = __module_core_Store.store.get('tower.currentFloor')
          __module_core_EventBus.events.emit('puzzle:solved', { correct: false, category: p.puzzle.data?.category, time: (Date.now() - p._startTime) / 1000, xp: 0, stars: 0, floor })
          particles.emitWrong(VW / 2, VH / 2)
        }
      }
      screens.show('floor')
      return
    }
    const actualIdx = currentPuzzles.findIndex((p, i) => !p.solved && i >= solvedCount)
    if (actualIdx < 0) return
    const p = currentPuzzles[actualIdx]
    const opts = p.puzzle.options || []
    const totalOpts = opts.length
    const cols = 2, rows = Math.ceil(totalOpts / cols)
    const lines = p.puzzle.text.split('\n')
    let ty = 95
    for (const line of lines) {
      if (ctx.measureText(line).width > VW - 40) ty += 20
      ty += 20
    }
    const bw = (VW - 40) / cols, bh = 44
    const startY = Math.max(ty + 20, 280)
    for (let i = 0; i < totalOpts; i++) {
      const col = i % cols, row = Math.floor(i / cols)
      const bx = 14 + col * (bw + 6)
      const by = startY + row * (bh + 6)
      if (nx >= bx && nx <= bx + bw && ny >= by && ny <= by + bh) {
        p._selected = i
        puzzleAnswered = true
        audio.click()
        return
      }
    }
  }
}

function getMenuOption(nx, ny) {
  const opts = [
    { id: 'play', x: 20, y: 200, w: VW - 40, h: 60 },
    { id: 'daily', x: 20, y: 275, w: VW - 40, h: 50 },
    { id: 'achievements', x: 20, y: 338, w: (VW - 50) / 2, h: 44 },
    { id: 'stats', x: VW / 2 + 5, y: 338, w: (VW - 50) / 2, h: 44 },
    { id: 'settings', x: 20, y: 395, w: VW - 40, h: 44 },
  ]
  for (const o of opts) {
    if (nx >= o.x && nx <= o.x + o.w && ny >= o.y && ny <= o.y + o.h) return o.id
  }
  return null
}

document.addEventListener('keydown', (e) => {

  const screen = screens.getCurrent()
  if ((screen === 'title' || screen === null) && (k === 'Enter' || k === ' ')) {
    screens.show('menu'); audio.click(); return
  }
  if (screen === 'puzzle' && !puzzleAnswered) {
    const m = { '1': 0, '2': 1, '3': 2, '4': 3, 'a': 0, 'b': 1, 'c': 2, 'd': 3 }
    if (k in m) {
      const actualIdx = currentPuzzles.findIndex((p, i) => !p.solved && i >= solvedCount)
      if (actualIdx >= 0) {
        const p = currentPuzzles[actualIdx]
        p._selected = m[k]
        puzzleAnswered = true
        audio.click()
      }
    }
  }
  if (k === 'Escape' && screen !== 'title' && screen !== 'menu' && screen !== null) {
    screens.show('menu')
  }
})

  else if (currentRenderer === 'puzzle') {
    const actualIdx = currentPuzzles.findIndex((p, i) => !p.solved && i >= solvedCount)
    if (actualIdx >= 0) renderPuzzle(currentPuzzles[actualIdx], actualIdx)
    else screens.show('floor')
  }
  else if (currentRenderer === 'achievements') renderAchievements()
  else if (currentRenderer === 'stats') renderStats()
  else if (currentRenderer === 'settings') renderSettings()
  else if (currentRenderer === 'daily') renderDaily()
  transitions.render(ctx)
}

loadSave()
tower.init()
loop.start()
console.log('[MENTIS] Game initialized. Current screen:', screens.getCurrent())

window.__module_app = window.__module_app || {};
window.__module_app.audio = audio;
})();

  </script>
