<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Perrito Equilibrista - Grizzy &amp; the Lemmings</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a0a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
        touch-action: none;
      }
      canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        background: #2d1b4e;
        image-rendering: pixelated;
        cursor: pointer;
      }
    </style>

    <script src="js/audio.js"></script>
    <script src="js/save.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/grizzy.js"></script>
    <script src="js/back.js"></script>
  </head>
  <body>
    <canvas id="g"></canvas>
    <script>
      const c = document.getElementById('g'),
        ctx = c.getContext('2d')
      const W = 600,
        H = 400,
        V = 0.55,
        IMB = 0.52,
        COIN = 10,
        MAX_LV = 40
      let dpr = 1,
        scale = 1,
        state = 'START',
        score = 0,
        best = parseInt(localStorage.getItem('grizzy_balance_best')) || 0,
        lv = 1,
        coins = 0,
        time = 0
      let gTilt = 0,
        rAngle = 0,
        wind = 0,
        windT = 0,
        shake = 0,
        fallTimer = 0,
        flash = 0,
        combo = 0,
        dist = 0
      let lems = [],
        coinsA = [],
        parts = [],
        twinkle = []
      let keys = {},
        lastTime = 0,
        audioCtx = null

      function resize() {
        dpr = window.devicePixelRatio || 1
        const mw = window.innerWidth,
          mh = window.innerHeight
        const s = Math.max(1, Math.min(mw / W, mh / H))
        scale = s * dpr
        c.width = W * scale
        c.height = H * scale
        c.style.width = W * s + 'px'
        c.style.height = H * s + 'px'
        ctx.setTransform(scale, 0, 0, scale, 0, 0)
      }
      window.addEventListener('resize', resize)

      // AUDIO
      function initAudio() {
        if (audioCtx) return
        audioCtx = new (window.AudioContext || window.webkitAudioContext)()
      }
      function playS(type) {
        if (!audioCtx) return
        const o = audioCtx.createOscillator(),
          g = audioCtx.createGain()
        o.connect(g)
        g.connect(audioCtx.destination)
        g.gain.value = 0.08
        const t = audioCtx.currentTime
        if (type == 'coin') {
          o.frequency.setValueAtTime(880, t)
          o.frequency.setValueAtTime(1320, t + 0.05)
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.15)
          o.start(t)
          o.stop(t + 0.15)
        } else if (type == 'fall') {
          o.type = 'sawtooth'
          o.frequency.setValueAtTime(440, t)
          o.frequency.exponentialRampToValueAtTime(80, t + 0.4)
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.5)
          o.start(t)
          o.stop(t + 0.5)
        } else if (type == 'over') {
          o.type = 'square'
          o.frequency.setValueAtTime(440, t)
          o.frequency.setValueAtTime(350, t + 0.15)
          o.frequency.setValueAtTime(260, t + 0.3)
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.6)
          o.start(t)
          o.stop(t + 0.6)
        } else if (type == 'sweep') {
          o.frequency.setValueAtTime(300, t)
          o.frequency.linearRampToValueAtTime(600, t + 0.08)
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.1)
          o.start(t)
          o.stop(t + 0.1)
        } else if ((type = 'balance')) {
          o.frequency.setValueAtTime(200 + Math.random() * 100, t)
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.05)
          o.start(t)
          o.stop(t + 0.05)
        }
      }

      // HELPERS
      function lerp(a, b, t) {
        return a + (b - a) * t
      }
      function rnd(a, b) {
        return a + Math.random() * (b - a)
      }
      function rni(a, b) {
        return Math.floor(rnd(a, b + 1))
      }
      function clamp(v, a, b) {
        return v < a ? a : v > b ? b : v
      }

      // SPAWN
      function spawnLem() {
        const side = Math.random() < 0.5 ? -1 : 1
        lems.push({
          x: side * 1.2,
          side: side,
          speed: 0.8 + lv * 0.04 + Math.random() * 0.3,
          pass: false,
        })
      }
      function spawnCoin() {
        const side = Math.random() < 0.5 ? -1 : 1
        coinsA.push({ x: side * 1.2, side: side, speed: 0.6 + lv * 0.03, got: false })
      }
      function spawnParts(x, y, n, color) {
        for (let i = 0; i < n; i++) {
          const a = rnd(0, Math.PI * 2),
            sp = rnd(1, 4)
          parts.push({
            x,
            y,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp - 2,
            life: 1,
            decay: rnd(0.01, 0.03),
            sz: rnd(2, 6),
            color: color || ['#FFD700', '#FF6B35', '#FF4444', '#8B4513', '#FFF'][rni(0, 4)],
          })
        }
      }

      // UPDATE
      function update(dt) {
        if (state != 'PLAYING') return
        time += dt
        const lvFac = Math.min(1, (lv - 1) / (MAX_LV - 1))
        const amp = 0.08 + lvFac * 0.15
        const freq = 1.2 + lvFac * 1.5
        windT += dt * (0.5 + lvFac * 1.5)
        wind = Math.sin(windT * 1.7) * lvFac * 0.1 + Math.sin(windT * 3.2) * lvFac * 0.05
        rAngle = amp * Math.sin(time * freq + 0.3 * Math.sin(time * 0.7)) + wind

        // Grizzy tilt
        let tDir = 0
        if (keys['ArrowLeft'] || keys['KeyA']) tDir = -1
        if (keys['ArrowRight'] || keys['KeyD']) tDir = 1
        gTilt += tDir * 2.8 * dt
        gTilt = clamp(gTilt, -V, V)

        // Balance check
        const imb = gTilt + rAngle
        if (Math.abs(imb) > IMB) {
          const dur = Math.abs(imb) - IMB
          shake = Math.min(1, dur * 10)
          if (dur > 0.15) {
            state = 'FALLING'
            fallTimer = 0
            playS('fall')
            spawnParts(W / 2, H / 2 - 50, 40, '#FF6B35')
            spawnParts(W / 2 - 20 + rnd(-10, 10), H / 2 - 20 + rnd(-10, 10), 30, '#FFD700')
            return
          }
        } else {
          shake = lerp(shake, 0, dt * 5)
        }

        // Wind sound (subtle)
        if (Math.abs(wind) > 0.05 && Math.random() < 0.05) playS('balance')

        // Move lemmings
        for (let i = lems.length - 1; i >= 0; i--) {
          const l = lems[i]
          l.x += l.speed * dt * l.side * -1
          if (l.x < -1.5 || l.x > 1.5) {
            lems.splice(i, 1)
            continue
          }
          // collision
          const gSide = gTilt > 0.03 ? 1 : gTilt < -0.03 ? -1 : 0
          if (Math.abs(l.x) < 0.18 && gSide !== 0 && gSide === l.side && !l.pass) {
            l.pass = true
            state = 'FALLING'
            fallTimer = 0
            playS('fall')
            spawnParts(W / 2, H / 2 - 50, 45, '#7E8A9E')
          }
        }

        // Move coins
        for (let i = coinsA.length - 1; i >= 0; i--) {
          const co = coinsA[i]
          co.x += co.speed * dt * co.side * -1
          if (co.x < -1.5 || co.x > 1.5) {
            coinsA.splice(i, 1)
            continue
          }
          const gSide = gTilt > 0.03 ? 1 : gTilt < -0.03 ? -1 : 0
          if (Math.abs(co.x) < 0.18 && gSide === co.side && !co.got) {
            co.got = true
            score += COIN + combo * 2
            coins++
            combo = Math.min(combo + 1, 10)
            playS('coin')
            spawnParts(W / 2 + co.side * 20, H / 2 - 45 - rnd(0, 10), 15, '#FFD700')
            coinsA.splice(i, 1)
            if (coins % 3 === 0 && lv < MAX_LV) {
              lv++
              flash = 1
            }
          }
        }

        // Spawn
        if (Math.random() < dt * (1.5 + lv * 0.15)) spawnLem()
        if (Math.random() < dt * (1 + lv * 0.1)) spawnCoin()

        // Particles
        for (let i = parts.length - 1; i >= 0; i--) {
          const p = parts[i]
          p.x += p.vx
          p.y += p.vy
          p.vy += 0.15
          p.life -= p.decay
          if (p.life <= 0) parts.splice(i, 1)
        }

        // Distance (for difficulty feel)
        dist += dt * 0.6

        // flash fade
        flash = Math.max(0, flash - dt * 2)
      }

      function draw() {
        ctx.clearRect(0, 0, W, H)
        if (shake > 0) {
          const sx = (Math.random() - 0.5) * shake * 8,
            sy = (Math.random() - 0.5) * shake * 6
          ctx.save()
          ctx.translate(sx, sy)
        }
        drawBG()
        const ropeY = H / 2 - 20
        drawRope(ropeY)
        drawLems(ropeY)
        drawCoins(ropeY)
        drawGrizzy(ropeY)
        drawParts()
        drawUI()
        if (shake > 0) ctx.restore()
        if (flash > 0) {
          ctx.fillStyle = `rgba(255,255,200,${flash * 0.3})`
          ctx.fillRect(0, 0, W, H)
        }
        if (state == 'START') drawStart()
        if (state == 'GAMEOVER') drawGO()
        if (state == 'FALLING') drawFalling(ropeY)
      }

      function drawBG() {
        // Sky gradient
        const g = ctx.createLinearGradient(0, 0, 0, H)
        g.addColorStop(0, '#1a0533')
        g.addColorStop(0.4, '#2d1b4e')
        g.addColorStop(0.7, '#4a2a6b')
        g.addColorStop(1, '#1a0a2e')
        ctx.fillStyle = g
        ctx.fillRect(0, 0, W, H)

        // Stars
        while (twinkle.length < 60) {
          twinkle.push({
            x: rnd(0, W),
            y: rnd(0, H * 0.35),
            s: rnd(1, 2.5),
            sp: rnd(0.5, 2),
            p: Math.random() * Math.PI * 2,
          })
        }
        for (const s of twinkle) {
          const a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * s.sp + s.p))
          ctx.fillStyle = `rgba(255,255,255,${a})`
          ctx.fillRect(s.x, s.y, s.s, s.s)
        }

        // Circus tent
        const tentH = 60
        for (let i = 0; i < 14; i++) {
          const x = (i * W) / 14
          ctx.fillStyle = i % 2 === 0 ? '#DC143C' : '#FFD700'
          ctx.beginPath()
          ctx.moveTo(x, 0)
          ctx.lineTo(x + W / 14, 0)
          ctx.lineTo(x + W / 28, tentH)
          ctx.closePath()
          ctx.fill()
        }
        // Tent border
        ctx.strokeStyle = '#FFD700'
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.moveTo(0, tentH)
        for (let i = 0; i <= 14; i++) {
          const x = (i * W) / 14
          ctx.lineTo(x, tentH + 6 * Math.sin(i * 1.2 + time * 1.5))
        }
        ctx.stroke()
        // Tent poles
        ctx.fillStyle = '#8B4513'
        for (let x of [20, W - 20]) {
          ctx.fillRect(x - 3, 0, 6, tentH + 10)
        }

        // Audience
        const auY = H - 70
        ctx.fillStyle = '#0d0520'
        ctx.fillRect(0, auY, W, 70)
        for (let i = 0; i < 35; i++) {
          const h = rnd(18, 30),
            x = (i * W) / 35 + W / 70,
            rx = rnd(-4, 4)
          ctx.fillStyle = `hsl(${280 + rnd(-20, 20)},20%,${rnd(8, 15)}%)`
          ctx.beginPath()
          ctx.arc(x + rx, auY + 2, 6, Math.PI, 0)
          ctx.fill()
          ctx.fillRect(x - 4 + rx, auY + 2, 8, h)
          ctx.fillStyle = `hsl(${30 + rnd(-10, 10)},50%,${rnd(40, 60)}%)`
          ctx.beginPath()
          ctx.arc(x - 2 + rx, auY - h - 2, 3, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(x + 2 + rx, auY - h - 2, 3, 0, Math.PI * 2)
          ctx.fill()
        }

        // Decorative umbrella
        drawUmbrella(50, 70)
        drawUmbrella(W - 50, 70)

        // Spotlight
        const grd = ctx.createRadialGradient(W / 2, H / 2 - 40, 10, W / 2, H / 2 - 40, 180)
        grd.addColorStop(0, 'rgba(255,255,200,0.04)')
        grd.addColorStop(1, 'rgba(255,255,200,0)')
        ctx.fillStyle = grd
        ctx.fillRect(0, 0, W, H)
      }

      function drawUmbrella(x, y) {
        ctx.strokeStyle = '#8B4513'
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.moveTo(x, y + 25)
        ctx.lineTo(x, y + 5)
        ctx.stroke()
        ctx.fillStyle = '#DC143C'
        ctx.beginPath()
        ctx.arc(x, y - 2, 18, Math.PI, 0)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(x, y - 2, 18, Math.PI * 0.75, Math.PI * 0.25)
        ctx.clip()
        for (let i = 0; i < 6; i++) {
          ctx.fillStyle = i % 2 === 0 ? '#DC143C' : '#FFD700'
          const a = Math.PI + (i * Math.PI) / 5
          ctx.beginPath()
          ctx.arc(x, y - 2, 18, a, a + Math.PI / 5)
          ctx.lineTo(x, y - 2)
          ctx.closePath()
          ctx.fill()
        }
        ctx.fillStyle = '#FFD700'
        ctx.beginPath()
        ctx.arc(x, y - 4, 3, 0, Math.PI * 2)
        ctx.fill()
      }

      function drawRope(ropeY) {
        const osc = Math.sin(time * 1.3) * 3 * rAngle * 30
        ctx.shadowColor = 'rgba(255,255,255,0.2)'
        ctx.shadowBlur = 4
        ctx.strokeStyle = '#fff'
        ctx.lineWidth = 3
        ctx.beginPath()
        ctx.moveTo(10, ropeY + osc * 0.3)
        const cpX = W / 2,
          cpY = ropeY + osc
        ctx.quadraticCurveTo(cpX, cpY, W - 10, ropeY + osc * 0.3)
        ctx.stroke()
        ctx.shadowBlur = 0
        // Rope glow
        ctx.strokeStyle = 'rgba(255,255,255,0.1)'
        ctx.lineWidth = 8
        ctx.beginPath()
        ctx.moveTo(10, ropeY + osc * 0.3)
        ctx.quadraticCurveTo(cpX, cpY, W - 10, ropeY + osc * 0.3)
        ctx.stroke()
      }

      function drawGrizzy(ropeY) {
        const cx = W / 2,
          cy = ropeY + Math.sin(time * 1.3) * 3 * rAngle * 30
        ctx.save()
        ctx.translate(cx, cy)
        ctx.rotate(gTilt)

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.2)'
        ctx.beginPath()
        ctx.ellipse(2, 8, 18, 6, 0, 0, Math.PI * 2)
        ctx.fill()

        // Legs
        ctx.strokeStyle = '#6B3410'
        ctx.lineWidth = 4
        ctx.beginPath()
        ctx.moveTo(-5, 0)
        ctx.lineTo(-7, 12)
        ctx.stroke()
        ctx.beginPath()
        ctx.moveTo(5, 0)
        ctx.lineTo(7, 12)
        ctx.stroke()
        // Feet
        ctx.fillStyle = '#6B3410'
        ctx.beginPath()
        ctx.ellipse(-7, 14, 5, 3, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(7, 14, 5, 3, 0, 0, Math.PI * 2)
        ctx.fill()

        // Tail
        ctx.strokeStyle = '#8B4513'
        ctx.lineWidth = 3
        ctx.beginPath()
        ctx.moveTo(0, 0)
        ctx.quadraticCurveTo(-14, 2, -18, -6)
        ctx.stroke()

        // Body
        const bodyG = ctx.createRadialGradient(0, -14, 2, 0, -14, 16)
        bodyG.addColorStop(0, '#A0522D')
        bodyG.addColorStop(0.6, '#8B4513')
        bodyG.addColorStop(1, '#6B3410')
        ctx.fillStyle = bodyG
        ctx.beginPath()
        ctx.ellipse(0, -15, 14, 18, 0, 0, Math.PI * 2)
        ctx.fill()
        // Belly
        ctx.fillStyle = '#C4956A'
        ctx.beginPath()
        ctx.ellipse(0, -10, 9, 12, 0, 0, Math.PI * 2)
        ctx.fill()

        // Arms extended
        ctx.strokeStyle = '#8B4513'
        ctx.lineWidth = 4
        ctx.beginPath()
        ctx.moveTo(-12, -18)
        ctx.lineTo(-28, -25)
        ctx.stroke()
        ctx.beginPath()
        ctx.moveTo(12, -18)
        ctx.lineTo(28, -25)
        ctx.stroke()
        // Paws
        ctx.fillStyle = '#6B3410'
        ctx.beginPath()
        ctx.arc(-29, -26, 4, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(29, -26, 4, 0, Math.PI * 2)
        ctx.fill()

        // Head
        ctx.fillStyle = '#A0522D'
        ctx.beginPath()
        ctx.arc(0, -32, 12, 0, Math.PI * 2)
        ctx.fill()
        // Dog ears
        ctx.fillStyle = '#6B3410'
        ctx.beginPath()
        ctx.ellipse(-10, -40, 5, 8, -0.3, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(10, -40, 5, 8, 0.3, 0, Math.PI * 2)
        ctx.fill()
        // Inner ears
        ctx.fillStyle = '#C4956A'
        ctx.beginPath()
        ctx.ellipse(-10, -39, 3, 5, -0.3, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(10, -39, 3, 5, 0.3, 0, Math.PI * 2)
        ctx.fill()

        // Face
        ctx.fillStyle = '#000'
        ctx.beginPath()
        ctx.arc(-4, -34, 2, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(4, -34, 2, 0, 0, Math.PI * 2)
        ctx.fill()
        // Nose
        ctx.fillStyle = '#2a1a0a'
        ctx.beginPath()
        ctx.ellipse(0, -30, 2.5, 2, 0, 0, Math.PI * 2)
        ctx.fill()
        // Mouth (happy)
        ctx.strokeStyle = '#2a1a0a'
        ctx.lineWidth = 1.5
        ctx.beginPath()
        ctx.arc(0, -28, 4, 0.2, Math.PI - 0.2)
        ctx.stroke()
        // Tongue
        ctx.fillStyle = '#FF6B8A'
        ctx.beginPath()
        ctx.ellipse(1, -25, 2.5, 3, 0, 0, 0, Math.PI * 2)
        ctx.fill()

        // Clown hat
        ctx.fillStyle = '#DC143C'
        ctx.beginPath()
        ctx.moveTo(-12, -40)
        ctx.lineTo(12, -40)
        ctx.lineTo(0, -60)
        ctx.closePath()
        ctx.fill()
        ctx.fillStyle = '#FFD700'
        ctx.beginPath()
        ctx.moveTo(-12, -40)
        ctx.lineTo(12, -40)
        ctx.lineTo(0, -60)
        ctx.closePath()
        ctx.strokeStyle = '#FFD700'
        ctx.lineWidth = 2
        ctx.stroke()
        // Hat stripes
        ctx.strokeStyle = '#FFD700'
        ctx.lineWidth = 1.5
        for (let i = 1; i < 4; i++) {
          const y = -40 - i * 5
          ctx.beginPath()
          ctx.moveTo(-12 + i * 3, y)
          ctx.lineTo(12 - i * 3, y)
          ctx.stroke()
        }
        // Pom-pom
        ctx.fillStyle = '#fff'
        ctx.beginPath()
        ctx.arc(0, -61, 4, 0, Math.PI * 2)
        ctx.fill()

        // Decorative umbrella on Grizzy (tiny)
        ctx.save()
        ctx.translate(20, -42)
        ctx.rotate(0.3)
        ctx.strokeStyle = '#8B4513'
        ctx.lineWidth = 1
        ctx.beginPath()
        ctx.moveTo(0, 0)
        ctx.lineTo(0, 8)
        ctx.stroke()
        ctx.fillStyle = '#DC143C'
        ctx.beginPath()
        ctx.arc(0, 0, 8, Math.PI, 0)
        ctx.fill()
        ctx.fillStyle = '#FFD700'
        for (let i = 0; i < 4; i++) {
          const a = Math.PI + (i * Math.PI) / 3
          ctx.beginPath()
          ctx.arc(0, 0, 8, a, a + Math.PI / 3)
          ctx.lineTo(0, 0)
          ctx.closePath()
          ctx.fill()
        }
        ctx.restore()

        ctx.restore()
      }

      function drawLems(ropeY) {
        const cy = ropeY + Math.sin(time * 1.3) * 3 * rAngle * 30
        for (const l of lems) {
          const lx = W / 2 + l.x * 80,
            ly = cy - 2
          const sway = Math.sin(time * 2 + l.x * 10) * 2
          ctx.save()
          ctx.translate(lx, ly + sway)
          // Body
          ctx.fillStyle = '#7E8A9E'
          ctx.beginPath()
          ctx.ellipse(0, -4, 9, 10, 0, 0, Math.PI * 2)
          ctx.fill()
          // Head
          ctx.fillStyle = '#8A96A8'
          ctx.beginPath()
          ctx.arc(0, -15, 7, 0, Math.PI * 2)
          ctx.fill()
          // Ears
          ctx.fillStyle = '#7E8A9E'
          ctx.beginPath()
          ctx.ellipse(-6, -20, 3, 4, -0.3, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(6, -20, 3, 4, 0.3, 0, Math.PI * 2)
          ctx.fill()
          // Eyes
          ctx.fillStyle = '#000'
          ctx.beginPath()
          ctx.arc(-2.5, -16, 1.5, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(2.5, -16, 1.5, 0, Math.PI * 2)
          ctx.fill()
          // Nose
          ctx.fillStyle = '#5a6878'
          ctx.beginPath()
          ctx.ellipse(0, -13, 2, 1.2, 0, 0, Math.PI * 2)
          ctx.fill()
          // Arms
          ctx.strokeStyle = '#7E8A9E'
          ctx.lineWidth = 2.5
          ctx.beginPath()
          ctx.moveTo(-8, -7)
          ctx.lineTo(-14, -12)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(8, -7)
          ctx.lineTo(14, -12)
          ctx.stroke()
          ctx.restore()
          // Warning glow
          if (state == 'PLAYING') {
            const d = Math.abs(l.x)
            if (d < 0.3) {
              ctx.fillStyle = `rgba(255,50,50,${(1 - d / 0.3) * 0.3})`
              ctx.beginPath()
              ctx.arc(lx, ly - 5, 20, 0, Math.PI * 2)
              ctx.fill()
            }
          }
        }
      }

      function drawCoins(ropeY) {
        const cy = ropeY + Math.sin(time * 1.3) * 3 * rAngle * 30
        for (const co of coinsA) {
          const lx = W / 2 + co.x * 80,
            ly = cy - 3
          const glow = 0.5 + 0.5 * Math.sin(time * 3 + co.x * 5)
          // Glow
          ctx.fillStyle = `rgba(255,215,0,${glow * 0.2})`
          ctx.beginPath()
          ctx.arc(lx, ly, 12, 0, Math.PI * 2)
          ctx.fill()
          // Coin
          const g = ctx.createRadialGradient(lx - 2, ly - 2, 1, lx, ly, 7)
          g.addColorStop(0, '#FFE44D')
          g.addColorStop(0.5, '#FFD700')
          g.addColorStop(1, '#B8860B')
          ctx.fillStyle = g
          ctx.beginPath()
          ctx.arc(lx, ly, 6, 0, Math.PI * 2)
          ctx.fill()
          // Dollar sign
          ctx.fillStyle = '#B8860B'
          ctx.font = 'bold 7px sans-serif'
          ctx.textAlign = 'center'
          ctx.textBaseline = 'middle'
          ctx.fillText('$', lx, ly + 0.5)
          // Shine
          ctx.fillStyle = `rgba(255,255,255,${glow * 0.5})`
          ctx.beginPath()
          ctx.arc(lx - 2, ly - 3, 2, 0, Math.PI * 2)
          ctx.fill()
        }
      }

      function drawParts() {
        for (const p of parts) {
          ctx.globalAlpha = p.life
          ctx.fillStyle = p.color
          ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz)
        }
        ctx.globalAlpha = 1
      }

      function drawUI() {
        ctx.fillStyle = 'rgba(0,0,0,0.4)'
        ctx.fillRect(0, 0, W, 28)
        ctx.fillStyle = '#FFF'
        ctx.font = 'bold 13px sans-serif'
        ctx.textAlign = 'left'
        ctx.textBaseline = 'top'
        ctx.fillText('🏆 ' + best, 8, 6)
        ctx.textAlign = 'center'
        ctx.fillText(`NIVEL ${lv}/${MAX_LV}`, W / 2, 6)
        ctx.textAlign = 'right'
        ctx.fillText(`💰 ${score}  🪙 ${coins}`, W - 8, 6)
        // Level bar
        ctx.fillStyle = 'rgba(255,255,255,0.15)'
        ctx.fillRect(W / 2 - 40, 22, 80, 4)
        ctx.fillStyle = '#FFD700'
        ctx.fillRect(W / 2 - 40, 22, 80 * (lv / MAX_LV), 4)
        // Combo
        if (combo > 1) {
          ctx.fillStyle = `rgba(255,215,0,${0.5 + 0.5 * Math.sin(time * 5)})`
          ctx.font = 'bold 16px sans-serif'
          ctx.textAlign = 'center'
          ctx.fillText(`🔥 x${combo}`, W / 2, 40)
        }
        // Imbalance indicator
        const imb = gTilt + rAngle
        const bx = W / 2 - 40,
          by = H - 20,
          bw = 80
        ctx.fillStyle = 'rgba(0,0,0,0.4)'
        ctx.fillRect(bx - 2, by - 2, bw + 4, 12)
        const p = clamp((imb + IMB) / (IMB * 2), 0, 1)
        const col = p < 0.3 ? '#44FF44' : p < 0.5 ? '#FFFF44' : '#FF4444'
        ctx.fillStyle = col
        ctx.fillRect(bx, by, bw * p, 8)
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'
        ctx.lineWidth = 1
        ctx.strokeRect(bx, by, bw, 8)
        // Center marker
        ctx.fillStyle = '#fff'
        ctx.fillRect(bx + bw / 2 - 1, by - 1, 2, 10)
      }

      function drawStart() {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'
        ctx.fillRect(0, 0, W, H)
        // Title
        ctx.textAlign = 'center'
        ctx.fillStyle = '#FFD700'
        ctx.font = 'bold 32px sans-serif'
        ctx.textBaseline = 'middle'
        ctx.fillText('🎪 EL PERRITO EQUILIBRISTA 🎪', W / 2, 80)
        ctx.fillStyle = '#FFF'
        ctx.font = '16px sans-serif'
        ctx.fillText('Grizzy & the Lemmings', W / 2, 115)
        // Grizzy preview
        drawGrizzy(H / 2 + 20)
        ctx.fillStyle = '#FFF'
        ctx.font = '14px sans-serif'
        ctx.fillText('🐻 Presiona ESPACIO para empezar', W / 2, 300)
        ctx.fillStyle = 'rgba(255,255,255,0.5)'
        ctx.font = '11px sans-serif'
        ctx.fillText(
          '← → o A/D para inclinarte  |  Esquiva a los Lemmings grises  |  Recoge monedas 🪙',
          W / 2,
          330,
        )
        const blink = 0.5 + 0.5 * Math.sin(time * 3)
        ctx.fillStyle = `rgba(255,255,255,${blink * 0.3})`
        ctx.font = '10px sans-serif'
        ctx.fillText('Mejor puntuación: ' + best, W / 2, 360)
      }

      function drawGO() {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'
        ctx.fillRect(0, 0, W, H)
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillStyle = '#FF4444'
        ctx.font = 'bold 40px sans-serif'
        ctx.fillText('💥 ¡GAME OVER! 💥', W / 2, 100)
        ctx.fillStyle = '#FFD700'
        ctx.font = 'bold 28px sans-serif'
        ctx.fillText(`💰 ${score} puntos`, W / 2, 160)
        ctx.fillStyle = '#FFF'
        ctx.font = '16px sans-serif'
        ctx.fillText(`Nivel alcanzado: ${lv}  |  Monedas: ${coins}`, W / 2, 200)
        if (score > best) {
          ctx.fillStyle = '#FF6B35'
          ctx.font = 'bold 18px sans-serif'
          ctx.fillText('🏆 ¡NUEVO RÉCORD! 🏆', W / 2, 235)
        } else {
          ctx.fillStyle = 'rgba(255,255,255,0.5)'
          ctx.font = '14px sans-serif'
          ctx.fillText('Récord: ' + best, W / 2, 235)
        }
        const blink = 0.5 + 0.5 * Math.sin(time * 3)
        ctx.fillStyle = `rgba(255,255,255,${blink})`
        ctx.font = '16px sans-serif'
        ctx.fillText('Presiona ESPACIO para reiniciar', W / 2, 300)
      }

      function drawFalling(ropeY) {
        const cx = W / 2,
          cy = ropeY + Math.sin(time * 1.3) * 3 * rAngle * 30
        drawGrizzyFall(cx, cy)
      }

      function drawGrizzyFall(cx, cy) {
        ctx.save()
        ctx.translate(cx, cy + fallTimer * 40)
        ctx.rotate(fallTimer * 3)
        ctx.fillStyle = 'rgba(0,0,0,0.3)'
        ctx.beginPath()
        ctx.ellipse(2, 8, 18, 6, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#8B4513'
        ctx.beginPath()
        ctx.ellipse(0, -15, 14, 18, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#A0522D'
        ctx.beginPath()
        ctx.arc(0, -32, 12, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#6B3410'
        ctx.beginPath()
        ctx.ellipse(-10, -40, 5, 8, -0.3, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(10, -40, 5, 8, 0.3, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#DC143C'
        ctx.beginPath()
        ctx.moveTo(-12, -40)
        ctx.lineTo(12, -40)
        ctx.lineTo(0, -60)
        ctx.closePath()
        ctx.fill()
        ctx.fillStyle = '#fff'
        ctx.beginPath()
        ctx.arc(0, -61, 4, 0, Math.PI * 2)
        ctx.fill()
        ctx.strokeStyle = '#8B4513'
        ctx.lineWidth = 4
        ctx.beginPath()
        ctx.moveTo(-12, -18)
        ctx.lineTo(-28, -25)
        ctx.stroke()
        ctx.beginPath()
        ctx.moveTo(12, -18)
        ctx.lineTo(28, -25)
        ctx.stroke()
        ctx.restore()
      }

      function loop(t) {
        const dt = lastTime ? Math.min((t - lastTime) / 1000, 0.05) : 0.016
        lastTime = t
        if (state == 'FALLING') {
          fallTimer += dt
          const rate = 1 + lv * 0.02
          if (Math.random() < rate * 0.4)
            spawnParts(W / 2 + rnd(-30, 30), H / 2 - 30 + rnd(-20, 20), 3, '#FF6B35')
          if (Math.random() < rate * 0.3)
            spawnParts(W / 2 + rnd(-20, 20), H / 2 - 20 + rnd(-20, 20), 2, '#FFD700')
          for (let i = parts.length - 1; i >= 0; i--) {
            const p = parts[i]
            p.x += p.vx
            p.y += p.vy
            p.vy += 0.15
            p.life -= p.decay
            if (p.life <= 0) parts.splice(i, 1)
          }
          if (fallTimer > 0.8) {
            state = 'GAMEOVER'
            playS('over')
            if (score > best) {
              best = score
              localStorage.setItem('grizzy_balance_best', best)
            }
          }
        }
        if (state == 'PLAYING') update(dt)
        draw()
        requestAnimationFrame(loop)
      }

      function reset() {
        score = 0
        lv = 1
        coins = 0
        time = 0
        gTilt = 0
        rAngle = 0
        wind = 0
        windT = 0
        shake = 0
        flash = 0
        combo = 0
        dist = 0
        fallTimer = 0
        lems = []
        coinsA = []
        parts = []
      }

      document.addEventListener('keydown', (e) => {
        keys[e.code] = true
        if (e.code == 'Space') {
          e.preventDefault()
          initAudio()
          if (state == 'START' || state == 'GAMEOVER') {
            reset()
            state = 'PLAYING'
          }
        }
      })
      document.addEventListener('keyup', (e) => {
        keys[e.code] = false
      })

      // Touch controls
      let tx = 0
      c.addEventListener(
        'touchstart',
        (e) => {
          e.preventDefault()
          initAudio()
          const t = e.touches[0]
          tx = t.clientX
          if (state == 'START' || state == 'GAMEOVER') {
            reset()
            state = 'PLAYING'
          }
        },
        { passive: false },
      )
      c.addEventListener(
        'touchmove',
        (e) => {
          e.preventDefault()
          const t = e.touches[0],
            dx = t.clientX - tx
          if (state == 'PLAYING') {
            if (dx < -5) {
              keys['ArrowLeft'] = true
              keys['ArrowRight'] = false
            } else if (dx > 5) {
              keys['ArrowRight'] = true
              keys['ArrowLeft'] = false
            }
          }
          tx = t.clientX
        },
        { passive: false },
      )
      c.addEventListener('touchend', (e) => {
        keys['ArrowLeft'] = false
        keys['ArrowRight'] = false
      })

      resize()
      reset()
      requestAnimationFrame(loop)
    </script>
  </body>
</html>
