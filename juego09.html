<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Salva al Pollito - Grizzy & the Lemmings</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #2c1810;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: 'Segoe UI', Arial, sans-serif;
        touch-action: none;
      }
      #gameContainer {
        position: relative;
        width: 100%;
        max-width: 400px;
        height: 100vh;
        max-height: 600px;
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(139, 94, 60, 0.5);
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: pointer;
      }
      @media (max-width: 420px) {
        #gameContainer {
          border-radius: 0;
          max-width: 100%;
        }
      }
      @media (min-aspect-ratio: 400/600) {
        #gameContainer {
          height: 100vh;
          max-height: 100vh;
        }
      }
    </style>

    <script src="js/audio.js"></script>
    <script src="js/save.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/grizzy.js"></script>
    <script src="js/back.js"></script>
  </head>
  <body>
    <div id="gameContainer">
      <canvas id="gameCanvas"></canvas>
    </div>
    <script>
      const canvas = document.getElementById('gameCanvas')
      const ctx = canvas.getContext('2d')

      const W = 400,
        H = 600
      canvas.width = W
      canvas.height = H

      function resizeCanvas() {
        const container = document.getElementById('gameContainer')
        const rect = container.getBoundingClientRect()
        canvas.style.width = rect.width + 'px'
        canvas.style.height = rect.height + 'px'
      }
      window.addEventListener('resize', resizeCanvas)
      resizeCanvas()

      const STORAGE_KEY = 'grizzy_savebaby_best'

      let game = {
        state: 'MENU',
        score: 0,
        best: parseInt(localStorage.getItem(STORAGE_KEY)) || 0,
        speed: 0,
        baseSpeed: 2,
        combo: 0,
      }

      let keys = { left: false, right: false }

      const player = {
        x: 200,
        y: 545,
        w: 90,
        h: 40,
        speed: 5,
      }

      const baby = {
        x: 200,
        y: 50,
        r: 14,
        vx: 0,
        vy: 2,
        grounded: false,
        bouncing: false,
        wobble: 0,
      }

      let stars = []
      let particles = []
      let clouds = []
      let honeyDrops = []
      let starGlowParticles = []
      let screenShake = 0
      let frameCount = 0

      function initClouds() {
        clouds = []
        for (let i = 0; i < 6; i++) {
          clouds.push({
            x: Math.random() * (W + 100) - 50,
            y: 20 + Math.random() * 180,
            w: 60 + Math.random() * 80,
            speed: 0.2 + Math.random() * 0.3,
            opacity: 0.5 + Math.random() * 0.4,
          })
        }
      }

      function initHoneyDrops() {
        honeyDrops = []
        for (let i = 0; i < 8; i++) {
          honeyDrops.push({
            x: 20 + Math.random() * (W - 40),
            y: 120 + Math.random() * 300,
            r: 3 + Math.random() * 4,
            speed: 0.3 + Math.random() * 0.5,
            offset: Math.random() * Math.PI * 2,
          })
        }
      }

      function resetGame() {
        game.score = 0
        game.speed = 0
        game.combo = 0
        game.state = 'PLAYING'
        baby.x = 200
        baby.y = 50
        baby.vy = game.baseSpeed
        baby.vx = (Math.random() - 0.5) * 1.5
        baby.grounded = false
        baby.bouncing = false
        player.x = 200
        stars = []
        particles = []
        starGlowParticles = []
        screenShake = 0
        frameCount = 0
      }

      function spawnStar() {
        stars.push({
          x: 30 + Math.random() * (W - 60),
          y: 40 + Math.random() * 300,
          r: 10,
          glow: 0,
          pulse: Math.random() * Math.PI * 2,
          collected: false,
        })
      }

      function spawnBounceParticles(x, y) {
        for (let i = 0; i < 12; i++) {
          const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI
          const speed = 1 + Math.random() * 3
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.015 + Math.random() * 0.025,
            r: 2 + Math.random() * 3,
            color: ['#FFD54F', '#FFE082', '#FFAB40', '#FFB300'][Math.floor(Math.random() * 4)],
          })
        }
      }

      function spawnStarCollectParticles(x, y) {
        for (let i = 0; i < 20; i++) {
          const angle = Math.random() * Math.PI * 2
          const speed = 1 + Math.random() * 4
          starGlowParticles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.01 + Math.random() * 0.02,
            r: 2 + Math.random() * 4,
            color: ['#FFC107', '#FFD54F', '#FFF176', '#FFE082'][Math.floor(Math.random() * 4)],
          })
        }
      }

      function spawnDeathParticles(x, y) {
        for (let i = 0; i < 8; i++) {
          particles.push({
            x: baby.x,
            y: baby.y,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4 - 2,
            life: 1,
            decay: 0.02 + Math.random() * 0.02,
            r: 3 + Math.random() * 4,
            color: '#EF5350',
          })
        }
      }

      function playBounceSound() {
        try {
          const actx = new (window.AudioContext || window.webkitAudioContext)()
          const osc = actx.createOscillator()
          const gain = actx.createGain()
          osc.connect(gain)
          gain.connect(actx.destination)
          osc.type = 'sine'
          osc.frequency.setValueAtTime(600, actx.currentTime)
          osc.frequency.exponentialRampToValueAtTime(1200, actx.currentTime + 0.08)
          gain.gain.setValueAtTime(0.15, actx.currentTime)
          gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.15)
          osc.start()
          osc.stop(actx.currentTime + 0.15)
        } catch (e) {}
      }

      function playStarSound() {
        try {
          const actx = new (window.AudioContext || window.webkitAudioContext)()
          const notes = [880, 1108, 1318]
          notes.forEach((freq, i) => {
            const osc = actx.createOscillator()
            const gain = actx.createGain()
            osc.connect(gain)
            gain.connect(actx.destination)
            osc.type = 'sine'
            osc.frequency.setValueAtTime(freq, actx.currentTime + i * 0.07)
            gain.gain.setValueAtTime(0.12, actx.currentTime + i * 0.07)
            gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + i * 0.07 + 0.12)
            osc.start(actx.currentTime + i * 0.07)
            osc.stop(actx.currentTime + i * 0.07 + 0.12)
          })
        } catch (e) {}
      }

      function playGameOverSound() {
        try {
          const actx = new (window.AudioContext || window.webkitAudioContext)()
          const notes = [400, 350, 300, 200]
          notes.forEach((freq, i) => {
            const osc = actx.createOscillator()
            const gain = actx.createGain()
            osc.connect(gain)
            gain.connect(actx.destination)
            osc.type = 'sawtooth'
            osc.frequency.setValueAtTime(freq, actx.currentTime + i * 0.15)
            gain.gain.setValueAtTime(0.1, actx.currentTime + i * 0.15)
            gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + i * 0.15 + 0.2)
            osc.start(actx.currentTime + i * 0.15)
            osc.stop(actx.currentTime + i * 0.15 + 0.2)
          })
        } catch (e) {}
      }

      function drawCloud(c) {
        ctx.save()
        ctx.globalAlpha = c.opacity
        ctx.fillStyle = '#fff'
        const cx = c.x,
          cy = c.y,
          w = c.w
        ctx.beginPath()
        ctx.arc(cx, cy, w * 0.25, 0, Math.PI * 2)
        ctx.arc(cx - w * 0.2, cy + w * 0.08, w * 0.2, 0, Math.PI * 2)
        ctx.arc(cx + w * 0.2, cy + w * 0.05, w * 0.22, 0, Math.PI * 2)
        ctx.arc(cx + w * 0.35, cy - w * 0.02, w * 0.17, 0, Math.PI * 2)
        ctx.arc(cx - w * 0.3, cy + w * 0.02, w * 0.17, 0, Math.PI * 2)
        ctx.fill()
        ctx.restore()
      }

      function drawHoneyDrop(h) {
        const pulse = Math.sin(frameCount * 0.02 + h.offset) * 0.3
        ctx.save()
        ctx.globalAlpha = 0.4
        ctx.fillStyle = '#FFB300'
        ctx.beginPath()
        ctx.ellipse(h.x, h.y + pulse, h.r, h.r * 1.3, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#FFD54F'
        ctx.globalAlpha = 0.2
        ctx.beginPath()
        ctx.ellipse(h.x - 1, h.y + pulse - 2, h.r * 0.5, h.r * 0.4, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.restore()
      }

      function drawGrizzy() {
        const px = player.x - player.w / 2
        const py = player.y - 10

        // body
        ctx.fillStyle = '#8B5E3C'
        ctx.beginPath()
        ctx.ellipse(player.x, py + 5, 28, 22, 0, 0, Math.PI * 2)
        ctx.fill()

        // head
        ctx.fillStyle = '#8B5E3C'
        ctx.beginPath()
        ctx.arc(player.x, py - 14, 18, 0, Math.PI * 2)
        ctx.fill()

        // ears
        ctx.fillStyle = '#7A4F30'
        ctx.beginPath()
        ctx.arc(player.x - 14, py - 26, 7, 0, Math.PI * 2)
        ctx.arc(player.x + 14, py - 26, 7, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#B5805A'
        ctx.beginPath()
        ctx.arc(player.x - 14, py - 26, 4, 0, Math.PI * 2)
        ctx.arc(player.x + 14, py - 26, 4, 0, Math.PI * 2)
        ctx.fill()

        // eyes
        ctx.fillStyle = '#fff'
        ctx.beginPath()
        ctx.arc(player.x - 6, py - 16, 4.5, 0, Math.PI * 2)
        ctx.arc(player.x + 6, py - 16, 4.5, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#333'
        ctx.beginPath()
        ctx.arc(player.x - 5, py - 15, 2.5, 0, Math.PI * 2)
        ctx.arc(player.x + 7, py - 15, 2.5, 0, Math.PI * 2)
        ctx.fill()

        // nose
        ctx.fillStyle = '#5D3A1A'
        ctx.beginPath()
        ctx.ellipse(player.x, py - 11, 4, 3, 0, 0, Math.PI * 2)
        ctx.fill()

        // smile
        ctx.strokeStyle = '#5D3A1A'
        ctx.lineWidth = 1.5
        ctx.beginPath()
        ctx.arc(player.x, py - 10, 5, 0.1, Math.PI - 0.1)
        ctx.stroke()

        // arms
        ctx.fillStyle = '#8B5E3C'
        ctx.save()
        ctx.translate(player.x - 30, py + 2)
        ctx.rotate(-0.4)
        ctx.fillRect(-4, -3, 8, 18)
        ctx.restore()
        ctx.save()
        ctx.translate(player.x + 30, py + 2)
        ctx.rotate(0.4)
        ctx.fillRect(-4, -3, 8, 18)
        ctx.restore()

        // basket
        ctx.fillStyle = '#A67C52'
        ctx.beginPath()
        ctx.moveTo(px - 6, py + 12)
        ctx.lineTo(px - 2, py + 24)
        ctx.lineTo(px + player.w + 2, py + 24)
        ctx.lineTo(px + player.w + 6, py + 12)
        ctx.closePath()
        ctx.fill()
        ctx.strokeStyle = '#8B6B3E'
        ctx.lineWidth = 2
        ctx.stroke()

        // basket weave lines
        ctx.strokeStyle = '#8B6B3E'
        ctx.lineWidth = 1
        for (let i = 0; i < 5; i++) {
          const lx = px + 10 + (i * (player.w - 20)) / 4
          ctx.beginPath()
          ctx.moveTo(lx, py + 14)
          ctx.lineTo(lx, py + 22)
          ctx.stroke()
        }
        ctx.beginPath()
        ctx.moveTo(px + 4, py + 17)
        ctx.lineTo(px + player.w - 4, py + 17)
        ctx.stroke()

        // basket rim
        ctx.fillStyle = '#C4945A'
        ctx.fillRect(px - 4, py + 10, player.w + 8, 5)
        ctx.fillStyle = '#A67C52'
        ctx.fillRect(px - 2, py + 11, player.w + 4, 3)
      }

      function drawBabyLemming() {
        const bx = baby.x
        const by = baby.y
        const bounce = baby.bouncing ? Math.sin(frameCount * 0.3) * 2 : 0

        ctx.save()
        ctx.translate(bx, by - bounce)

        // body
        ctx.fillStyle = '#B0BEC5'
        ctx.beginPath()
        ctx.ellipse(0, 0, baby.r, baby.r * 1.1, 0, 0, Math.PI * 2)
        ctx.fill()

        // belly
        ctx.fillStyle = '#CFD8DC'
        ctx.beginPath()
        ctx.ellipse(0, 2, baby.r * 0.6, baby.r * 0.7, 0, 0, Math.PI * 2)
        ctx.fill()

        // head
        ctx.fillStyle = '#B0BEC5'
        ctx.beginPath()
        ctx.arc(0, -baby.r * 0.8, baby.r * 0.75, 0, Math.PI * 2)
        ctx.fill()

        // ears
        ctx.fillStyle = '#90A4AE'
        ctx.beginPath()
        ctx.arc(-baby.r * 0.55, -baby.r * 1.2, baby.r * 0.3, 0, Math.PI * 2)
        ctx.arc(baby.r * 0.55, -baby.r * 1.2, baby.r * 0.3, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#B0BEC5'
        ctx.beginPath()
        ctx.arc(-baby.r * 0.55, -baby.r * 1.2, baby.r * 0.2, 0, Math.PI * 2)
        ctx.arc(baby.r * 0.55, -baby.r * 1.2, baby.r * 0.2, 0, Math.PI * 2)
        ctx.fill()

        // eyes (big)
        ctx.fillStyle = '#fff'
        ctx.beginPath()
        ctx.arc(-baby.r * 0.3, -baby.r * 0.8, baby.r * 0.35, 0, Math.PI * 2)
        ctx.arc(baby.r * 0.3, -baby.r * 0.8, baby.r * 0.35, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#333'
        ctx.beginPath()
        ctx.arc(-baby.r * 0.25, -baby.r * 0.75, baby.r * 0.2, 0, Math.PI * 2)
        ctx.arc(baby.r * 0.35, -baby.r * 0.75, baby.r * 0.2, 0, Math.PI * 2)
        ctx.fill()

        // eye shine
        ctx.fillStyle = '#fff'
        ctx.beginPath()
        ctx.arc(-baby.r * 0.15, -baby.r * 0.85, baby.r * 0.1, 0, Math.PI * 2)
        ctx.arc(baby.r * 0.45, -baby.r * 0.85, baby.r * 0.1, 0, Math.PI * 2)
        ctx.fill()

        // nose
        ctx.fillStyle = '#90A4AE'
        ctx.beginPath()
        ctx.ellipse(0, -baby.r * 0.55, baby.r * 0.15, baby.r * 0.1, 0, 0, Math.PI * 2)
        ctx.fill()

        // smile
        ctx.strokeStyle = '#78909C'
        ctx.lineWidth = 1.2
        ctx.beginPath()
        ctx.arc(0, -baby.r * 0.45, baby.r * 0.25, 0.15, Math.PI - 0.15)
        ctx.stroke()

        // tiny arms
        ctx.fillStyle = '#B0BEC5'
        ctx.save()
        ctx.translate(-baby.r * 0.7, -baby.r * 0.2)
        ctx.rotate(-0.3 + Math.sin(frameCount * 0.08) * 0.2)
        ctx.fillRect(-2, 0, 4, baby.r * 0.4)
        ctx.restore()
        ctx.save()
        ctx.translate(baby.r * 0.7, -baby.r * 0.2)
        ctx.rotate(0.3 + Math.sin(frameCount * 0.08 + 1) * 0.2)
        ctx.fillRect(-2, 0, 4, baby.r * 0.4)
        ctx.restore()

        // tail
        ctx.fillStyle = '#90A4AE'
        ctx.beginPath()
        ctx.arc(0, baby.r * 0.45, baby.r * 0.25, 0, Math.PI * 2)
        ctx.fill()

        ctx.restore()
      }

      function drawStar(s) {
        const cx = s.x,
          cy = s.y,
          r = s.r
        const pulse = Math.sin(frameCount * 0.05 + s.pulse) * 2
        const glow = 8 + Math.sin(frameCount * 0.04 + s.pulse) * 4

        ctx.save()
        // glow
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r + glow)
        grad.addColorStop(0, 'rgba(255,193,7,0.3)')
        grad.addColorStop(1, 'rgba(255,193,7,0)')
        ctx.fillStyle = grad
        ctx.beginPath()
        ctx.arc(cx, cy, r + glow, 0, Math.PI * 2)
        ctx.fill()

        // star shape
        ctx.fillStyle = '#FFC107'
        ctx.shadowColor = '#FFC107'
        ctx.shadowBlur = 10
        ctx.beginPath()
        for (let i = 0; i < 10; i++) {
          const angle = (i * Math.PI * 2) / 10 - Math.PI / 2
          const rad = i % 2 === 0 ? r + pulse : r * 0.45
          const px = cx + Math.cos(angle) * rad
          const py = cy + Math.sin(angle) * rad
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py)
        }
        ctx.closePath()
        ctx.fill()
        ctx.shadowBlur = 0

        // center shine
        ctx.fillStyle = '#FFF9C4'
        ctx.beginPath()
        ctx.arc(cx - r * 0.15, cy - r * 0.15, r * 0.2, 0, Math.PI * 2)
        ctx.fill()

        ctx.restore()
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.save()
          ctx.globalAlpha = p.life
          ctx.fillStyle = p.color
          ctx.beginPath()
          ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2)
          ctx.fill()
          ctx.restore()
        }
        for (const p of starGlowParticles) {
          ctx.save()
          ctx.globalAlpha = p.life
          ctx.fillStyle = p.color
          ctx.shadowColor = p.color
          ctx.shadowBlur = 8
          ctx.beginPath()
          ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2)
          ctx.fill()
          ctx.shadowBlur = 0
          ctx.restore()
        }
      }

      function drawBackground() {
        // sky gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H)
        skyGrad.addColorStop(0, '#5BA3D9')
        skyGrad.addColorStop(0.5, '#87CEEB')
        skyGrad.addColorStop(0.85, '#B3E5FC')
        skyGrad.addColorStop(1, '#81C784')
        ctx.fillStyle = skyGrad
        ctx.fillRect(0, 0, W, H)

        // ground
        ctx.fillStyle = '#4CAF50'
        ctx.fillRect(0, H - 50, W, 50)
        ctx.fillStyle = '#388E3C'
        ctx.fillRect(0, H - 50, W, 4)

        // grass blades
        ctx.strokeStyle = '#66BB6A'
        ctx.lineWidth = 2
        for (let i = 0; i < 30; i++) {
          const gx = 10 + i * 14
          const gy = H - 50
          ctx.beginPath()
          ctx.moveTo(gx, gy)
          ctx.lineTo(gx - 3 + Math.sin(i) * 2, gy - 6 - Math.random() * 4)
          ctx.stroke()
        }

        // clouds
        for (const c of clouds) drawCloud(c)

        // honey drops
        for (const h of honeyDrops) drawHoneyDrop(h)
      }

      function drawHUD() {
        ctx.save()

        // score
        ctx.fillStyle = 'rgba(0,0,0,0.4)'
        ctx.beginPath()
        ctx.roundRect(10, 10, 140, 36, 8)
        ctx.fill()

        ctx.fillStyle = '#FFD54F'
        ctx.font = 'bold 18px Arial'
        ctx.textAlign = 'left'
        ctx.textBaseline = 'middle'
        ctx.fillText('⭐ ' + game.score, 22, 28)

        // best
        ctx.fillStyle = 'rgba(0,0,0,0.4)'
        ctx.beginPath()
        ctx.roundRect(W - 125, 10, 115, 36, 8)
        ctx.fill()

        ctx.fillStyle = '#FFE0B2'
        ctx.font = '12px Arial'
        ctx.textAlign = 'right'
        ctx.fillText('🏆 ' + game.best, W - 18, 28)

        // speed indicator
        ctx.fillStyle = 'rgba(0,0,0,0.3)'
        ctx.beginPath()
        ctx.roundRect(10, 52, 90, 20, 6)
        ctx.fill()
        ctx.fillStyle = '#FFCC80'
        ctx.font = '11px Arial'
        ctx.textAlign = 'left'
        ctx.fillText('⚡ Nivel ' + Math.floor(game.speed / 1.5 + 1), 16, 66)

        ctx.restore()
      }

      function drawMenu() {
        drawBackground()
        ctx.save()

        // title box
        ctx.fillStyle = 'rgba(0,0,0,0.5)'
        ctx.beginPath()
        ctx.roundRect(30, 80, 340, 90, 16)
        ctx.fill()

        ctx.fillStyle = '#FFD54F'
        ctx.font = 'bold 28px Arial'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText('🐻 Salva al Bebé 🐭', 200, 115)

        ctx.fillStyle = '#FFCC80'
        ctx.font = '16px Arial'
        ctx.fillText('Grizzy & the Lemmings', 200, 148)

        // Grizzy preview
        player.x = 200
        drawGrizzy()

        // baby falling preview
        const t = frameCount * 0.02
        baby.y = 250 + Math.sin(t) * 80
        baby.x = 200 + Math.sin(t * 0.7) * 50
        drawBabyLemming()

        // stars decoration
        ctx.fillStyle = '#FFC107'
        for (let i = 0; i < 5; i++) {
          const sx = 60 + i * 80
          const sy = 350 + Math.sin(frameCount * 0.03 + i) * 10
          const sr = 6 + Math.sin(frameCount * 0.05 + i) * 2
          ctx.beginPath()
          for (let j = 0; j < 10; j++) {
            const a = (j * Math.PI * 2) / 10 - Math.PI / 2
            const r2 = j % 2 === 0 ? sr : sr * 0.45
            j === 0
              ? ctx.moveTo(sx + Math.cos(a) * r2, sy + Math.sin(a) * r2)
              : ctx.lineTo(sx + Math.cos(a) * r2, sy + Math.sin(a) * r2)
          }
          ctx.closePath()
          ctx.fill()
        }

        // instructions
        ctx.fillStyle = 'rgba(0,0,0,0.45)'
        ctx.beginPath()
        ctx.roundRect(50, 390, 300, 100, 12)
        ctx.fill()

        ctx.fillStyle = '#fff'
        ctx.font = '14px Arial'
        ctx.textAlign = 'center'
        ctx.fillText('⬅️  ➡️  o  A / D  para mover la cesta', 200, 420)
        ctx.fillText('¡Atrapa al bebé Lemming y no dejes', 200, 444)
        ctx.fillText('que toque el suelo!', 200, 464)
        ctx.fillStyle = '#FFD54F'
        ctx.font = 'bold 14px Arial'
        ctx.fillText('⭐ Estrellas doradas: +20 puntos', 200, 486)

        // start prompt
        ctx.fillStyle = 'rgba(255,193,7,0.15)'
        ctx.beginPath()
        ctx.roundRect(100, 520, 200, 50, 25)
        ctx.fill()
        ctx.strokeStyle = '#FFD54F'
        ctx.lineWidth = 2
        ctx.stroke()

        const blink = Math.sin(frameCount * 0.06) > 0
        if (blink) {
          ctx.fillStyle = '#FFD54F'
          ctx.font = 'bold 18px Arial'
          ctx.fillText('🖱️  TOCA PARA JUGAR', 200, 548)
        }

        ctx.restore()
      }

      function drawGameOver() {
        ctx.save()

        ctx.fillStyle = 'rgba(0,0,0,0.6)'
        ctx.fillRect(0, 0, W, H)

        ctx.fillStyle = 'rgba(0,0,0,0.7)'
        ctx.beginPath()
        ctx.roundRect(40, 120, 320, 300, 16)
        ctx.fill()

        ctx.fillStyle = '#EF5350'
        ctx.font = 'bold 36px Arial'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText('GAME OVER', 200, 170)

        ctx.fillStyle = '#FFD54F'
        ctx.font = 'bold 22px Arial'
        ctx.fillText('🐭 ¡Se cayó el bebé!', 200, 218)

        ctx.fillStyle = '#fff'
        ctx.font = '18px Arial'
        ctx.fillText('Puntuación: ' + game.score, 200, 266)

        ctx.fillStyle = '#FFE0B2'
        ctx.font = '16px Arial'
        ctx.fillText('🏆 Mejor: ' + game.best, 200, 302)

        if (game.score === game.best && game.score > 0) {
          ctx.fillStyle = '#FFD54F'
          ctx.font = 'bold 16px Arial'
          ctx.fillText('🎉 ¡NUEVO RÉCORD! 🎉', 200, 340)
        }

        // play again button
        const bx = 100,
          by = 370,
          bw = 200,
          bh = 46
        ctx.fillStyle = '#FFC107'
        ctx.beginPath()
        ctx.roundRect(bx, by, bw, bh, 23)
        ctx.fill()

        const blink = Math.sin(frameCount * 0.06) > 0
        if (blink) {
          ctx.fillStyle = '#5D4037'
          ctx.font = 'bold 18px Arial'
          ctx.fillText('🖱️ JUGAR DE NUEVO', 200, 393)
        }

        ctx.restore()
      }

      function update() {
        frameCount++

        if (game.state === 'MENU' || game.state === 'GAME_OVER') return

        // move player
        if (keys.left) player.x -= player.speed
        if (keys.right) player.x += player.speed
        player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x))

        // update baby
        baby.vy += 0.05 + game.speed * 0.003
        if (baby.vy > 8) baby.vy = 8
        baby.x += baby.vx
        baby.y += baby.vy

        // bounce off walls
        if (baby.x - baby.r < 0) {
          baby.x = baby.r
          baby.vx = Math.abs(baby.vx)
        }
        if (baby.x + baby.r > W) {
          baby.x = W - baby.r
          baby.vx = -Math.abs(baby.vx)
        }

        // bounce on player basket
        const px = player.x - player.w / 2
        const py = player.y - 10 + 12
        const bx = baby.x,
          by = baby.y

        if (
          baby.vy > 0 &&
          bx > px - 4 &&
          bx < px + player.w + 4 &&
          by + baby.r >= py &&
          by + baby.r <= py + 16
        ) {
          baby.y = py - baby.r
          baby.vy = -(3 + game.speed * 0.15)
          if (baby.vy < -6) baby.vy = -6
          baby.vx += (bx - player.x) * 0.02
          if (baby.vx > 2) baby.vx = 2
          if (baby.vx < -2) baby.vx = -2
          baby.bouncing = true
          game.score += 10
          game.speed += 0.02
          spawnBounceParticles(bx, py)
          playBounceSound()
        } else {
          baby.bouncing = false
        }

        // game over
        if (baby.y + baby.r > H - 50) {
          baby.y = H - 50 - baby.r
          spawnDeathParticles(baby.x, baby.y)
          game.state = 'GAME_OVER'
          if (game.score > game.best) {
            game.best = game.score
            localStorage.setItem(STORAGE_KEY, game.best)
          }
          playGameOverSound()
          screenShake = 10
          return
        }

        // top boundary
        if (baby.y - baby.r < 0) {
          baby.y = baby.r
          baby.vy = Math.abs(baby.vy)
        }

        // stars
        if (frameCount % 180 === 0 && stars.length < 4) {
          spawnStar()
        }

        for (let i = stars.length - 1; i >= 0; i--) {
          const s = stars[i]
          if (s.collected) {
            stars.splice(i, 1)
            continue
          }
          const dx = baby.x - s.x
          const dy = baby.y - s.y
          const dist = Math.sqrt(dx * dx + dy * dy)
          if (dist < baby.r + s.r + 4) {
            s.collected = true
            game.score += 20
            spawnStarCollectParticles(s.x, s.y)
            playStarSound()
            stars.splice(i, 1)
          }
        }

        // clouds
        for (const c of clouds) {
          c.x += c.speed
          if (c.x > W + 60) {
            c.x = -c.w
            c.y = 20 + Math.random() * 180
          }
        }

        // particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i]
          p.x += p.vx
          p.y += p.vy
          p.vy += 0.05
          p.life -= p.decay
          if (p.life <= 0) particles.splice(i, 1)
        }

        for (let i = starGlowParticles.length - 1; i >= 0; i--) {
          const p = starGlowParticles[i]
          p.x += p.vx
          p.y += p.vy
          p.vy += 0.02
          p.vx *= 0.98
          p.life -= p.decay
          if (p.life <= 0) starGlowParticles.splice(i, 1)
        }

        if (screenShake > 0) screenShake -= 0.5
      }

      function draw() {
        ctx.save()

        // screen shake
        if (screenShake > 0) {
          const shakeX = (Math.random() - 0.5) * screenShake * 0.8
          const shakeY = (Math.random() - 0.5) * screenShake * 0.8
          ctx.translate(shakeX, shakeY)
        }

        if (game.state === 'MENU') {
          drawMenu()
          ctx.restore()
          return
        }

        drawBackground()

        if (game.state === 'PLAYING') {
          drawGrizzy()
          drawBabyLemming()
          for (const s of stars) drawStar(s)
          drawParticles()
          drawHUD()
        }

        if (game.state === 'GAME_OVER') {
          drawBackground()
          drawGrizzy()
          drawParticles()
          drawHUD()
          drawGameOver()
        }

        ctx.restore()
      }

      function gameLoop() {
        update()
        draw()
        requestAnimationFrame(gameLoop)
      }

      // input handling
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
          keys.left = true
          e.preventDefault()
        }
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
          keys.right = true
          e.preventDefault()
        }
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault()
          if (game.state === 'MENU') resetGame()
          else if (game.state === 'GAME_OVER') resetGame()
        }
      })

      document.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
          keys.left = false
          e.preventDefault()
        }
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
          keys.right = false
          e.preventDefault()
        }
      })

      // touch / click
      canvas.addEventListener('click', (e) => {
        if (game.state === 'MENU') {
          resetGame()
          return
        }
        if (game.state === 'GAME_OVER') {
          const bx = 100,
            by = 370,
            bw = 200,
            bh = 46
          if (e.offsetX !== undefined) {
            const rect = canvas.getBoundingClientRect()
            const scaleX = canvas.width / rect.width
            const scaleY = canvas.height / rect.height
            const mx = (e.clientX - rect.left) * scaleX
            const my = (e.clientY - rect.top) * scaleY
            if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) {
              resetGame()
            }
          }
        }
      })

      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault()
        const touch = e.touches[0]
        const rect = canvas.getBoundingClientRect()
        const scaleX = canvas.width / rect.width
        const scaleY = canvas.height / rect.height
        const mx = (touch.clientX - rect.left) * scaleX
        const my = (touch.clientY - rect.top) * scaleY

        if (game.state === 'MENU') {
          resetGame()
          return
        }
        if (game.state === 'GAME_OVER') {
          const bx = 100,
            by = 370,
            bw = 200,
            bh = 46
          if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) {
            resetGame()
          }
          return
        }

        // left/right touch zones
        if (mx < W / 2) keys.left = true
        else keys.right = true
      })

      canvas.addEventListener('touchmove', (e) => {
        e.preventDefault()
        const touch = e.touches[0]
        const rect = canvas.getBoundingClientRect()
        const scaleX = canvas.width / rect.width
        const scaleY = canvas.height / rect.height
        const mx = (touch.clientX - rect.left) * scaleX

        if (game.state !== 'PLAYING') return
        keys.left = mx < W / 2
        keys.right = mx >= W / 2
      })

      canvas.addEventListener('touchend', (e) => {
        e.preventDefault()
        keys.left = false
        keys.right = false
      })

      // polyfill roundRect if needed
      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
          if (r > w / 2) r = w / 2
          if (r > h / 2) r = h / 2
          this.moveTo(x + r, y)
          this.lineTo(x + w - r, y)
          this.quadraticCurveTo(x + w, y, x + w, y + r)
          this.lineTo(x + w, y + h - r)
          this.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
          this.lineTo(x + r, y + h)
          this.quadraticCurveTo(x, y + h, x, y + h - r)
          this.lineTo(x, y + r)
          this.quadraticCurveTo(x, y, x + r, y)
        }
      }

      initClouds()
      initHoneyDrops()
      gameLoop()
    </script>
  </body>
</html>
