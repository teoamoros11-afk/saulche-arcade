<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>El Conejo Saltón</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #2d1b0e;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', 'Comic Sans MS', sans-serif;
        color: #fff8e1;
      }
      #wrap {
        position: relative;
        width: min(100vw, calc(100vh * 0.667));
        height: min(100vh, calc(100vw / 0.667));
        overflow: hidden;
      }
      canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        border: 2px solid #ff9800;
        border-radius: 8px;
      }
      #hud {
        position: absolute;
        top: 4px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        font-size: clamp(10px, 1.3vmin, 16px);
        z-index: 10;
        pointer-events: none;
      }
      #hud span {
        background: rgba(45, 27, 14, 0.85);
        padding: 2px 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 152, 0, 0.3);
        backdrop-filter: blur(4px);
        white-space: nowrap;
      }
      #msg {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 20;
        pointer-events: none;
        width: 80%;
      }
      #msg h2 {
        font-size: clamp(1.3rem, 3.5vmin, 2.5rem);
        color: #ffc107;
        text-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
      }
      #msg p {
        font-size: clamp(0.7rem, 1.8vmin, 1.1rem);
        color: #fff8e1;
        margin-top: 6px;
        opacity: 0.8;
      }
      #msg .sub {
        font-size: clamp(0.55rem, 1.3vmin, 0.85rem);
        color: #b0bec5;
        margin-top: 3px;
      }
      #btns {
        position: absolute;
        bottom: 4px;
        right: 8px;
        z-index: 10;
        display: flex;
        gap: 6px;
      }
      .btn {
        padding: 3px 12px;
        font-size: clamp(9px, 1.1vmin, 12px);
        border: none;
        border-radius: 8px;
        background: rgba(139, 94, 60, 0.8);
        color: #fff8e1;
        cursor: pointer;
        font-weight: bold;
        border: 1px solid rgba(255, 152, 0, 0.3);
        backdrop-filter: blur(4px);
        text-decoration: none;
        display: inline-block;
      }
      .btn:hover {
        background: rgba(255, 152, 0, 0.6);
      }
    </style>
    <script src="js/audio.js"></script>
    <script src="js/save.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/grizzy.js"></script>
    <script src="js/back.js"></script>
  </head>
  <body>
    <div id="wrap">
      <canvas id="c"></canvas>
      <div id="hud">
        <span>🥕 <span id="sc">0</span></span>
        <span>🏆 <span id="best">0</span></span>
        <span>Nv <span id="lvl">1</span>/40</span>
      </div>
      <div id="msg">
        <h2 id="msgTitle">🐰 El Conejo Saltón</h2>
        <p id="msgSub">Presiona ESPACIO o toca para empezar</p>
        <p class="sub">Usa ← → o A D para elegir dirección</p>
      </div>
      <div id="btns">
        <button class="btn" id="rb">🔄</button>
        <a href="index.html" class="btn">←</a>
      </div>
    </div>
    <script>
      const c = document.getElementById('c'),
        ctx = c.getContext('2d')
      const W = 400,
        H = 600
      let S
      const LEFT_X = 75,
        RIGHT_X = 325,
        PLAT_W = 100,
        PLAT_H = 24,
        GAP_BASE = 120
      const SAVE = 'grizzy_rabbit_best'

      let g, platforms, score, best, level, gOver, started, ptcls, scrollY, tickCnt, choiceTimer

      function resize() {
        const w = document.getElementById('wrap')
        const r = W / H
        let ww = window.innerWidth,
          wh = window.innerHeight
        if (ww / wh > r) {
          ww = wh * r
        } else {
          wh = ww / r
        }
        w.style.width = ww + 'px'
        w.style.height = wh + 'px'
        S = ww / W
        c.width = W
        c.height = H
      }

      // sfx from shared module

      function part(x, y, c, n) {
        for (let i = 0; i < (n || 6); i++)
          ptcls.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5 - 1,
            life: 20 + Math.random() * 10,
            max: 30,
            c: c || '#8B5E3C',
            r: 1 + Math.random() * 3,
          })
      }

      function drawParts() {
        for (let i = ptcls.length - 1; i >= 0; i--) {
          const p = ptcls[i]
          p.x += p.vx
          p.y += p.vy
          p.vy += 0.15
          p.life--
          if (p.life <= 0) ptcls.splice(i, 1)
          else {
            ctx.save()
            ctx.globalAlpha = p.life / p.max
            ctx.fillStyle = p.c
            ctx.beginPath()
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2)
            ctx.fill()
            ctx.restore()
          }
        }
      }

      function rand(a, b) {
        return a + Math.random() * (b - a)
      }

      function diff(lv) {
        return {
          jumpFrames: Math.max(22, 52 - Math.floor(lv * 0.75)),
          peak: Math.max(55, 95 - Math.floor(lv * 0.8)),
          choiceFrames: Math.max(10, 30 - Math.floor(lv * 0.45)),
          lemmingRate: Math.min(0.45, 0.08 + lv * 0.009),
          goldenRate: Math.max(0.05, 0.18 - lv * 0.003),
          gap: Math.max(90, GAP_BASE - lv * 0.6),
        }
      }

      function drawSky() {
        const gr = ctx.createLinearGradient(0, 0, 0, H)
        gr.addColorStop(0, '#4FC3F7')
        gr.addColorStop(0.4, '#87CEEB')
        gr.addColorStop(0.75, '#B3E5FC')
        gr.addColorStop(1, '#C8E6C9')
        ctx.fillStyle = gr
        ctx.fillRect(0, 0, W, H)
        ctx.fillStyle = '#FFF59D'
        ctx.beginPath()
        ctx.arc(340, 45, 32, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#FFEE58'
        ctx.beginPath()
        ctx.arc(340, 45, 24, 0, Math.PI * 2)
        ctx.fill()
        ctx.strokeStyle = 'rgba(255,238,88,0.25)'
        ctx.lineWidth = 2.5
        for (let i = 0; i < 8; i++) {
          const a = (i * Math.PI) / 4
          ctx.beginPath()
          ctx.moveTo(340 + Math.cos(a) * 32, 45 + Math.sin(a) * 32)
          ctx.lineTo(340 + Math.cos(a) * 50, 45 + Math.sin(a) * 50)
          ctx.stroke()
        }
        ctx.fillStyle = 'rgba(255,255,255,0.5)'
        for (let i = 0; i < 4; i++) {
          const cx = 40 + i * 110 + Math.sin(i + Date.now() * 0.0001) * 20,
            cy = 30 + Math.sin(i * 2.5) * 12
          ctx.beginPath()
          ctx.ellipse(cx, cy, 35, 12, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(cx - 20, cy + 3, 22, 9, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(cx + 20, cy + 3, 22, 9, 0, 0, Math.PI * 2)
          ctx.fill()
        }
        ctx.fillStyle = '#4CAF50'
        ctx.fillRect(0, H - 18, W, 18)
        ctx.fillStyle = '#388E3C'
        ctx.fillRect(0, H - 20, W, 4)
        ctx.fillStyle = '#2E7D32'
        for (let i = 0; i < W; i += 18) {
          ctx.fillRect(i, H - 22, 2, 7)
          ctx.fillRect(i + 7, H - 24, 1.5, 9)
        }
      }

      function drawCarrot(x, y, w, h, golden) {
        ctx.fillStyle = golden ? '#FFC107' : '#FF9800'
        ctx.beginPath()
        ctx.moveTo(x + w * 0.5, y + h)
        ctx.quadraticCurveTo(x + w * 0.5, y + h * 0.65, x + w * 0.35, y + h * 0.45)
        ctx.quadraticCurveTo(x + w * 0.12, y + h * 0.15, x + w * 0.18, y - 2)
        ctx.lineTo(x + w * 0.82, y - 2)
        ctx.quadraticCurveTo(x + w * 0.88, y + h * 0.15, x + w * 0.65, y + h * 0.45)
        ctx.quadraticCurveTo(x + w * 0.5, y + h * 0.65, x + w * 0.5, y + h)
        ctx.fill()
        ctx.fillStyle = golden ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.18)'
        ctx.fillRect(x + w * 0.28, y + h * 0.12, w * 0.1, h * 0.3)
        ctx.fillStyle = '#4CAF50'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.16, y - 5, w * 0.14, h * 0.1, -0.4, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(x + w * 0.5, y - 8, w * 0.16, h * 0.12, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(x + w * 0.84, y - 5, w * 0.14, h * 0.1, 0.4, 0, Math.PI * 2)
        ctx.fill()
        if (golden) {
          ctx.save()
          ctx.shadowColor = '#FFD54F'
          ctx.shadowBlur = 18
          ctx.fillStyle = 'rgba(255,193,7,0.12)'
          ctx.beginPath()
          ctx.ellipse(x + w / 2, y + h / 2, w / 2 + 6, h / 2 + 4, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.restore()
          ctx.fillStyle = 'rgba(255,255,255,0.6)'
          ctx.beginPath()
          ctx.arc(x + w * 0.35, y + h * 0.15, 4, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(x + w * 0.6, y + h * 0.5, 2.5, 0, Math.PI * 2)
          ctx.fill()
        }
        ctx.fillStyle = '#BF360C'
        ctx.fillRect(x + w * 0.05, y + h - 2, w + w * 0.1, 3)
        ctx.fillStyle = '#E64A19'
        ctx.fillRect(x + w * 0.2, y + h - 5, w * 0.6, 3)
      }

      function drawGrizzy(x, y, w, h, golden) {
        ctx.save()
        const sx = 1,
          br = 0
        // Body
        ctx.fillStyle = '#8B5E3C'
        ctx.beginPath()
        ctx.ellipse(x + w / 2, y + h * 0.55, w * 0.38, h * 0.42, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#A67C52'
        ctx.beginPath()
        ctx.ellipse(x + w / 2, y + h * 0.58, w * 0.22, h * 0.25, 0, 0, Math.PI * 2)
        ctx.fill()
        // White tail
        ctx.fillStyle = '#FFF'
        ctx.beginPath()
        ctx.arc(x + w * 0.82, y + h * 0.55, w * 0.07, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#E0E0E0'
        ctx.beginPath()
        ctx.arc(x + w * 0.83, y + h * 0.53, w * 0.04, 0, Math.PI * 2)
        ctx.fill()
        // Head
        ctx.fillStyle = '#8B5E3C'
        ctx.beginPath()
        ctx.arc(x + w / 2, y - h * 0.1, w * 0.28, 0, Math.PI * 2)
        ctx.fill()
        // Rabbit ears
        const ew = 5,
          eh = 28
        ctx.fillStyle = '#8B5E3C'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.32, y - h * 0.55, ew, eh, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#D7CCC8'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.32, y - h * 0.52, ew * 0.5, eh * 0.7, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#8B5E3C'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.68, y - h * 0.55, ew, eh, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#D7CCC8'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.68, y - h * 0.52, ew * 0.5, eh * 0.7, 0, 0, Math.PI * 2)
        ctx.fill()
        // Eyes
        ctx.fillStyle = '#FFF'
        ctx.beginPath()
        ctx.arc(x + w * 0.38, y - h * 0.08, 6, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(x + w * 0.62, y - h * 0.08, 6, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#222'
        ctx.beginPath()
        ctx.arc(x + w * 0.4, y - h * 0.06, 3, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(x + w * 0.64, y - h * 0.06, 3, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#FFF'
        ctx.fillRect(x + w * 0.42, y - h * 0.09, 1.5, 1.5)
        ctx.fillRect(x + w * 0.66, y - h * 0.09, 1.5, 1.5)
        // Nose
        ctx.fillStyle = '#3E2723'
        ctx.beginPath()
        ctx.ellipse(x + w / 2, y - h * 0.02, w * 0.04, w * 0.03, 0, 0, Math.PI * 2)
        ctx.fill()
        // Smile
        ctx.strokeStyle = '#3E2723'
        ctx.lineWidth = 1.2
        ctx.beginPath()
        ctx.arc(x + w / 2, y + h * 0.02, 6, 0.2, Math.PI - 0.2)
        ctx.stroke()
        // Front teeth
        ctx.fillStyle = '#FFF'
        ctx.fillRect(x + w * 0.44, y + h * 0.02, 2.5, 4.5)
        ctx.fillRect(x + w * 0.52, y + h * 0.02, 2.5, 4.5)
        ctx.strokeStyle = '#CCC'
        ctx.lineWidth = 0.5
        ctx.strokeRect(x + w * 0.44, y + h * 0.02, 2.5, 4.5)
        ctx.strokeRect(x + w * 0.52, y + h * 0.02, 2.5, 4.5)
        // Arms
        ctx.fillStyle = '#6B4226'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.1, y + h * 0.42, w * 0.07, h * 0.035, 0.4, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(x + w * 0.9, y + h * 0.42, w * 0.07, h * 0.035, -0.4, 0, Math.PI * 2)
        ctx.fill()
        // Legs
        ctx.fillStyle = '#6B4226'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.3, y + h * 0.88, w * 0.09, h * 0.055, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(x + w * 0.7, y + h * 0.88, w * 0.09, h * 0.055, 0, 0, Math.PI * 2)
        ctx.fill()
        // Whiskers
        ctx.strokeStyle = 'rgba(62,39,35,0.3)'
        ctx.lineWidth = 0.8
        ctx.beginPath()
        ctx.moveTo(x + w * 0.25, y - h * 0.04)
        ctx.lineTo(x + w * 0.12, y - h * 0.08)
        ctx.stroke()
        ctx.beginPath()
        ctx.moveTo(x + w * 0.25, y - h * 0.02)
        ctx.lineTo(x + w * 0.12, y - h * 0.02)
        ctx.stroke()
        ctx.beginPath()
        ctx.moveTo(x + w * 0.75, y - h * 0.04)
        ctx.lineTo(x + w * 0.88, y - h * 0.08)
        ctx.stroke()
        ctx.beginPath()
        ctx.moveTo(x + w * 0.75, y - h * 0.02)
        ctx.lineTo(x + w * 0.88, y - h * 0.02)
        ctx.stroke()
        ctx.restore()
      }

      function drawLemming(x, y, w, h) {
        ctx.save()
        ctx.fillStyle = '#7E8A9E'
        ctx.beginPath()
        ctx.ellipse(x + w / 2, y + h * 0.55, w * 0.35, h * 0.38, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#B0BEC5'
        ctx.beginPath()
        ctx.ellipse(x + w / 2, y + h * 0.6, w * 0.2, h * 0.22, 0, 0, Math.PI * 2)
        ctx.fill()
        // Head
        ctx.fillStyle = '#7E8A9E'
        ctx.beginPath()
        ctx.arc(x + w / 2, y + h * 0.18, w * 0.22, 0, Math.PI * 2)
        ctx.fill()
        // Rabbit ears
        ctx.fillStyle = '#7E8A9E'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.35, y - h * 0.2, 3.5, 16, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#B0BEC5'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.35, y - h * 0.18, 2, 11, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#7E8A9E'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.65, y - h * 0.2, 3.5, 16, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#B0BEC5'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.65, y - h * 0.18, 2, 11, 0, 0, Math.PI * 2)
        ctx.fill()
        // Angry eyes
        ctx.fillStyle = '#222'
        ctx.fillRect(x + w * 0.36, y + h * 0.1, 3.5, 3.5)
        ctx.fillRect(x + w * 0.57, y + h * 0.1, 3.5, 3.5)
        ctx.fillStyle = '#fff'
        ctx.fillRect(x + w * 0.37, y + h * 0.09, 1.5, 1.5)
        ctx.fillRect(x + w * 0.58, y + h * 0.09, 1.5, 1.5)
        ctx.strokeStyle = '#222'
        ctx.lineWidth = 1.3
        ctx.beginPath()
        ctx.moveTo(x + w * 0.33, y + h * 0.06)
        ctx.lineTo(x + w * 0.4, y + h * 0.08)
        ctx.stroke()
        ctx.beginPath()
        ctx.moveTo(x + w * 0.67, y + h * 0.06)
        ctx.lineTo(x + w * 0.6, y + h * 0.08)
        ctx.stroke()
        // Nose
        ctx.fillStyle = '#FFB74D'
        ctx.beginPath()
        ctx.arc(x + w / 2, y + h * 0.24, 2.5, 0, Math.PI * 2)
        ctx.fill()
        // Teeth
        ctx.fillStyle = '#FFF'
        ctx.fillRect(x + w * 0.44, y + h * 0.27, 2.5, 3.5)
        ctx.fillRect(x + w * 0.52, y + h * 0.27, 2.5, 3.5)
        // Arms
        ctx.fillStyle = '#6B7280'
        ctx.beginPath()
        ctx.ellipse(x + w * 0.1, y + h * 0.45, w * 0.06, h * 0.03, 0.3, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(x + w * 0.9, y + h * 0.45, w * 0.06, h * 0.03, -0.3, 0, Math.PI * 2)
        ctx.fill()
        ctx.restore()
      }

      function genPlatforms() {
        const d = diff(level)
        for (let i = 0; i < 80; i++) {
          const y = 520 - i * d.gap
          const ll = Math.random() < d.lemmingRate
          const lg = !ll && Math.random() < d.goldenRate
          const rl = Math.random() < d.lemmingRate
          const rg = !rl && Math.random() < d.goldenRate
          platforms.push({
            y,
            left: { golden: lg, lem: ll, active: true },
            right: { golden: rg, lem: rl, active: true },
          })
        }
      }

      function getP(i) {
        return i >= 0 && i < platforms.length ? platforms[i] : null
      }

      function resetGame() {
        score = 0
        level = 1
        gOver = false
        started = false
        ptcls = []
        scrollY = 0
        tickCnt = 0
        choiceTimer = 0
        platforms = []
        genPlatforms()
        const p = getP(0)
        g = {
          x: LEFT_X + PLAT_W / 2 - 18,
          y: p.y - 40,
          w: 36,
          h: 42,
          state: 'idle',
          pIdx: 0,
          side: 'left',
          targetX: 0,
          targetY: 0,
          jp: 0,
          jd: 50,
          dchosen: false,
          ds: null,
          wait: 60,
          vy: 0,
        }
        updateUI()
        if (!started) document.getElementById('msg').style.display = 'block'
      }

      function updateUI() {
        document.getElementById('sc').textContent = score
        document.getElementById('best').textContent = best
        document.getElementById('lvl').textContent = Math.min(40, level)
      }

      function getSideX(side) {
        return side === 'left' ? LEFT_X + PLAT_W / 2 - 18 : RIGHT_X + PLAT_W / 2 - 18
      }

      function getPlatformCenter(p, side) {
        const x = side === 'left' ? LEFT_X + RIGHT_X / 2 - 18 : RIGHT_X + PLAT_W / 2 - 18
        return { x: getSideX(side), y: p.y - 40 }
      }

      function smoothstep(t) {
        return t * t * (3 - 2 * t)
      }

      function update() {
        if (gOver || !started) return
        tickCnt++

        const cp = getP(g.pIdx)
        if (!cp) {
          gOver = true
          return
        }
        const curSide = g.side
        const curX = getSideX(curSide)
        const curY = cp.y - 40

        if (g.state === 'idle') {
          g.wait--
          g.x = curX
          g.y = curY
          if (g.wait <= 0) {
            const d = diff(level)
            g.state = 'ascending'
            g.jp = 0
            g.jd = d.jumpFrames
            g.dchosen = false
            g.ds = null
            const np = getP(g.pIdx + 1)
            if (np) {
              g.targetX = getSideX(curSide === 'left' ? 'right' : 'left')
              g.targetY = np.y - 40
            }
            choiceTimer = d.choiceFrames
            sfx(350, 0.06)
          }
        } else if (g.state === 'ascending') {
          g.jp++
          const p = g.jp / g.jd
          const d = diff(level)
          const peak = d.peak
          const np = getP(g.pIdx + 1)
          const npy = np ? np.y - 40 : g.y - d.gap

          if (g.dchosen) {
            g.x = curX + (g.targetX - curX) * smoothstep(Math.min(1, p * 1.8))
          } else {
            g.x = curX
            choiceTimer--
            if (choiceTimer <= 0) {
              g.state = 'falling'
              g.vy = 0
              sfx(200, 0.3)
              return
            }
          }
          g.y = curY - peak * Math.sin(Math.PI * Math.min(1, p * 1.2))

          if (g.y <= npy + 5) {
            g.jp = 0
            g.state = 'landing'
            g.targetY = npy
          }
        } else if (g.state === 'landing') {
          const np = getP(g.pIdx + 1)
          if (!np) {
            gOver = true
            return
          }
          const side = g.ds || (g.side === 'left' ? 'right' : 'left')
          const pl = np[side]
          if (pl.lem) {
            gOver = true
            sfx(180, 0.5, 'sawtooth')
            part(g.x, g.y, '#E53935', 20)
            part(g.x, g.y, '#7E8A9E', 15)
            document.getElementById('msgTitle').textContent = '💀 ¡Te atrapó un Lemming!'
            document.getElementById('msgSub').textContent = 'Puntuación: ' + score
            document.getElementById('msg').style.display = 'block'
            g.state = 'dead'
            if (score > best) {
              best = score
              localStorage.setItem(SAVE, best)
              updateUI()
            }
            return
          }
          if (pl.golden) {
            score += 20
            sfx(880, 0.15)
            part(g.x, g.y, '#FFC107', 15)
          } else {
            score += 10
            sfx(660, 0.08)
          }
          part(g.x, g.y, '#8B5E3C', 5)
          g.pIdx++
          g.side = side
          g.state = 'idle'
          g.wait = 20
          g.x = getSideX(side)
          g.y = np.y - 40
          updateUI()
          const newLevel = Math.min(40, 1 + Math.floor(score / 30))
          if (newLevel > level) {
            level = newLevel
            sfx(1100, 0.2)
            updateUI()
          }
          if (score > best) {
            best = score
            localStorage.setItem(SAVE, best)
            updateUI()
          }
          // Scroll camera
          scrollY = Math.max(scrollY, np.y - 350)
        } else if (g.state === 'falling') {
          g.vy += 0.6
          g.y += g.vy
          if (g.y > H - 30) {
            gOver = true
            sfx(150, 0.6, 'sawtooth')
            part(g.x, H - 20, '#4CAF50', 20)
            part(g.x, H - 20, '#8B5E3C', 15)
            document.getElementById('msgTitle').textContent = '💀 ¡Caíste al suelo!'
            document.getElementById('msgSub').textContent = 'Puntuación: ' + score
            document.getElementById('msg').style.display = 'block'
            if (score > best) {
              best = score
              localStorage.setItem(SAVE, best)
              updateUI()
            }
          }
        }

        if (g.state !== 'dead') drawParts()
      }

      function draw() {
        ctx.save()
        ctx.scale(S, S)

        // Background
        drawSky()

        // Draw platforms (only visible ones)
        const viewY = scrollY
        for (let i = 0; i < platforms.length; i++) {
          const p = platforms[i]
          const sy = p.y - viewY
          if (sy < -50 || sy > H + 50) continue
          if (i === g.pIdx && (g.state === 'idle' || g.state === 'falling')) {
            if (p.left.active) drawCarrot(LEFT_X, sy - 10, PLAT_W, PLAT_H, p.left.golden)
            if (p.right.active) drawCarrot(RIGHT_X, sy - 10, PLAT_W, PLAT_H, p.right.golden)
            continue
          }
          if (p.left.active) {
            drawCarrot(LEFT_X, sy - 10, PLAT_W, PLAT_H, p.left.golden)
            if (p.left.lem && i !== g.pIdx) drawLemming(LEFT_X + 30, sy - 38, 30, 30)
          }
          if (p.right.active) {
            drawCarrot(RIGHT_X, sy - 10, PLAT_W, PLAT_H, p.right.golden)
            if (p.right.lem && i !== g.pIdx) drawLemming(RIGHT_X + 30, sy - 38, 30, 30)
          }
        }

        // Draw current platform
        const cp = getP(g.pIdx)
        if (cp) {
          const sy = cp.y - viewY
          if (g.state === 'idle' || g.state === 'falling' || g.state === 'wait') {
            if (g.side === 'left' && cp.left.active)
              drawCarrot(LEFT_X, sy - 10, PLAT_W, PLAT_H, cp.left.golden)
            if (g.side === 'right' && cp.right.active)
              drawCarrot(RIGHT_X, sy - 10, PLAT_W, PLAT_H, cp.right.golden)
          } else if (g.state === 'ascending') {
            if (cp.left.active) drawCarrot(LEFT_X, sy - 10, PLAT_W, PLAT_H, cp.left.golden)
            if (cp.right.active) drawCarrot(RIGHT_X, sy - 10, PLAT_W, PLAT_H, cp.right.golden)
          }
        }

        // Next platform highlight
        const np = getP(g.pIdx + 1)
        if (np && (g.state === 'ascending' || g.state === 'idle')) {
          const nsy = np.y - viewY
          if (np.left.active) {
            ctx.save()
            ctx.shadowColor = 'rgba(255,255,255,0.3)'
            ctx.shadowBlur = 10
            drawCarrot(LEFT_X, nsy - 10, PLAT_W, PLAT_H, np.left.golden)
            ctx.restore()
          }
          if (np.right.active) {
            ctx.save()
            ctx.shadowColor = 'rgba(255,255,255,0.3)'
            ctx.shadowBlur = 10
            drawCarrot(RIGHT_X, nsy - 10, PLAT_W, PLAT_H, np.right.golden)
            ctx.restore()
          }
          if (np.left.lem) drawLemming(LEFT_X + 30, nsy - 38, 30, 30)
          if (np.right.lem) drawLemming(RIGHT_X + 30, nsy - 38, 30, 30)
        }

        // Draw Grizzy
        const gx = g.x,
          gy = g.y - (g.state === 'idle' && g.wait > 40 ? 2 : 0)
        drawGrizzy(gx, gy, g.w, g.h)

        drawParts()

        // Arrow hint during ascend
        if (g.state === 'ascending' && !g.dchosen) {
          ctx.fillStyle = 'rgba(255,255,255,0.6)'
          ctx.font = 'bold 22px sans-serif'
          ctx.textAlign = 'center'
          ctx.fillText('←', LEFT_X + PLAT_W / 2, 330 - viewY * 0.1)
          ctx.fillText('→', RIGHT_X + PLAT_W / 2, 330 - viewY * 0.1)
          ctx.fillStyle = 'rgba(255,255,255,0.3)'
          ctx.font = '10px sans-serif'
          ctx.fillText('A/D', LEFT_X + PLAT_W / 2, 348 - viewY * 0.1)
          ctx.fillText('A/D', RIGHT_X + PLAT_W / 2, 348 - viewY * 0.1)
        }

        ctx.restore()
      }

      function loop() {
        update()
        draw()
        if (gOver) {
          // Draw overlay
          ctx.save()
          ctx.scale(S, S)
          ctx.fillStyle = 'rgba(0,0,0,0.4)'
          ctx.fillRect(0, 0, W, H)
          ctx.restore()
        }
        requestAnimationFrame(loop)
      }

      function startGame() {
        if (!started && !gOver) {
          started = true
          g.state = 'idle'
          g.wait = 40
          document.getElementById('msg').style.display = 'none'
        } else if (gOver) {
          resetGame()
          started = true
          g.state = 'idle'
          g.wait = 40
          document.getElementById('msg').style.display = 'none'
        }
      }

      function chooseDir(side) {
        if (!started || gOver) return
        if (g.state === 'ascending' && !g.dchosen) {
          g.dchosen = true
          g.ds = side
          const np = getP(g.pIdx + 1)
          if (np) {
            g.targetX = getSideX(side)
            g.targetY = np.y - 40
          }
        }
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault()
          startGame()
        }
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
          e.preventDefault()
          chooseDir('left')
        }
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
          e.preventDefault()
          chooseDir('right')
        }
      })
      document.addEventListener('click', () => {
        if (!started || gOver) startGame()
        else if (g.state === 'ascending' && !g.dchosen) {
          // On click, choose opposite side (helper for mobile)
          chooseDir(g.side === 'left' ? 'right' : 'left')
        }
      })
      document.addEventListener('touchstart', (e) => {
        e.preventDefault()
        if (!started || gOver) startGame()
        else if (g.state === 'ascending' && !g.dchosen) {
          const t = e.touches[0]
          const rect = c.getBoundingClientRect()
          const x = ((t.clientX - rect.left) / rect.width) * W
          chooseDir(x < W / 2 ? 'left' : 'right')
        }
      })
      document.getElementById('rb').addEventListener('click', () => {
        resetGame()
        started = false
        document.getElementById('msg').style.display = 'block'
        document.getElementById('msgTitle').textContent = '🐰 El Conejo Saltón'
        document.getElementById('msgSub').textContent = 'Presiona ESPACIO o toca para empezar'
      })
      window.addEventListener('resize', resize)

      function init() {
        resize()
        best = parseInt(localStorage.getItem(SAVE)) || 0
        resetGame()
        document.getElementById('msg').style.display = 'block'
        loop()
      }
      init()
    </script>
  </body>
</html>
