<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Carrera de Cohetes - Grizzy &amp; the Lemmings</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Arial Black', Arial, sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas {
        display: block;
        background: #0d0d2b;
        image-rendering: pixelated;
      }
      #wrapper {
        position: relative;
        width: min(100vw, calc(100vh * 0.666));
        height: min(100vh, calc(100vw * 1.5));
      }
      canvas {
        width: 100% !important;
        height: 100% !important;
        position: absolute;
        top: 0;
        left: 0;
      }
    </style>

    <script src="js/audio.js"></script>
    <script src="js/save.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/grizzy.js"></script>
    <script src="js/back.js"></script>
  </head>
  <body>
    <div id="wrapper">
      <canvas id="c" width="400" height="600"></canvas>
    </div>
    <script>
      const canvas = document.getElementById('c')
      const ctx = canvas.getContext('2d')
      const W = 400,
        H = 600

      let gameState = 'menu'
      let level = 1
      let score = 0
      let best = parseInt(localStorage.getItem('grizzy_rocket_best')) || 0
      let height = 0
      let scrollSpeed = 1.5
      let frame = 0

      const keys = {}
      let playerX = 200,
        playerY = 500
      const playerW = 28,
        playerH = 44
      let stars = []
      let asteroids = []
      let lemmings = []
      let lasers = []
      let particles = []
      let bgStars = []
      let galaxies = []

      document.addEventListener('keydown', (e) => {
        keys[e.key] = true
        if (e.key === ' ' || e.key === 'Enter') e.preventDefault()
      })
      document.addEventListener('keyup', (e) => {
        keys[e.key] = false
      })

      canvas.addEventListener('click', (e) => {
        if (gameState === 'menu') {
          startGame()
        } else if (gameState === 'gameover') {
          gameState = 'menu'
        }
      })

      canvas.addEventListener(
        'touchstart',
        (e) => {
          e.preventDefault()
          const rect = canvas.getBoundingClientRect()
          const touch = e.touches[0]
          if (gameState === 'menu') {
            startGame()
          } else if (gameState === 'gameover') {
            gameState = 'menu'
          } else if (gameState === 'playing') {
            playerX = ((touch.clientX - rect.left) / rect.width) * W
          }
        },
        { passive: false },
      )

      canvas.addEventListener(
        'touchmove',
        (e) => {
          e.preventDefault()
          if (gameState !== 'playing') return
          const rect = canvas.getBoundingClientRect()
          const touch = e.touches[0]
          playerX = ((touch.clientX - rect.left) / rect.width) * W
        },
        { passive: false },
      )

      function initBG() {
        bgStars = []
        for (let i = 0; i < 120; i++) {
          bgStars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.8 + 0.3,
            a: Math.random() * 0.7 + 0.3,
            twinkle: Math.random() * 100,
          })
        }
        galaxies = []
        for (let i = 0; i < 3; i++) {
          const cx = Math.random() * W,
            cy = Math.random() * H
          const pts = []
          for (let j = 0; j < 30; j++) {
            const angle = Math.random() * Math.PI * 2
            const dist = Math.random() * 40 + 5
            pts.push({
              x: cx + Math.cos(angle) * dist,
              y: cy + Math.sin(angle) * dist,
              r: Math.random() * 0.8 + 0.2,
            })
          }
          galaxies.push({ cx, cy, pts, hue: Math.random() * 60 + 220 })
        }
      }
      initBG()

      function drawBackground() {
        ctx.fillStyle = '#0D0D2B'
        ctx.fillRect(0, 0, W, H)

        for (const g of galaxies) {
          for (const p of g.pts) {
            ctx.beginPath()
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2)
            ctx.fillStyle = `hsla(${g.hue}, 70%, 70%, 0.4)`
            ctx.fill()
          }
        }

        for (const s of bgStars) {
          const flicker = Math.sin((frame + s.twinkle) * 0.05) * 0.3 + 0.7
          ctx.beginPath()
          ctx.arc(s.x, (s.y + frame * 0.3) % H, s.r, 0, Math.PI * 2)
          ctx.fillStyle = `rgba(255,255,255,${s.a * flicker})`
          ctx.fill()
        }
      }

      function drawRocket(x, y) {
        const s = 1
        ctx.save()
        ctx.translate(x, y)

        // engine flame
        const flicker = Math.sin(frame * 0.5) * 3
        ctx.beginPath()
        ctx.moveTo(-8 * s, 22 * s)
        ctx.lineTo(0, (32 + flicker) * s)
        ctx.lineTo(8 * s, 22 * s)
        ctx.fillStyle = '#FF6600'
        ctx.fill()
        ctx.beginPath()
        ctx.moveTo(-4 * s, 22 * s)
        ctx.lineTo(0, (26 + flicker * 0.5) * s)
        ctx.lineTo(4 * s, 22 * s)
        ctx.fillStyle = '#FFCC00'
        ctx.fill()

        // body - silver
        ctx.fillStyle = '#C0C0C0'
        ctx.strokeStyle = '#888'
        ctx.lineWidth = 1.5
        ctx.beginPath()
        ctx.moveTo(-12 * s, 18 * s)
        ctx.lineTo(-12 * s, -6 * s)
        ctx.lineTo(-8 * s, -14 * s)
        ctx.lineTo(-8 * s, -18 * s)
        ctx.lineTo(8 * s, -18 * s)
        ctx.lineTo(8 * s, -14 * s)
        ctx.lineTo(12 * s, -6 * s)
        ctx.lineTo(12 * s, 18 * s)
        ctx.closePath()
        ctx.fill()
        ctx.stroke()

        // nose cone
        ctx.fillStyle = '#CC2222'
        ctx.beginPath()
        ctx.moveTo(-8 * s, -14 * s)
        ctx.lineTo(0, -24 * s)
        ctx.lineTo(8 * s, -14 * s)
        ctx.closePath()
        ctx.fill()

        // fins
        ctx.fillStyle = '#CC2222'
        ctx.beginPath()
        ctx.moveTo(-12 * s, 10 * s)
        ctx.lineTo(-18 * s, 22 * s)
        ctx.lineTo(-12 * s, 18 * s)
        ctx.closePath()
        ctx.fill()
        ctx.beginPath()
        ctx.moveTo(12 * s, 10 * s)
        ctx.lineTo(18 * s, 22 * s)
        ctx.lineTo(12 * s, 18 * s)
        ctx.closePath()
        ctx.fill()

        // window
        ctx.beginPath()
        ctx.arc(0, -4 * s, 8 * s, 0, Math.PI * 2)
        ctx.fillStyle = '#88CCFF'
        ctx.fill()
        ctx.strokeStyle = '#666'
        ctx.lineWidth = 1.5
        ctx.stroke()

        // Grizzy face in window
        ctx.fillStyle = '#8B5E3C'
        ctx.beginPath()
        ctx.arc(0, -3 * s, 5 * s, 0, Math.PI * 2)
        ctx.fill()

        ctx.fillStyle = '#3D2B1F'
        ctx.beginPath()
        ctx.arc(-2.5 * s, -5 * s, 1.2 * s, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(2.5 * s, -5 * s, 1.2 * s, 0, Math.PI * 2)
        ctx.fill()

        ctx.fillStyle = '#FFFFFF'
        ctx.beginPath()
        ctx.arc(-2 * s, -5.5 * s, 0.5 * s, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(3 * s, -5.5 * s, 0.5 * s, 0, Math.PI * 2)
        ctx.fill()

        ctx.fillStyle = '#3D2B1F'
        ctx.beginPath()
        ctx.ellipse(0, -1.5 * s, 2.5 * s, 1.8 * s, 0, 0, Math.PI)
        ctx.fill()

        ctx.fillStyle = '#FF8888'
        ctx.beginPath()
        ctx.arc(0, -0.5 * s, 1.5 * s, 0, Math.PI)
        ctx.fill()

        ctx.restore()
      }

      function spawnAsteroid() {
        const size = 12 + Math.random() * 16 + level * 0.3
        asteroids.push({
          x: 20 + Math.random() * (W - 40),
          y: -size,
          size,
          speed: 1 + Math.random() * 0.8 + level * 0.04,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.03,
        })
      }

      function drawAsteroid(a) {
        ctx.save()
        ctx.translate(a.x, a.y)
        ctx.rotate(a.rot)
        const s = a.size
        ctx.fillStyle = '#888'
        ctx.strokeStyle = '#666'
        ctx.lineWidth = 1.5
        ctx.beginPath()
        const pts = 8
        for (let i = 0; i < pts * 2; i++) {
          const angle = (i / (pts * 2)) * Math.PI * 2
          const r = i % 2 === 0 ? s : s * (0.7 + Math.random() * 0.3)
          const px = Math.cos(angle) * r
          const py = Math.sin(angle) * r
          if (i === 0) ctx.moveTo(px, py)
          else ctx.lineTo(px, py)
        }
        ctx.closePath()
        ctx.fill()
        ctx.stroke()

        // craters
        ctx.fillStyle = '#777'
        ctx.beginPath()
        ctx.arc(-s * 0.25, -s * 0.2, s * 0.2, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#666'
        ctx.beginPath()
        ctx.arc(s * 0.2, s * 0.15, s * 0.15, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#777'
        ctx.beginPath()
        ctx.arc(-s * 0.1, s * 0.3, s * 0.12, 0, Math.PI * 2)
        ctx.fill()

        ctx.restore()
      }

      function spawnStar() {
        stars.push({
          x: 25 + Math.random() * (W - 50),
          y: -10,
          speed: 0.8 + Math.random() * 0.5,
          phase: Math.random() * Math.PI * 2,
        })
      }

      function drawStar(s) {
        const glow = Math.sin(frame * 0.08 + s.phase) * 0.3 + 0.7
        ctx.save()
        ctx.translate(s.x, s.y)
        ctx.shadowColor = '#FFC107'
        ctx.shadowBlur = 12 * glow

        ctx.fillStyle = '#FFC107'
        ctx.beginPath()
        const sp = 5
        for (let i = 0; i < sp * 2; i++) {
          const angle = (i / (sp * 2)) * Math.PI * 2 - Math.PI / 2
          const r = i % 2 === 0 ? 7 : 3
          ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r)
        }
        ctx.closePath()
        ctx.fill()
        ctx.shadowBlur = 0
        ctx.restore()
      }

      function spawnLemming() {
        lemmings.push({
          x: 30 + Math.random() * (W - 60),
          y: -20,
          speed: 0.7 + Math.random() * 0.4 + level * 0.03,
          wobble: Math.random() * Math.PI * 2,
          shootTimer: 60 + Math.random() * 80,
          antennaAngle: 0,
        })
      }

      function drawLemming(l) {
        ctx.save()
        ctx.translate(l.x, l.y)

        // saucer body
        ctx.fillStyle = '#7E8A9E'
        ctx.beginPath()
        ctx.ellipse(0, 0, 16, 6, 0, 0, Math.PI * 2)
        ctx.fill()

        ctx.fillStyle = '#6B7A8E'
        ctx.beginPath()
        ctx.ellipse(0, -2, 10, 5, 0, Math.PI, Math.PI * 2)
        ctx.fill()

        // dome
        ctx.fillStyle = '#AABBCC'
        ctx.beginPath()
        ctx.arc(0, -6, 7, Math.PI, 0)
        ctx.fill()

        // antenna
        ctx.strokeStyle = '#999'
        ctx.lineWidth = 1.5
        ctx.beginPath()
        ctx.moveTo(0, -12)
        ctx.lineTo(0, -18)
        ctx.stroke()
        ctx.fillStyle = '#FF4444'
        ctx.beginPath()
        ctx.arc(0, -19, 2, 0, Math.PI * 2)
        ctx.fill()

        // lemming eyes
        ctx.fillStyle = '#222'
        ctx.beginPath()
        ctx.arc(-3, -7, 1.2, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(3, -7, 1.2, 0, Math.PI * 2)
        ctx.fill()

        ctx.restore()
      }

      function shootLaser(l) {
        lasers.push({
          x: l.x,
          y: l.y + 10,
          speed: 3 + level * 0.05,
        })
      }

      function drawLaser(las) {
        ctx.shadowColor = '#FF0000'
        ctx.shadowBlur = 8
        const grad = ctx.createLinearGradient(las.x, las.y, las.x, las.y + 20)
        grad.addColorStop(0, 'rgba(255,0,0,0)')
        grad.addColorStop(0.3, '#FF3333')
        grad.addColorStop(1, '#FF0000')
        ctx.fillStyle = grad
        ctx.fillRect(las.x - 1.5, las.y, 3, 20)
        ctx.shadowBlur = 0
      }

      function spawnParticles(x, y, color, count, spread) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2
          const speed = Math.random() * spread + 1
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 40 + Math.random() * 30,
            maxLife: 70,
            color,
            size: 1.5 + Math.random() * 2.5,
          })
        }
      }

      let engineSound, starSound, crashSound, laserSound, gameoverSound
      let audioCtx = null
      let engineOsc = null,
        engineGain = null

      function initAudio() {
        if (audioCtx) return
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)()
        } catch (e) {}
      }

      function playEngine(on) {
        if (!audioCtx) return
        if (on && !engineOsc) {
          engineOsc = audioCtx.createOscillator()
          engineGain = audioCtx.createGain()
          engineOsc.type = 'sawtooth'
          engineOsc.frequency.setValueAtTime(80, audioCtx.currentTime)
          engineGain.gain.setValueAtTime(0.07, audioCtx.currentTime)
          engineOsc.connect(engineGain)
          engineGain.connect(audioCtx.destination)
          engineOsc.start()
        } else if (!on && engineOsc) {
          engineGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2)
          setTimeout(() => {
            try {
              engineOsc.stop()
            } catch (e) {}
            engineOsc = null
            engineGain = null
          }, 200)
        }
      }

      function playBeep(freq, duration, type, vol) {
        if (!audioCtx) return
        const osc = audioCtx.createOscillator()
        const gain = audioCtx.createGain()
        osc.type = type || 'square'
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime)
        gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime)
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration)
        osc.connect(gain)
        gain.connect(audioCtx.destination)
        osc.start()
        osc.stop(audioCtx.currentTime + duration)
      }

      function playStarSound() {
        playBeep(880, 0.1, 'sine', 0.12)
        setTimeout(() => playBeep(1320, 0.1, 'sine', 0.1), 60)
      }

      function playCrashSound() {
        playBeep(150, 0.3, 'sawtooth', 0.2)
        setTimeout(() => playBeep(100, 0.4, 'sawtooth', 0.15), 100)
      }

      function playLaserSound() {
        playBeep(600, 0.05, 'square', 0.08)
        setTimeout(() => playBeep(400, 0.05, 'square', 0.06), 40)
      }

      function playGameoverSound() {
        ;[400, 350, 300, 250].forEach((f, i) =>
          setTimeout(() => playBeep(f, 0.2, 'sawtooth', 0.12), i * 150),
        )
      }

      function starCollectFX(s) {
        spawnParticles(s.x, s.y, '#FFC107', 15, 3)
        spawnParticles(s.x, s.y, '#FFFFFF', 8, 2)
      }

      function explosionFX(x, y) {
        spawnParticles(x, y, '#FF4400', 25, 4)
        spawnParticles(x, y, '#FFAA00', 20, 3)
        spawnParticles(x, y, '#888', 15, 5)
        spawnParticles(x, y, '#FFFFFF', 10, 2)
      }

      function drawParticles() {
        for (const p of particles) {
          const alpha = p.life / p.maxLife
          ctx.globalAlpha = alpha
          ctx.fillStyle = p.color
          ctx.beginPath()
          ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2)
          ctx.fill()
        }
        ctx.globalAlpha = 1
      }

      function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i]
          p.x += p.vx
          p.y += p.vy
          p.vy += 0.05
          p.vx *= 0.98
          p.vy *= 0.98
          p.life--
          if (p.life <= 0) particles.splice(i, 1)
        }
      }

      function spawnLevelObjects() {
        const rate = Math.max(10, 40 - level * 0.8)
        const astRate = Math.max(8, 30 - level * 0.5)
        if (frame % Math.floor(astRate) === 0 && Math.random() < 0.7) spawnAsteroid()
        if (frame % Math.floor(rate + 10) === 0 && Math.random() < 0.3) spawnStar()
        if (
          frame % Math.floor(50 - level * 0.5) === 0 &&
          Math.random() < 0.4 &&
          lemmings.length < 3 + Math.floor(level / 5)
        )
          spawnLemming()

        // level progression
        if (height > level * 300 && level < 40) {
          level++
          scrollSpeed = 1.5 + level * 0.07
        }
      }

      function checkCollisions() {
        const px = playerX,
          py = playerY
        const hw = playerW / 2 - 4,
          hh = playerH / 2 - 4

        for (let i = asteroids.length - 1; i >= 0; i--) {
          const a = asteroids[i]
          const dx = px - a.x,
            dy = py - a.y
          if (Math.abs(dx) < hw + a.size * 0.6 && Math.abs(dy) < hh + a.size * 0.6) {
            explosionFX(px, py)
            playCrashSound()
            return true
          }
          if (a.y > H + a.size) {
            asteroids.splice(i, 1)
          }
        }

        for (let i = stars.length - 1; i >= 0; i--) {
          const s = stars[i]
          const dx = px - s.x,
            dy = py - s.y
          if (Math.abs(dx) < hw + 6 && Math.abs(dy) < hh + 6) {
            score += 10
            starCollectFX(s)
            playStarSound()
            stars.splice(i, 1)
          } else if (s.y > H + 10) {
            stars.splice(i, 1)
          }
        }

        for (let i = lemmings.length - 1; i >= 0; i--) {
          const l = lemmings[i]
          l.shootTimer--
          if (l.shootTimer <= 0) {
            shootLaser(l)
            playLaserSound()
            l.shootTimer = 60 + Math.random() * 80 - level * 0.5
            if (l.shootTimer < 25) l.shootTimer = 25
          }
          if (l.y > H + 30) {
            lemmings.splice(i, 1)
          }
        }

        for (let i = lasers.length - 1; i >= 0; i--) {
          const las = lasers[i]
          const dx = px - las.x,
            dy = py - las.y
          if (Math.abs(dx) < hw + 3 && Math.abs(dy) < hh + 12) {
            explosionFX(px, py)
            playCrashSound()
            return true
          }
          if (las.y > H + 10) lasers.splice(i, 1)
        }

        return false
      }

      function startGame() {
        initAudio()
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume()
        playEngine(true)
        gameState = 'playing'
        level = 1
        score = 0
        height = 0
        scrollSpeed = 1.5
        frame = 0
        playerX = 200
        playerY = 500
        stars = []
        asteroids = []
        lemmings = []
        lasers = []
        particles = []
      }

      function gameOver() {
        playEngine(false)
        playGameoverSound()
        gameState = 'gameover'
        if (score > best) {
          best = score
          localStorage.setItem('grizzy_rocket_best', best)
        }
      }

      function drawHUD() {
        ctx.fillStyle = 'rgba(0,0,0,0.4)'
        ctx.fillRect(0, 0, W, 28)
        ctx.fillStyle = '#FFF'
        ctx.font = 'bold 12px Arial'
        ctx.textAlign = 'left'
        ctx.fillText(`NIVEL ${level}/40`, 8, 19)
        ctx.textAlign = 'center'
        ctx.fillText(`PUNTOS: ${score}`, W / 2, 19)
        ctx.textAlign = 'right'
        ctx.fillText(`ALTURA: ${Math.floor(height)}m`, W - 8, 19)
        ctx.fillText(`RECORD: ${best}`, W - 8, 43)
      }

      function drawMenu() {
        drawBackground()

        ctx.fillStyle = 'rgba(0,0,0,0.6)'
        ctx.fillRect(0, 0, W, H)

        ctx.textAlign = 'center'

        ctx.fillStyle = '#FFC107'
        ctx.font = 'bold 28px Arial Black, Arial'
        ctx.fillText('🚀 CARRERA', W / 2, 120)
        ctx.fillText('DE COHETES', W / 2, 155)

        ctx.fillStyle = '#8B5E3C'
        ctx.font = '16px Arial'
        ctx.fillText('Grizzy & the Lemmings', W / 2, 185)

        ctx.fillStyle = '#AAA'
        ctx.font = '12px Arial'
        ctx.fillText('← → o A/D para moverte', W / 2, 240)
        ctx.fillText('¡Recoge estrellas y esquiva asteroides!', W / 2, 258)
        ctx.fillText('Cuidado con los Lemmings y sus láseres', W / 2, 276)

        ctx.fillStyle = '#FFC107'
        ctx.font = 'bold 18px Arial'
        const pulse = Math.sin(Date.now() * 0.005) * 0.2 + 1
        ctx.save()
        ctx.translate(W / 2, 340)
        ctx.scale(pulse, pulse)
        ctx.fillText('TOCA / PRESIONA ESPACIO', 0, 0)
        ctx.restore()

        if (best > 0) {
          ctx.fillStyle = '#FFD700'
          ctx.font = '14px Arial'
          ctx.fillText(`🏆 RECORD: ${best} puntos`, W / 2, 400)
        }
      }

      function drawGameOver() {
        ctx.fillStyle = 'rgba(0,0,0,0.75)'
        ctx.fillRect(0, 0, W, H)

        ctx.textAlign = 'center'

        ctx.fillStyle = '#FF3333'
        ctx.font = 'bold 36px Arial Black, Arial'
        ctx.fillText('💥 GAME OVER', W / 2, 200)

        ctx.fillStyle = '#FFF'
        ctx.font = '18px Arial'
        ctx.fillText(`PUNTOS: ${score}`, W / 2, 260)
        ctx.fillText(`NIVEL: ${level}/40`, W / 2, 285)
        ctx.fillText(`ALTURA: ${Math.floor(height)}m`, W / 2, 310)

        ctx.fillStyle = '#FFC107'
        ctx.font = 'bold 16px Arial'
        if (score >= best && score > 0) {
          ctx.fillText('🎉 NUEVO RÉCORD! 🎉', W / 2, 345)
        }
        ctx.fillStyle = '#FFD700'
        ctx.font = '14px Arial'
        ctx.fillText(`MEJOR PUNTUACIÓN: ${best}`, W / 2, 375)

        ctx.fillStyle = '#AAA'
        ctx.font = '14px Arial'
        const pulse = Math.sin(Date.now() * 0.005) * 0.2 + 1
        ctx.save()
        ctx.translate(W / 2, 430)
        ctx.scale(pulse, pulse)
        ctx.fillText('TOCA PARA REINICIAR', 0, 0)
        ctx.restore()
      }

      let bgScroll = 0

      function update() {
        if (gameState !== 'playing') return
        frame++

        bgScroll = (bgScroll + scrollSpeed * 0.3) % H

        if (keys['ArrowLeft'] || keys['a'] || keys['A']) playerX -= 4
        if (keys['ArrowRight'] || keys['d'] || keys['D']) playerX += 4
        playerX = Math.max(playerW / 2, Math.min(W - playerW / 2, playerX))

        height += scrollSpeed
        score += 0.05

        spawnLevelObjects()

        // update asteroids
        for (const a of asteroids) {
          a.y += a.speed
          a.rot += a.rotSpeed
        }

        // update stars
        for (const s of stars) {
          s.y += s.speed
        }

        // update lemmings
        for (const l of lemmings) {
          l.y += l.speed
          l.x += Math.sin(frame * 0.02 + l.wobble) * 0.4
          l.antennaAngle = Math.sin(frame * 0.05 + l.wobble) * 0.2
        }

        // update lasers
        for (const las of lasers) {
          las.y += las.speed
        }

        updateParticles()

        if (checkCollisions()) {
          gameOver()
        }
      }

      function draw() {
        drawBackground()
        drawParticles()

        for (const a of asteroids) drawAsteroid(a)
        for (const s of stars) drawStar(s)
        for (const l of lemmings) drawLemming(l)
        for (const las of lasers) drawLaser(las)

        if (gameState === 'playing') {
          drawRocket(playerX, playerY)
          drawHUD()
        } else if (gameState === 'menu') {
          drawRocket(W / 2, 450)
          drawMenu()
        } else if (gameState === 'gameover') {
          drawRocket(playerX, playerY)
          drawGameOver()
        }
      }

      function loop() {
        update()
        draw()
        requestAnimationFrame(loop)
      }

      loop()
    </script>
  </body>
</html>
