<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
    <title>El Pingüino Saltarín - Grizzy &amp; the Lemmings</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas {
        display: block;
        background: #87ceeb;
        cursor: pointer;
        image-rendering: pixelated;
      }
    </style>

    <script src="js/audio.js"></script>
    <script src="js/save.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/grizzy.js"></script>
    <script src="js/back.js"></script>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script>
      const C = document.getElementById('c'),
        ctx = C.getContext('2d')
      const VW = 600,
        VH = 400
      C.width = VW
      C.height = VH

      function resize() {
        const r = Math.min(window.innerWidth / VW, window.innerHeight / VH)
        C.style.width = VW * r + 'px'
        C.style.height = VH * r + 'px'
        C.width = VW
        C.height = VH
      }
      window.addEventListener('resize', resize)
      resize()

      const S = { jump: [], crack: [], fish: [], fall: [], gameover: [], collect: [] }
      function initSound() {
        const f = [
          [220, 0.15],
          [150, 0.25],
          [440, 0.1],
          [300, 0.2],
          [200, 0.4],
          [550, 0.12],
        ]
        ;['jump', 'crack', 'fish', 'fall', 'gameover', 'collect'].forEach((k, i) => {
          if (!S[k].length) S[k].push(f[i])
        })
      }
      function playSound(k) {
        try {
          const a = new (window.AudioContext || window.webkitAudioContext)()
          const g = a.createGain()
          g.connect(a.destination)
          const o = a.createOscillator()
          o.connect(g)
          const [freq, dur] = S[k][0]
          o.frequency.value = freq
          o.type = 'sine'
          g.gain.setValueAtTime(0.3, a.currentTime)
          g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur)
          o.start()
          o.stop(a.currentTime + dur)
          setTimeout(() => a.close(), 500)
        } catch (e) {}
      }

      const KEY = { left: false, right: false, jump: false }

      const GRAVITY = 0.6,
        JUMP_F = -10,
        MOVE_SPEED = 3

      class Grizzy {
        constructor() {
          this.w = 26
          this.h = 32
          this.x = VW / 2 - this.w / 2
          this.y = VH / 2 - this.h / 2
          this.vx = 0
          this.vy = 0
          this.onGround = false
          this.anim = 0
          this.dir = 1
        }
        reset() {
          this.x = VW / 2 - this.w / 2
          this.y = 100
          this.vx = 0
          this.vy = 0
          this.onGround = false
        }
        update(blocks) {
          this.vx = 0
          if (KEY.left) {
            this.vx = -MOVE_SPEED
            this.dir = -1
          }
          if (KEY.right) {
            this.vx = MOVE_SPEED
            this.dir = 1
          }
          if (KEY.jump && this.onGround) {
            this.vy = JUMP_F
            this.onGround = false
            playSound('jump')
            spawnJumpParticles(this.x + this.w / 2, this.y + this.h)
          }
          this.vy += GRAVITY
          this.x += this.vx
          this.y += this.vy
          this.onGround = false
          for (let b of blocks) {
            if (!b.active) continue
            if (
              this.vy >= 0 &&
              this.x + this.w > b.x &&
              this.x < b.x + b.w &&
              this.y + this.h > b.y &&
              this.y + this.h < b.y + b.h + this.vy + 2
            ) {
              if (this.y + this.h - b.y < 20) {
                this.y = b.y - this.h
                this.vy = 0
                this.onGround = true
              }
            }
          }
          if (this.x < 0) this.x = 0
          if (this.x + this.w > VW) this.x = VW - this.w
          if (this.y + this.h > VH - 30) {
            this.y = VH - 30 - this.h
            this.vy = 0
            this.onGround = true
          }
          this.anim += 0.1
        }
        draw() {
          ctx.save()
          ctx.translate(this.x + this.w / 2, this.y + this.h / 2)
          if (this.dir < 0) ctx.scale(-1, 1)
          const b = this.w / 2,
            c = this.h / 2
          const bob = Math.sin(this.anim) * 2
          // body (black)
          ctx.fillStyle = '#111'
          ctx.beginPath()
          ctx.ellipse(0, bob - 2, 14, 16, 0, 0, Math.PI * 2)
          ctx.fill()
          // belly (white)
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.ellipse(0, bob + 2, 10, 12, 0, 0, Math.PI * 2)
          ctx.fill()
          // head
          ctx.fillStyle = '#111'
          ctx.beginPath()
          ctx.ellipse(0, bob - 16, 10, 10, 0, 0, Math.PI * 2)
          ctx.fill()
          // face white
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.ellipse(0, bob - 14, 7, 7, 0, 0, Math.PI * 2)
          ctx.fill()
          // eyes
          ctx.fillStyle = '#000'
          ctx.beginPath()
          ctx.arc(-4, bob - 16, 2.5, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(4, bob - 16, 2.5, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.arc(-3, bob - 17, 1, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(5, bob - 17, 1, 0, Math.PI * 2)
          ctx.fill()
          // beak orange
          ctx.fillStyle = '#FF8C00'
          ctx.beginPath()
          ctx.moveTo(-3, bob - 11)
          ctx.lineTo(3, bob - 11)
          ctx.lineTo(0, bob - 6)
          ctx.closePath()
          ctx.fill()
          // wings (like flippers)
          ctx.fillStyle = '#222'
          ctx.beginPath()
          ctx.ellipse(-14, bob - 2, 6, 10, -0.3, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(14, bob - 2, 6, 10, 0.3, 0, Math.PI * 2)
          ctx.fill()
          // feet
          ctx.fillStyle = '#FF8C00'
          ctx.beginPath()
          ctx.ellipse(-6, bob + 15, 5, 3, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(6, bob + 15, 5, 3, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.restore()
        }
      }

      class IceBlock {
        constructor(x, y, w, h) {
          this.ox = x
          this.oy = y
          this.x = x
          this.y = y
          this.w = w
          this.h = h
          this.baseH = h
          this.sink = 0
          this.active = true
          this.crackAnim = 0
          this.occupied = false
        }
        reset() {
          this.x = this.ox
          this.y = this.oy
          this.sink = 0
          this.active = true
          this.occupied = false
          this.crackAnim = 0
        }
        update(grizzy, level) {
          this.occupied =
            grizzy.x + 2 < this.x + this.w &&
            grizzy.x + grizzy.w - 2 > this.x &&
            grizzy.y + grizzy.h > this.y &&
            grizzy.y + grizzy.h < this.y + this.h + 10
          if (this.occupied) {
            const speed = 0.015 + level * 0.004
            this.sink += speed
            if (this.sink > 1) this.sink = 1
            this.y = this.oy + this.sink * 20
            this.h = this.baseH - this.sink * 20
            if (this.h < 2) this.h = 2
            if (this.sink >= 1 && grizzy.onGround) {
              this.active = false
            }
            this.crackAnim += 0.05
          } else {
            if (this.y < this.oy) {
              this.y += 0.3
              this.h = this.baseH - (this.y - this.oy)
              if (this.h > this.baseH) this.h = this.baseH
            }
            if (this.sink > 0) {
              this.sink -= 0.005
              if (this.sink < 0) this.sink = 0
            }
            this.y = this.oy + this.sink * 20
            this.h = this.baseH - this.sink * 20
          }
        }
        draw() {
          if (!this.active) return
          const r = 6
          ctx.save()
          const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.w, this.y + this.h)
          grad.addColorStop(0, '#E0F7FA')
          grad.addColorStop(0.5, '#B2EBF2')
          grad.addColorStop(1, '#80DEEA')
          ctx.fillStyle = grad
          ctx.beginPath()
          ctx.moveTo(this.x + r, this.y)
          ctx.lineTo(this.x + this.w - r, this.y)
          ctx.quadraticCurveTo(this.x + this.w, this.y, this.x + this.w, this.y + r)
          ctx.lineTo(this.x + this.w, this.y + this.h - r)
          ctx.quadraticCurveTo(
            this.x + this.w,
            this.y + this.h,
            this.x + this.w - r,
            this.y + this.h,
          )
          ctx.lineTo(this.x + r, this.y + this.h)
          ctx.quadraticCurveTo(this.x, this.y + this.h, this.x, this.y + this.h - r)
          ctx.lineTo(this.x, this.y + r)
          ctx.quadraticCurveTo(this.x, this.y, this.x + r, this.y)
          ctx.closePath()
          ctx.fill()
          ctx.strokeStyle = 'rgba(255,255,255,0.6)'
          ctx.lineWidth = 2
          ctx.stroke()
          // shine
          ctx.fillStyle = 'rgba(255,255,255,0.4)'
          ctx.beginPath()
          ctx.moveTo(this.x + 4, this.y + 4)
          ctx.lineTo(this.x + this.w * 0.4, this.y + 2)
          ctx.lineTo(this.x + 4, this.y + this.h * 0.3)
          ctx.closePath()
          ctx.fill()
          if (this.occupied && this.sink > 0) {
            ctx.strokeStyle = `rgba(100,100,100,${this.sink * 0.5})`
            ctx.lineWidth = 1
            for (let i = 0; i < 3; i++) {
              const cx = this.x + this.w * (0.2 + 0.3 * i),
                cy = this.y + this.h * 0.5
              ctx.beginPath()
              ctx.arc(cx, cy, 3 + (this.crackAnim % 3), 0, Math.PI * 2)
              ctx.stroke()
            }
          }
          ctx.restore()
        }
      }

      class Fish {
        constructor() {
          this.x = 0
          this.y = 0
          this.vx = 0
          this.vy = 0
          this.active = false
          this.timer = 0
          this.anim = 0
        }
        spawn() {
          this.x = 20 + Math.random() * (VW - 40)
          this.y = VH - 30
          this.vy = -(4 + Math.random() * 3)
          this.vx = (Math.random() - 0.5) * 2
          this.active = true
          this.timer = 120
          this.anim = 0
        }
        update() {
          if (!this.active) return
          this.vy += 0.3
          this.x += this.vx
          this.y += this.vy
          this.timer--
          if (this.y > VH - 20 || this.timer <= 0) this.active = false
          this.anim += 0.2
        }
        draw() {
          if (!this.active) return
          ctx.save()
          ctx.translate(this.x, this.y)
          ctx.fillStyle = '#C0C0C0'
          ctx.beginPath()
          ctx.ellipse(0, 0, 10, 4, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#E8E8E8'
          ctx.beginPath()
          ctx.ellipse(-3, 0, 6, 2, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#FF8C00'
          ctx.beginPath()
          ctx.ellipse(-9, 0, 3, 2.5, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#000'
          ctx.beginPath()
          ctx.arc(5, -1, 1.2, 0, Math.PI * 2)
          ctx.fill()
          if (Math.sin(this.anim) > 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.5)'
            ctx.beginPath()
            ctx.ellipse(-2, -2, 4, 1.5, -0.3, 0, Math.PI * 2)
            ctx.fill()
          }
          ctx.restore()
        }
        getBounds() {
          return { x: this.x - 10, y: this.y - 4, w: 20, h: 8 }
        }
      }

      class Lemming {
        constructor(x, y) {
          this.ox = x
          this.oy = y
          this.x = x
          this.y = y
          this.w = 22
          this.h = 26
          this.active = true
          this.anim = 0
          this.dir = -1
          this.pushTimer = 0
        }
        reset() {
          this.x = this.ox
          this.y = this.oy
          this.active = true
          this.pushTimer = 0
        }
        update(blocks) {
          if (!this.active) return
          this.anim += 0.03
          this.x += this.dir * 0.5
          if (this.x < 40 || this.x > VW - 40) this.dir *= -1
          for (let b of blocks) {
            if (!b.active) continue
            if (
              Math.abs(this.x + this.w / 2 - (b.x + b.w / 2)) < 30 &&
              Math.abs(this.y - b.y) < 20
            ) {
              b.sink += 0.02
              if (b.sink > 1) b.sink = 1
              b.y = b.oy + b.sink * 20
              b.h = b.baseH - b.sink * 20
              if (b.h < 2) b.h = 2
              this.pushTimer = 10
            }
          }
          if (this.pushTimer > 0) this.pushTimer--
        }
        draw() {
          if (!this.active) return
          ctx.save()
          ctx.translate(this.x + this.w / 2, this.y + this.h / 2)
          if (this.dir < 0) ctx.scale(-1, 1)
          const bob = Math.sin(this.anim) * 2
          // body gray
          ctx.fillStyle = '#7E8A9E'
          ctx.beginPath()
          ctx.ellipse(0, bob, 9, 11, 0, 0, Math.PI * 2)
          ctx.fill()
          // head
          ctx.fillStyle = '#8A9AAA'
          ctx.beginPath()
          ctx.ellipse(0, bob - 11, 7, 7, 0, 0, Math.PI * 2)
          ctx.fill()
          // face lighter
          ctx.fillStyle = '#A0B0C0'
          ctx.beginPath()
          ctx.ellipse(0, bob - 9, 5, 5, 0, 0, Math.PI * 2)
          ctx.fill()
          // eyes
          ctx.fillStyle = '#000'
          ctx.beginPath()
          ctx.arc(-3, bob - 12, 2, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(3, bob - 12, 2, 0, Math.PI * 2)
          ctx.fill()
          // nose
          ctx.fillStyle = '#666'
          ctx.beginPath()
          ctx.ellipse(0, bob - 7, 2, 1.5, 0, 0, Math.PI * 2)
          ctx.fill()
          // ears
          ctx.fillStyle = '#7E8A9E'
          ctx.beginPath()
          ctx.ellipse(-7, bob - 15, 4, 5, -0.3, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(7, bob - 15, 4, 5, 0.3, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#A0B0C0'
          ctx.beginPath()
          ctx.ellipse(-7, bob - 15, 2.5, 3, -0.3, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(7, bob - 15, 2.5, 3, 0.3, 0, Math.PI * 2)
          ctx.fill()
          // arms pushing
          if (this.pushTimer > 0) {
            ctx.fillStyle = '#7E8A9E'
            ctx.fillRect(-14, bob - 4, 6, 4)
            ctx.fillRect(8, bob - 4, 6, 4)
          } else {
            ctx.fillStyle = '#7E8A9E'
            ctx.fillRect(-12, bob - 2, 5, 3)
            ctx.fillRect(7, bob - 2, 5, 3)
          }
          ctx.restore()
        }
      }

      // Particles
      let particles = []
      function spawnJumpParticles(x, y) {
        for (let i = 0; i < 12; i++) {
          const a = Math.random() * Math.PI * 2,
            s = 1 + Math.random() * 2
          particles.push({
            x,
            y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s - 2,
            life: 30 + Math.random() * 20,
            maxLife: 50,
            size: 2 + Math.random() * 3,
            color: Math.random() > 0.5 ? '#E0F7FA' : '#fff',
          })
        }
      }
      function spawnFishParticles(x, y) {
        for (let i = 0; i < 8; i++) {
          const a = Math.random() * Math.PI * 2,
            s = 1 + Math.random() * 2
          particles.push({
            x,
            y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s - 1,
            life: 20 + Math.random() * 15,
            maxLife: 35,
            size: 2 + Math.random() * 2,
            color: '#C0C0C0',
          })
        }
      }
      function spawnFallParticles(x, y) {
        for (let i = 0; i < 20; i++) {
          const a = Math.random() * Math.PI * 2,
            s = 1 + Math.random() * 3
          particles.push({
            x,
            y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s,
            life: 40 + Math.random() * 30,
            maxLife: 70,
            size: 2 + Math.random() * 4,
            color: i % 2 == 0 ? '#1A6B8A' : '#fff',
          })
        }
      }

      let grizzy,
        blocks = [],
        fish,
        lemmings = []
      let score = 0,
        level = 0,
        gameState = 'title',
        fishTimer = 0,
        blockTimer = 0
      let waterLine = VH - 30
      let transitionTimer = 0

      function generateLevel(lvl) {
        blocks = []
        lemmings = []
        const count = Math.min(5 + Math.floor(lvl * 0.8), 20)
        const cols = Math.min(6, count)
        const spacing = Math.min(100, Math.floor(VW / (cols + 1)))
        const used = []
        for (let i = 0; i < count; i++) {
          let x,
            y,
            w,
            h,
            attempt = 0,
            ok
          do {
            ok = true
            x = 30 + Math.random() * (VW - 80)
            y = 50 + Math.random() * (VH - 100)
            w = 35 + Math.random() * 45
            h = 12 + Math.random() * 8
            for (let u of used) {
              if (
                Math.abs(x - u.x) < w / 2 + u.w / 2 + 8 &&
                Math.abs(y - u.y) < h / 2 + u.h / 2 + 8
              ) {
                ok = false
                break
              }
            }
            attempt++
          } while (!ok && attempt < 50)
          if (ok) {
            blocks.push(new IceBlock(x, y, w, h))
            used.push({ x, y, w, h })
          }
        }
        // ensure some blocks in lower area
        for (let i = 0; i < 2; i++) {
          const x = 50 + Math.random() * (VW - 100),
            y = VH - 70 - Math.random() * 20
          blocks.push(new IceBlock(x, y, 45 + Math.random() * 30, 14))
        }
        // lemmings
        const lemCount = Math.min(1 + Math.floor(lvl / 8), 5)
        for (let i = 0; i < lemCount; i++) {
          const x = 60 + Math.random() * (VW - 120),
            y = 40 + Math.random() * (VH - 120)
          lemmings.push(new Lemming(x, y))
        }
        grizzy.reset()
        grizzy.x = VW / 2 - grizzy.w / 2
        grizzy.y = 80
      }

      function drawBackground() {
        // sky
        const skyGrad = ctx.createLinearGradient(0, 0, 0, VH)
        skyGrad.addColorStop(0, '#4A90D9')
        skyGrad.addColorStop(0.5, '#87CEEB')
        skyGrad.addColorStop(1, '#B0E0FF')
        ctx.fillStyle = skyGrad
        ctx.fillRect(0, 0, VW, VH)
        // clouds
        ctx.fillStyle = 'rgba(255,255,255,0.6)'
        for (let i = 0; i < 5; i++) {
          const cx = ((i * 130 + Date.now() * 0.01) % (VW + 100)) - 50,
            cy = 20 + Math.sin(i * 2) * 15 + Math.sin(Date.now() * 0.001 + i) * 5
          ctx.beginPath()
          ctx.ellipse(cx, cy, 40, 15, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(cx + 25, cy - 5, 30, 12, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(cx - 20, cy + 3, 25, 10, 0, 0, Math.PI * 2)
          ctx.fill()
        }
        // mountains
        ctx.fillStyle = '#5A7A8A'
        ctx.beginPath()
        ctx.moveTo(0, VH - 60)
        for (let i = 0; i <= 10; i++) {
          const x = i * 60,
            y = VH - 60 - Math.sin(i * 0.8) * 20 - Math.random() * 10
          ctx.lineTo(x, y)
        }
        ctx.lineTo(VW, VH - 40)
        ctx.lineTo(0, VH - 40)
        ctx.closePath()
        ctx.fill()
        ctx.fillStyle = '#7A9AAA'
        ctx.beginPath()
        ctx.moveTo(0, VH - 50)
        for (let i = 0; i <= 10; i++) {
          const x = i * 60,
            y = VH - 50 - Math.sin(i * 0.6 + 1) * 15
          ctx.lineTo(x, y)
        }
        ctx.lineTo(VW, VH - 35)
        ctx.lineTo(0, VH - 35)
        ctx.closePath()
        ctx.fill()
        // snow caps
        ctx.fillStyle = '#fff'
        for (let i = 0; i <= 10; i++) {
          const x = i * 60,
            y = VH - 60 - Math.sin(i * 0.8) * 20 - Math.random() * 10
          ctx.beginPath()
          ctx.ellipse(x, y - 2, 8, 4, 0, 0, Math.PI * 2)
          ctx.fill()
        }
        // water
        const wGrad = ctx.createLinearGradient(0, VH - 32, 0, VH)
        wGrad.addColorStop(0, '#1A6B8A')
        wGrad.addColorStop(0.5, '#155A7A')
        wGrad.addColorStop(1, '#0E4A6A')
        ctx.fillStyle = wGrad
        ctx.fillRect(0, VH - 30, VW, 30)
        // water shine
        ctx.fillStyle = 'rgba(255,255,255,0.1)'
        for (let i = 0; i < 8; i++) {
          const wx = (i * 80 + Date.now() * 0.02) % VW
          ctx.beginPath()
          ctx.ellipse(wx, VH - 18 + Math.sin(i), 20, 3, 0, 0, Math.PI * 2)
          ctx.fill()
        }
        // icebergs
        ctx.fillStyle = 'rgba(200,230,240,0.5)'
        for (let i = 0; i < 3; i++) {
          const ix = 50 + i * 200 + Math.sin(i * 3) * 20,
            iy = VH - 28,
            iw = 40 + Math.sin(i * 2) * 15,
            ih = 8 + Math.sin(i) * 4
          ctx.beginPath()
          ctx.ellipse(ix, iy, iw, ih, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = 'rgba(220,245,255,0.3)'
          ctx.beginPath()
          ctx.ellipse(ix - 5, iy - 3, iw * 0.6, ih * 0.5, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = 'rgba(200,230,240,0.5)'
        }
      }

      function drawUI() {
        ctx.fillStyle = 'rgba(0,0,0,0.5)'
        ctx.fillRect(0, 0, VW, 28)
        ctx.fillStyle = '#fff'
        ctx.font = 'bold 14px "Segoe UI",Tahoma,sans-serif'
        ctx.textAlign = 'left'
        ctx.textBaseline = 'top'
        ctx.fillText(`Nivel: ${level + 1}`, 8, 6)
        ctx.textAlign = 'center'
        ctx.fillText(`🐧 ${score}`, VW / 2, 6)
        ctx.textAlign = 'right'
        const best = parseInt(localStorage.getItem('grizzy_penguin_best') || '0')
        ctx.fillText(`🏆 ${best}`, VW - 8, 6)
      }

      function drawTitle() {
        drawBackground()
        ctx.fillStyle = 'rgba(0,0,0,0.4)'
        ctx.fillRect(0, 0, VW, VH)
        ctx.fillStyle = '#fff'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.font = 'bold 32px "Segoe UI",Tahoma,sans-serif'
        ctx.fillText('El Pingüino Saltarín', VW / 2, VH / 2 - 70)
        ctx.font = '16px "Segoe UI",Tahoma,sans-serif'
        ctx.fillStyle = '#FFD700'
        ctx.fillText('🐧 Grizzy & the Lemmings 🐭', VW / 2, VH / 2 - 30)
        ctx.fillStyle = '#ddd'
        ctx.font = '14px "Segoe UI",Tahoma,sans-serif'
        ctx.fillText('⬅ ➡ o A/D: Moverse   ESPACIO o CLIC: Saltar', VW / 2, VH / 2 + 15)
        ctx.fillText('¡No caigas al agua! Atrapa peces 🐟 +20 pts', VW / 2, VH / 2 + 35)
        ctx.fillText('Evita a los Lemmings grises que empujan bloques', VW / 2, VH / 2 + 55)
        ctx.fillStyle = '#FFD700'
        ctx.font = 'bold 18px "Segoe UI",Tahoma,sans-serif'
        const pulse = Math.sin(Date.now() * 0.005) * 0.15 + 1
        ctx.save()
        ctx.translate(VW / 2, VH / 2 + 95)
        ctx.scale(pulse, pulse)
        ctx.fillText('Presiona ESPACIO o CLIC para empezar', 0, 0)
        ctx.restore()
        const best = parseInt(localStorage.getItem('grizzy_penguin_best') || '0')
        if (best > 0) {
          ctx.fillStyle = '#FFD700'
          ctx.font = '14px "Segoe UI",Tahoma,sans-serif'
          ctx.fillText(`🏆 Mejor puntuación: ${best}`, VW / 2, VH / 2 + 135)
        }
      }

      function drawGameOver() {
        drawBackground()
        blocks.forEach((b) => b.draw())
        lemmings.forEach((l) => l.draw())
        ctx.fillStyle = 'rgba(0,0,0,0.6)'
        ctx.fillRect(0, 0, VW, VH)
        ctx.fillStyle = '#FF4444'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.font = 'bold 36px "Segoe UI",Tahoma,sans-serif'
        ctx.fillText('¡GAME OVER!', VW / 2, VH / 2 - 60)
        ctx.fillStyle = '#fff'
        ctx.font = '20px "Segoe UI",Tahoma,sans-serif'
        ctx.fillText(`Puntuación: ${score}`, VW / 2, VH / 2 - 10)
        const best = parseInt(localStorage.getItem('grizzy_penguin_best') || '0')
        if (score > best) {
          localStorage.setItem('grizzy_penguin_best', score.toString())
          ctx.fillStyle = '#FFD700'
          ctx.font = 'bold 18px "Segoe UI",Tahoma,sans-serif'
          ctx.fillText('🎉 ¡NUEVO RÉCORD! 🎉', VW / 2, VH / 2 + 30)
        } else {
          ctx.fillStyle = '#aaa'
          ctx.font = '14px "Segoe UI",Tahoma,sans-serif'
          ctx.fillText(`Mejor: ${best}`, VW / 2, VH / 2 + 30)
        }
        ctx.fillStyle = '#FFD700'
        ctx.font = 'bold 16px "Segoe UI",Tahoma,sans-serif'
        const pulse = Math.sin(Date.now() * 0.005) * 0.15 + 1
        ctx.save()
        ctx.translate(VW / 2, VH / 2 + 70)
        ctx.scale(pulse, pulse)
        ctx.fillText('Presiona ESPACIO o CLIC para continuar', 0, 0)
        ctx.restore()
      }

      let winTimer = 0

      function checkWin() {
        if (blocks.every((b) => !b.active || (b.sink > 0.8 && b.h < 6))) {
          if (winTimer === 0) winTimer = 60
          winTimer--
          if (winTimer <= 0) {
            if (level + 1 >= 40) {
              ctx.fillStyle = 'rgba(0,0,0,0.6)'
              ctx.fillRect(0, 0, VW, VH)
              ctx.fillStyle = '#FFD700'
              ctx.textAlign = 'center'
              ctx.textBaseline = 'middle'
              ctx.font = 'bold 28px "Segoe UI",Tahoma,sans-serif'
              ctx.fillText('🎉 ¡FELICIDADES, COMPLETASTE EL JUEGO! 🎉', VW / 2, VH / 2)
              return true
            }
            level++
            generateLevel(level)
            winTimer = 0
            for (let i = 0; i < 20; i++) spawnJumpParticles(VW / 2, VH / 2)
            return true
          }
        }
        return false
      }

      function checkCollect() {
        if (!fish.active) return false
        const fb = fish.getBounds()
        if (
          grizzy.x + grizzy.w > fb.x &&
          grizzy.x < fb.x + fb.w &&
          grizzy.y + grizzy.h > fb.y &&
          grizzy.y < fb.y + fb.h
        ) {
          fish.active = false
          score += 20
          playSound('collect')
          spawnFishParticles(fish.x, fish.y)
          return true
        }
        return false
      }

      function checkLemmingCollision() {
        for (let l of lemmings) {
          if (!l.active) continue
          if (
            grizzy.x + grizzy.w - 4 > l.x &&
            grizzy.x + 4 < l.x + l.w &&
            grizzy.y + grizzy.h > l.y &&
            grizzy.y < l.y + l.h
          ) {
            playSound('fall')
            spawnFallParticles(grizzy.x + grizzy.w / 2, grizzy.y + grizzy.h / 2)
            return true
          }
        }
        return false
      }

      function gameLoop() {
        ctx.clearRect(0, 0, VW, VH)
        if (gameState === 'title') {
          drawTitle()
          requestAnimationFrame(gameLoop)
          return
        }
        if (gameState === 'gameover') {
          drawGameOver()
          requestAnimationFrame(gameLoop)
          return
        }
        // playing
        drawBackground()
        // update fish
        if (!fish.active && Math.random() < 0.008 + level * 0.001) fish.spawn()
        fish.update()
        for (let b of blocks) b.update(grizzy, level)
        for (let l of lemmings) {
          l.update(blocks)
          l.draw()
        }
        grizzy.update(blocks)
        checkCollect()
        if (checkLemmingCollision()) {
          gameOver()
          requestAnimationFrame(gameLoop)
          return
        }
        // check fall in water
        if (grizzy.y + grizzy.h > VH - 30 && !grizzy.onGround) {
          playSound('fall')
          spawnFallParticles(grizzy.x + grizzy.w / 2, grizzy.y + grizzy.h / 2)
          gameOver()
          requestAnimationFrame(gameLoop)
          return
        }
        // particles
        particles = particles.filter((p) => {
          p.x += p.vx
          p.y += p.vy
          p.vy += 0.1
          p.life--
          const a = p.life / p.maxLife
          ctx.globalAlpha = a
          ctx.fillStyle = p.color
          ctx.beginPath()
          ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2)
          ctx.fill()
          ctx.globalAlpha = 1
          return p.life > 0
        })
        // draw blocks
        for (let b of blocks) b.draw()
        fish.draw()
        grizzy.draw()
        drawUI()
        if (checkWin()) {
          if (level >= 40) {
            gameState = 'title'
            level = 0
            score = 0
            requestAnimationFrame(gameLoop)
            return
          }
        }
        requestAnimationFrame(gameLoop)
      }

      function gameOver() {
        gameState = 'gameover'
        playSound('gameover')
        const best = parseInt(localStorage.getItem('grizzy_penguin_best') || '0')
        if (score > best) localStorage.setItem('grizzy_penguin_best', score.toString())
      }

      function startGame() {
        initSound()
        gameState = 'playing'
        score = 0
        level = 0
        winTimer = 0
        generateLevel(0)
        fish = new Fish()
        particles = []
      }

      function handleJump(e) {
        if (e) e.preventDefault()
        if (gameState === 'title') {
          startGame()
          return
        }
        if (gameState === 'gameover') {
          startGame()
          return
        }
        if (gameState === 'playing') {
          KEY.jump = true
        }
      }

      document.addEventListener('keydown', (e) => {
        const k = e.key
        if (k === 'ArrowLeft' || k === 'a' || k === 'A') KEY.left = true
        if (k === 'ArrowRight' || k === 'd' || k === 'D') KEY.right = true
        if (k === ' ' || k === 'Space') {
          e.preventDefault()
          handleJump(e)
        }
        if (k === 'Enter') {
          if (gameState === 'title' || gameState === 'gameover') handleJump(e)
        }
      })
      document.addEventListener('keyup', (e) => {
        const k = e.key
        if (k === 'ArrowLeft' || k === 'a' || k === 'A') KEY.left = false
        if (k === 'ArrowRight' || k === 'd' || k === 'D') KEY.right = false
        if (k === ' ' || k === 'Space') KEY.jump = false
      })

      C.addEventListener('click', handleJump)
      C.addEventListener('touchstart', (e) => {
        e.preventDefault()
        handleJump(e)
      })

      // Touch move for left/right
      let touchX = 0
      C.addEventListener('touchstart', (e) => {
        touchX = e.touches[0].clientX
      })
      C.addEventListener('touchmove', (e) => {
        e.preventDefault()
        const x = e.touches[0].clientX
        const dx = x - touchX
        if (dx > 20) {
          KEY.right = true
          KEY.left = false
        } else if (dx < -20) {
          KEY.left = true
          KEY.right = false
        } else {
          KEY.left = false
          KEY.right = false
        }
      })
      C.addEventListener('touchend', (e) => {
        KEY.left = false
        KEY.right = false
      })

      initSound()
      grizzy = new Grizzy()
      generateLevel(0)
      fish = new Fish()
      gameLoop()

      // extra clicks on body for mobile
      document.body.addEventListener('click', (e) => {
        if (e.target === C) return
        if (gameState === 'title' || gameState === 'gameover') handleJump(e)
      })
    </script>
  </body>
</html>
