<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>🐻 Mini Carreras - Grizzy &amp; the Lemmings</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      canvas {
        display: block;
        background: #444;
        image-rendering: pixelated;
        max-width: 100vw;
        max-height: 100vh;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #fff;
        font-size: 14px;
        pointer-events: none;
        font-weight: bold;
        text-shadow: 1px 1px 2px #000;
      }
      #score {
        position: absolute;
        top: 10px;
        right: 10px;
        color: #ffc107;
        font-size: 18px;
        font-weight: bold;
        text-shadow: 1px 1px 3px #000;
        pointer-events: none;
      }
      #speed {
        position: absolute;
        bottom: 10px;
        right: 10px;
        color: #8bc34a;
        font-size: 14px;
        font-weight: bold;
        text-shadow: 1px 1px 2px #000;
        pointer-events: none;
      }
    </style>

    <script src="js/audio.js"></script>
    <script src="js/save.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/grizzy.js"></script>
    <script src="js/back.js"></script>
  </head>
  <body>
    <canvas id="gc"></canvas>
    <div id="ui">🐻 Mini Carreras</div>
    <div id="score">0</div>
    <div id="speed">0 km/h</div>

    <script>
      const canvas = document.getElementById('gc')
      const ctx = canvas.getContext('2d')
      const scoreDiv = document.getElementById('score')
      const speedDiv = document.getElementById('speed')

      const W = 400,
        H = 600
      canvas.width = W
      canvas.height = H

      function resize() {
        const scale = Math.min(window.innerWidth / W, window.innerHeight / H)
        canvas.style.width = W * scale + 'px'
        canvas.style.height = H * scale + 'px'
      }
      window.addEventListener('resize', resize)
      resize()

      // Audio context
      let actx = null
      function initAudio() {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)()
      }
      function playTone(freq, dur, type = 'square', vol = 0.08) {
        if (!actx) return
        const o = actx.createOscillator()
        const g = actx.createGain()
        o.type = type
        o.frequency.value = freq
        g.gain.setValueAtTime(vol, actx.currentTime)
        g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur)
        o.connect(g)
        g.connect(actx.destination)
        o.start()
        o.stop(actx.currentTime + dur)
      }
      function playEngine() {
        playTone(80, 0.1, 'sawtooth', 0.03)
      }
      function playCoin() {
        playTone(988, 0.08, 'square', 0.06)
        setTimeout(() => playTone(1319, 0.12, 'square', 0.06), 60)
      }
      function playCrash() {
        playTone(150, 0.3, 'sawtooth', 0.1)
        playTone(80, 0.5, 'square', 0.08)
        playTone(60, 0.6, 'sawtooth', 0.06)
      }
      function playGameOver() {
        playCrash()
        setTimeout(() => playTone(200, 0.4, 'square', 0.07), 300)
        setTimeout(() => playTone(160, 0.5, 'square', 0.06), 600)
      }

      // Particles
      class Particle {
        constructor(x, y, vx, vy, color, size, lifetime) {
          this.x = x
          this.y = y
          this.vx = vx
          this.vy = vy
          this.color = color
          this.size = size
          this.life = lifetime
          this.maxLife = lifetime
        }
        update() {
          this.x += this.vx
          this.y += this.vy
          this.vy += 0.05
          this.life--
          this.size *= 0.97
        }
        draw(ctx) {
          const a = this.life / this.maxLife
          ctx.globalAlpha = a
          ctx.fillStyle = this.color
          ctx.beginPath()
          ctx.arc(this.x, this.y, Math.max(0.5, this.size), 0, Math.PI * 2)
          ctx.fill()
          ctx.globalAlpha = 1
        }
        get dead() {
          return this.life <= 0
        }
      }

      let particles = []

      function spawnCoinParticles(x, y) {
        for (let i = 0; i < 12; i++) {
          const a = Math.random() * Math.PI * 2
          const spd = 1 + Math.random() * 3
          particles.push(
            new Particle(
              x,
              y,
              Math.cos(a) * spd,
              Math.sin(a) * spd - 1,
              '#FFC107',
              3 + Math.random() * 4,
              25 + Math.random() * 20,
            ),
          )
        }
        particles.push(new Particle(x, y, 0, 0, '#FFF', 6, 15))
      }
      function spawnCrashParticles(x, y) {
        const colors = ['#FF5722', '#FF9800', '#FFC107', '#FFF', '#FF3D00', '#E64A19']
        for (let i = 0; i < 30; i++) {
          const a = Math.random() * Math.PI * 2
          const spd = 2 + Math.random() * 5
          particles.push(
            new Particle(
              x,
              y,
              Math.cos(a) * spd,
              Math.sin(a) * spd - 1,
              colors[Math.floor(Math.random() * colors.length)],
              3 + Math.random() * 6,
              35 + Math.random() * 25,
            ),
          )
        }
        particles.push(new Particle(x, y, 0, -2, '#FFF', 10, 20))
        particles.push(new Particle(x, y, 0, -2, '#FFF', 8, 25))
      }

      // Game state
      const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 }
      let state = STATE.MENU
      let player = { x: 200, y: 520, w: 32, h: 36 }
      let enemies = []
      let coins = []
      let trees = []
      let score = 0,
        bestScore = parseInt(localStorage.getItem('grizzy_race_best')) || 0
      let speed = 2,
        frame = 0,
        roadOffset = 0
      let keys = {}
      let tick = 0,
        engineInterval = 0

      // Road markers
      let roadMarkers = []
      for (let i = 0; i < 12; i++) roadMarkers.push(i * 50)

      function resetGame() {
        player = { x: 200, y: 520, w: 32, h: 36 }
        enemies = []
        coins = []
        particles = []
        score = 0
        speed = 2
        frame = 0
        roadOffset = 0
        tick = 0
        spawnInitialTrees()
        state = STATE.PLAYING
        initAudio()
      }

      function spawnInitialTrees() {
        trees = []
        for (let i = 0; i < 12; i++) {
          trees.push({ x: 10 + Math.random() * 20, y: i * 55, size: 8 + Math.random() * 6 })
          trees.push({ x: W - 30 - Math.random() * 20, y: i * 55, size: 8 + Math.random() * 6 })
        }
      }

      function spawnEnemy() {
        const lane = Math.floor(Math.random() * 4)
        const lx = 60 + lane * 70
        const size = 28 + Math.floor(Math.random() * 8)
        enemies.push({
          x: lx,
          y: -50,
          w: size,
          h: size + 8,
          speed: 1 + Math.random() * (0.8 + speed * 0.12),
          color: Math.random() > 0.3 ? '#7E8A9E' : '#6B798E',
        })
      }

      function spawnCoin() {
        const lane = Math.floor(Math.random() * 4)
        coins.push({
          x: 60 + lane * 70 + 15,
          y: -20,
          w: 14,
          h: 14,
          active: true,
          sparkle: Math.random() * Math.PI * 2,
        })
      }

      function rectCollide(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y
      }

      function drawGrizzyCar(x, y, w, h) {
        const cx = x + w / 2,
          cy = y + h / 2
        // Body - brown oval
        ctx.fillStyle = '#6D4C2A'
        ctx.beginPath()
        ctx.ellipse(cx, cy, w * 0.55, h * 0.45, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.strokeStyle = '#4E3522'
        ctx.lineWidth = 2
        ctx.stroke()

        // Ears
        ctx.fillStyle = '#6D4C2A'
        ctx.beginPath()
        ctx.ellipse(cx - w * 0.3, cy - h * 0.3, 5, 5, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(cx + w * 0.3, cy - h * 0.3, 5, 5, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#8D6E4E'
        ctx.beginPath()
        ctx.ellipse(cx - w * 0.3, cy - h * 0.3, 3, 3, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(cx + w * 0.3, cy - h * 0.3, 3, 3, 0, 0, Math.PI * 2)
        ctx.fill()

        // Eyes - white
        ctx.fillStyle = '#FFF'
        ctx.beginPath()
        ctx.ellipse(cx - w * 0.12, cy - h * 0.05, 4, 5, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(cx + w * 0.12, cy - h * 0.05, 4, 5, 0, 0, Math.PI * 2)
        ctx.fill()
        // Pupils
        ctx.fillStyle = '#222'
        ctx.beginPath()
        ctx.ellipse(cx - w * 0.1, cy - h * 0.03, 2, 3, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(cx + w * 0.1, cy - h * 0.03, 2, 3, 0, 0, Math.PI * 2)
        ctx.fill()

        // Nose
        ctx.fillStyle = '#3E2723'
        ctx.beginPath()
        ctx.ellipse(cx, cy + h * 0.05, 3, 2, 0, 0, Math.PI * 2)
        ctx.fill()

        // Mouth
        ctx.strokeStyle = '#3E2723'
        ctx.lineWidth = 1
        ctx.beginPath()
        ctx.arc(cx, cy + h * 0.1, 4, 0, Math.PI)
        ctx.stroke()

        // Wheels
        ctx.fillStyle = '#333'
        ctx.beginPath()
        ctx.ellipse(cx - w * 0.35, cy - h * 0.02, 3, 4, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(cx + w * 0.35, cy - h * 0.02, 3, 4, 0, 0, Math.PI * 2)
        ctx.fill()
      }

      function roundRect(c, x, y, w, h, r) {
        c.beginPath()
        c.moveTo(x + r, y)
        c.lineTo(x + w - r, y)
        c.quadraticCurveTo(x + w, y, x + w, y + r)
        c.lineTo(x + w, y + h - r)
        c.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
        c.lineTo(x + r, y + h)
        c.quadraticCurveTo(x, y + h, x, y + h - r)
        c.lineTo(x, y + r)
        c.quadraticCurveTo(x, y, x + r, y)
        c.closePath()
      }

      function drawLemmingCar(x, y, w, h, color) {
        const cx = x + w / 2,
          cy = y + h / 2
        // Body (wheelbase)
        ctx.fillStyle = color || '#7E8A9E'
        roundRect(ctx, x + 2, y, w - 4, h, 5)
        ctx.fill()
        ctx.strokeStyle = '#5A6570'
        ctx.lineWidth = 1
        ctx.stroke()

        // Windows
        ctx.fillStyle = '#9AA8BB'
        roundRect(ctx, x + 4, y + 4, w - 8, h * 0.35, 3)
        ctx.fill()
        ctx.fillStyle = '#B0C4DE33'
        roundRect(ctx, x + 5, y + 5, w - 10, h * 0.25, 2)
        ctx.fill()

        // Headlights
        ctx.fillStyle = '#FFEB3B'
        ctx.beginPath()
        ctx.arc(x + 4, y + h - 4, 3, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(x + w - 4, y + h - 4, 3, 0, Math.PI * 2)
        ctx.fill()

        // Wheels
        ctx.fillStyle = '#333'
        ctx.beginPath()
        ctx.ellipse(x + 4, cy, 3, 4, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(x + w - 4, cy, 3, 4, 0, 0, Math.PI * 2)
        ctx.fill()

        // Lemming face
        ctx.fillStyle = '#C0C8D4'
        ctx.beginPath()
        ctx.arc(cx - 5, cy - 3, 3, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(cx + 5, cy - 3, 3, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#222'
        ctx.beginPath()
        ctx.arc(cx - 5, cy - 3, 1.5, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.arc(cx + 5, cy - 3, 1.5, 0, Math.PI * 2)
        ctx.fill()

        // Lemming ears
        ctx.fillStyle = '#AAB2C0'
        ctx.beginPath()
        ctx.ellipse(cx - 8, cy - 8, 2, 3, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(cx + 8, cy - 8, 2, 3, 0, 0, Math.PI * 2)
        ctx.fill()
      }

      function drawCoin(cx, cy, r, sparkle) {
        // Glow
        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2)
        glow.addColorStop(0, '#FFC10744')
        glow.addColorStop(1, '#FFC10700')
        ctx.fillStyle = glow
        ctx.beginPath()
        ctx.arc(cx, cy, r * 2, 0, Math.PI * 2)
        ctx.fill()

        // Coin body
        ctx.fillStyle = '#FFC107'
        ctx.beginPath()
        ctx.arc(cx, cy, r, 0, Math.PI * 2)
        ctx.fill()
        ctx.strokeStyle = '#FFA000'
        ctx.lineWidth = 2
        ctx.stroke()

        // Shine
        ctx.fillStyle = '#FFD54F'
        ctx.beginPath()
        ctx.arc(cx - r * 0.25, cy - r * 0.25, r * 0.35, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#FFF'
        ctx.beginPath()
        ctx.arc(cx - r * 0.2, cy - r * 0.2, r * 0.15, 0, Math.PI * 2)
        ctx.fill()

        // Sparkle
        const sa = sparkle !== undefined ? sparkle : 0
        const s = Math.sin(sa) * 3
        ctx.fillStyle = '#FFF'
        ctx.beginPath()
        ctx.arc(
          cx + Math.cos(sa) * r * 0.7,
          cy + Math.sin(sa) * r * 0.7,
          1.5 + Math.abs(s) * 0.5,
          0,
          Math.PI * 2,
        )
        ctx.fill()
        ctx.beginPath()
        ctx.arc(
          cx + Math.cos(sa + 2) * r * 0.6,
          cy + Math.sin(sa + 2) * r * 0.6,
          1 + Math.abs(Math.sin(sa + 1)) * 1,
          0,
          Math.PI * 2,
        )
        ctx.fill()
      }

      function drawTree(x, y, size) {
        // Trunk
        ctx.fillStyle = '#5D4037'
        ctx.fillRect(x - 2, y - size * 0.3, 4, size * 0.6)
        // Crown
        ctx.fillStyle = '#388E3C'
        ctx.beginPath()
        ctx.arc(x, y - size * 0.5, size, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#4CAF50'
        ctx.beginPath()
        ctx.arc(x + size * 0.2, y - size * 0.6, size * 0.7, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#2E7D32'
        ctx.beginPath()
        ctx.arc(x - size * 0.15, y - size * 0.4, size * 0.6, 0, Math.PI * 2)
        ctx.fill()
      }

      function drawRoad() {
        // Asphalt
        ctx.fillStyle = '#444'
        ctx.fillRect(0, 0, W, H)

        // Green borders
        ctx.fillStyle = '#4CAF50'
        ctx.fillRect(0, 0, 45, H)
        ctx.fillRect(W - 45, 0, 45, H)

        // Grass detail - darker stripe
        ctx.fillStyle = '#388E3C'
        ctx.fillRect(0, 0, 8, H)
        ctx.fillRect(W - 8, 0, 8, H)

        // Road edge lines
        ctx.fillStyle = '#FFF'
        ctx.fillRect(47, 0, 2, H)
        ctx.fillRect(W - 49, 0, 2, H)

        // Center dashed line
        ctx.strokeStyle = '#FFF'
        ctx.lineWidth = 2
        ctx.setLineDash([20, 15])
        ctx.beginPath()
        ctx.moveTo(W / 2, roadOffset % 35)
        ctx.lineTo(W / 2, H)
        ctx.stroke()
        ctx.setLineDash([])

        // Side reflectors
        ctx.fillStyle = '#FF5722'
        const rr = 3
        for (let i = 0; i < 12; i++) {
          const rY = ((i * 50 + roadOffset) % (H + 20)) - 10
          ctx.beginPath()
          ctx.arc(50, rY, rr, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(W - 50, rY, rr, 0, Math.PI * 2)
          ctx.fill()
        }
      }

      function drawMenu() {
        ctx.fillStyle = '#222'
        ctx.fillRect(0, 0, W, H)

        // Title
        ctx.fillStyle = '#FFC107'
        ctx.font = 'bold 36px "Segoe UI",sans-serif'
        ctx.textAlign = 'center'
        ctx.fillText('🐻 Mini Carreras', W / 2, 150)

        ctx.fillStyle = '#FFF'
        ctx.font = '16px "Segoe UI",sans-serif'
        ctx.fillText('Grizzy & the Lemmings', W / 2, 185)

        // Grizzy car preview
        drawGrizzyCar(W / 2 - 16, 220, 32, 36)

        // Instructions
        ctx.fillStyle = '#CCC'
        ctx.font = '14px "Segoe UI",sans-serif'
        ctx.fillText('← → o A/D para moverte', W / 2, 290)
        ctx.fillText('Esquiva a los Lemmings y recoge monedas', W / 2, 312)

        // Play button
        const bx = W / 2 - 70,
          by = 350,
          bw = 140,
          bh = 45
        ctx.fillStyle = '#4CAF50'
        roundRect(ctx, bx, by, bw, bh, 10)
        ctx.fill()
        ctx.fillStyle = '#FFF'
        ctx.font = 'bold 20px "Segoe UI",sans-serif'
        ctx.fillText('▶ JUGAR', W / 2, by + 30)

        // Best score
        if (bestScore > 0) {
          ctx.fillStyle = '#FFC107'
          ctx.font = '14px "Segoe UI",sans-serif'
          ctx.fillText('🏆 Mejor: ' + bestScore, W / 2, 430)
        }
      }

      function drawGameOver() {
        ctx.fillStyle = '#000000AA'
        ctx.fillRect(0, 0, W, H)

        ctx.fillStyle = '#F44336'
        ctx.font = 'bold 42px "Segoe UI",sans-serif'
        ctx.textAlign = 'center'
        ctx.fillText('GAME OVER', W / 2, H / 2 - 60)

        ctx.fillStyle = '#FFF'
        ctx.font = '20px "Segoe UI",sans-serif'
        ctx.fillText('Puntuación: ' + score, W / 2, H / 2)

        if (score >= bestScore && score > 0) {
          ctx.fillStyle = '#FFC107'
          ctx.font = 'bold 18px "Segoe UI",sans-serif'
          ctx.fillText('¡NUEVO RÉCORD!', W / 2, H / 2 + 35)
        } else {
          ctx.fillStyle = '#AAA'
          ctx.font = '16px "Segoe UI",sans-serif'
          ctx.fillText('Mejor: ' + bestScore, W / 2, H / 2 + 35)
        }

        const bx = W / 2 - 70,
          by = H / 2 + 65,
          bw = 140,
          bh = 45
        ctx.fillStyle = '#4CAF50'
        roundRect(ctx, bx, by, bw, bh, 10)
        ctx.fill()
        ctx.fillStyle = '#FFF'
        ctx.font = 'bold 18px "Segoe UI",sans-serif'
        ctx.fillText('↻ REINICIAR', W / 2, by + 30)
      }

      function drawHUD() {
        document.getElementById('ui').textContent = '🐻 Mini Carreras'
        scoreDiv.textContent = '💰 ' + score
        speedDiv.textContent = '⚡ ' + Math.round(speed * 22) + ' km/h'
        scoreDiv.style.display = 'block'
        speedDiv.style.display = 'block'
      }

      function update() {
        tick++
        if (state === STATE.MENU) {
          frame++
          return
        }
        if (state === STATE.GAMEOVER) {
          particles.forEach((p) => p.update())
          particles = particles.filter((p) => !p.dead)
          frame++
          return
        }

        // Speed increase
        const speedFactor = 1 + score / 300
        const targetSpeed = 2 + speedFactor * 3
        speed += (targetSpeed - speed) * 0.002

        // Road scroll
        roadOffset = (roadOffset + speed) % 35

        // Input
        const moveSpeed = 3.8
        if (keys['ArrowLeft'] || keys['KeyA']) player.x -= moveSpeed
        if (keys['ArrowRight'] || keys['KeyD']) player.x += moveSpeed
        player.x = Math.max(52, Math.min(W - 52 - player.w, player.x))

        // Engine sound
        engineInterval++
        if (engineInterval > 12) {
          playEngine()
          engineInterval = 0
        }

        // Spawn
        const spawnRate = Math.max(18, 60 - speed * 4)
        if (tick % Math.floor(spawnRate) === 0) spawnEnemy()
        if (tick % 30 === 0 && Math.random() < 0.35) spawnCoin()

        // Update enemies
        enemies.forEach((e) => {
          e.y += e.speed + speed * 0.3
        })
        enemies = enemies.filter((e) => e.y < H + 50)

        // Update coins
        coins.forEach((c) => {
          c.y += speed * 0.6
          c.sparkle += 0.08
        })
        coins = coins.filter((c) => c.y < H + 30)

        // Tree scroll
        trees.forEach((t) => {
          t.y += speed
          if (t.y > H + 20) {
            t.y = -20
            t.x = 10 + Math.random() * 20
            t.size = 8 + Math.random() * 6
          }
        })
        trees.forEach((t) => {
          t.y += speed
          if (t.y > H + 20) {
            t.y = -20
            const side = t.x < 45 ? 0 : 1
            t.x = side ? W - 30 - Math.random() * 20 : 10 + Math.random() * 20
            t.size = 8 + Math.random() * 6
          }
        })

        // Score
        score += Math.round(speed * 0.5)
        if (tick % 60 === 0) score += 1

        // Coin collision
        coins = coins.filter((c) => {
          if (!c.active) return false
          if (rectCollide(player, { x: c.x - 2, y: c.y - 2, w: c.w + 4, h: c.h + 4 })) {
            c.active = false
            score += 50
            playCoin()
            spawnCoinParticles(c.x + c.w / 2, c.y + c.h / 2)
            return false
          }
          return true
        })

        // Enemy collision
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i]
          if (rectCollide(player, e)) {
            playCrash()
            spawnCrashParticles(player.x + player.w / 2, player.y + player.h / 2)
            state = STATE.GAMEOVER
            if (score > bestScore) {
              bestScore = score
              localStorage.setItem('grizzy_race_best', bestScore)
            }
            setTimeout(() => playGameOver(), 400)
            break
          }
        }

        // Particles
        particles.forEach((p) => p.update())
        particles = particles.filter((p) => !p.dead)

        frame++
      }

      function draw() {
        ctx.clearRect(0, 0, W, H)

        if (state === STATE.MENU) {
          drawMenu()
          return
        }

        drawRoad()

        // Trees
        trees.forEach((t) => drawTree(t.x, t.y, t.size))

        // Coins
        coins.forEach((c) => drawCoin(c.x + c.w / 2, c.y + c.h / 2, 8, c.sparkle))

        // Enemies
        enemies.forEach((e) => drawLemmingCar(e.x, e.y, e.w, e.h, e.color))

        // Particles
        particles.forEach((p) => p.draw(ctx))

        // Player
        if (state === STATE.PLAYING) drawGrizzyCar(player.x, player.y, player.w, player.h)

        // Speed lines
        if (speed > 3) {
          ctx.strokeStyle = '#FFFFFF22'
          ctx.lineWidth = 1
          for (let i = 0; i < 3; i++) {
            const sx = 60 + Math.random() * (W - 120)
            const sy = Math.random() * H
            ctx.beginPath()
            ctx.moveTo(sx, sy)
            ctx.lineTo(sx, sy + 10 + speed * 2)
            ctx.stroke()
          }
        }

        drawHUD()

        if (state === STATE.GAMEOVER) drawGameOver()
      }

      function loop() {
        update()
        draw()
        requestAnimationFrame(loop)
      }

      // Click handler
      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect()
        const scaleX = W / rect.width
        const scaleY = H / rect.height
        const mx = (e.clientX - rect.left) * scaleX
        const my = (e.clientY - rect.top) * scaleY

        initAudio()

        if (state === STATE.MENU) {
          const bx = W / 2 - 70,
            by = 350,
            bw = 140,
            bh = 45
          if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) {
            resetGame()
          }
        } else if (state === STATE.GAMEOVER) {
          const bx = W / 2 - 70,
            by = H / 2 + 65,
            bw = 140,
            bh = 45
          if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) {
            resetGame()
          }
        }
      })

      // Keyboard
      document.addEventListener('keydown', (e) => {
        keys[e.code] = true
        if (e.code === 'Space' || e.code === 'Enter') {
          e.preventDefault()
          initAudio()
          if (state === STATE.MENU) resetGame()
          else if (state === STATE.GAMEOVER) resetGame()
        }
      })
      document.addEventListener('keyup', (e) => {
        keys[e.code] = false
      })

      // Touch support
      let touchX = null
      canvas.addEventListener(
        'touchstart',
        (e) => {
          e.preventDefault()
          const t = e.touches[0]
          touchX = t.clientX
          initAudio()
        },
        { passive: false },
      )
      canvas.addEventListener(
        'touchmove',
        (e) => {
          e.preventDefault()
          if (!touchX || state !== STATE.PLAYING) return
          const t = e.touches[0]
          const dx = t.clientX - touchX
          player.x += dx
          player.x = Math.max(52, Math.min(W - 52 - player.w, player.x))
          touchX = t.clientX
        },
        { passive: false },
      )
      canvas.addEventListener(
        'touchend',
        (e) => {
          e.preventDefault()
          touchX = null
          if (state === STATE.MENU || state === STATE.GAMEOVER) {
            const rect = canvas.getBoundingClientRect()
            const mx = ((e.changedTouches[0].clientX - rect.left) * W) / rect.width
            const my = ((e.changedTouches[0].clientY - rect.top) * H) / rect.height
            let bx, by, bw, bh
            if (state === STATE.MENU) {
              bx = W / 2 - 70
              by = 350
              bw = 140
              bh = 45
            } else {
              bx = W / 2 - 70
              by = H / 2 + 65
              bw = 140
              bh = 45
            }
            if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) resetGame()
          }
        },
        { passive: false },
      )

      // Start
      spawnInitialTrees()
      loop()
    </script>
  </body>
</html>
