<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
    <title>El Trenito Feliz - Grizzy &amp; the Lemmings</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
        background: #87ceeb;
        image-rendering: pixelated;
        max-width: 100vw;
        max-height: 100vh;
      }
      #ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #startScreen,
      #gameOverScreen {
        position: absolute;
        pointer-events: auto;
        text-align: center;
        color: #fff;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.78);
        border-radius: 16px;
        padding: 28px 36px;
        max-width: 88vw;
        border: 3px solid #8b5e3c;
      }
      #startScreen h1 {
        font-size: 2.4em;
        color: #ffc107;
        text-shadow: 3px 3px 0 #8b5e3c;
        margin-bottom: 4px;
        letter-spacing: 1px;
      }
      #startScreen .sub {
        color: #fff8e1;
        font-size: 1em;
        margin-bottom: 6px;
      }
      #startScreen .hint {
        color: #bbb;
        font-size: 0.8em;
        margin-bottom: 14px;
      }
      #gameOverScreen h1 {
        font-size: 2em;
        color: #e74c3c;
        margin-bottom: 8px;
      }
      #gameOverScreen .score {
        font-size: 1.5em;
        color: #ffc107;
        margin-bottom: 4px;
      }
      #gameOverScreen .detail {
        font-size: 0.95em;
        color: #ccc;
        margin-bottom: 2px;
      }
      #gameOverScreen .best {
        font-size: 1em;
        color: #aaa;
        margin-bottom: 16px;
      }
      .btn {
        pointer-events: auto;
        background: #d2691e;
        color: #fff;
        border: none;
        padding: 12px 32px;
        font-size: 1.2em;
        border-radius: 30px;
        cursor: pointer;
        margin-top: 6px;
        transition:
          transform 0.1s,
          background 0.2s;
        font-weight: bold;
        box-shadow: 0 3px 0 #8b5e3c;
      }
      .btn:hover {
        background: #e07b2e;
        transform: scale(1.04);
      }
      .btn:active {
        transform: scale(0.96);
        box-shadow: none;
      }
      @media (max-width: 500px) {
        #startScreen h1 {
          font-size: 1.5em;
        }
        #startScreen .sub {
          font-size: 0.8em;
        }
        #gameOverScreen h1 {
          font-size: 1.3em;
        }
        #gameOverScreen .score {
          font-size: 1.1em;
        }
        .btn {
          font-size: 1em;
          padding: 10px 24px;
        }
        #startScreen {
          padding: 18px 20px;
        }
        #gameOverScreen {
          padding: 18px 20px;
        }
      }
    </style>

    <script src="js/audio.js"></script>
    <script src="js/save.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/grizzy.js"></script>
    <script src="js/back.js"></script>
  </head>
  <body>
    <div id="wrapper">
      <canvas id="c"></canvas>
      <div id="ui">
        <div id="startScreen">
          <h1>🚂 EL TRENITO FELIZ</h1>
          <p class="sub">Grizzy &amp; the Lemmings</p>
          <p class="hint">
            ↑ Cambia vía arriba · ↓ Cambia vía abajo<br />¡Recoge pasajeros y evita los Lemmings!
          </p>
          <button class="btn" id="startBtn">¡PITAR!</button>
        </div>
        <div id="gameOverScreen">
          <h1>💥 GAME OVER</h1>
          <p class="score" id="finalScore">0 pts</p>
          <p class="detail" id="finalLevel">Nivel 1</p>
          <p class="detail" id="finalPassengers">Pasajeros: 0</p>
          <p class="best" id="bestScore">Mejor: 0</p>
          <button class="btn" id="restartBtn">OTRA VEZ</button>
        </div>
      </div>
    </div>
    <script>
      ;(function () {
        const c = document.getElementById('c')
        const ctx = c.getContext('2d')
        const VW = 600,
          VH = 360
        c.width = VW
        c.height = VH

        const startScreen = document.getElementById('startScreen')
        const gameOverScreen = document.getElementById('gameOverScreen')
        const startBtn = document.getElementById('startBtn')
        const restartBtn = document.getElementById('restartBtn')
        const finalScoreEl = document.getElementById('finalScore')
        const finalLevelEl = document.getElementById('finalLevel')
        const finalPassengersEl = document.getElementById('finalPassengers')
        const bestScoreEl = document.getElementById('bestScore')

        // ---- AUDIO ----
        let aCtx = null
        function initA() {
          if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)()
        }
        function tone(f, d, t = 'square', v = 0.1) {
          try {
            initA()
            const o = aCtx.createOscillator(),
              g = aCtx.createGain()
            o.type = t
            o.frequency.value = f
            g.gain.setValueAtTime(v, aCtx.currentTime)
            g.gain.exponentialRampToValueAtTime(0.001, aCtx.currentTime + d)
            o.connect(g)
            g.connect(aCtx.destination)
            o.start()
            o.stop(aCtx.currentTime + d)
          } catch (e) {}
        }
        function sndWhistle() {
          tone(660, 0.12, 'sine', 0.1)
          setTimeout(() => tone(880, 0.15, 'sine', 0.1), 100)
        }
        function sndPickup() {
          tone(660, 0.08, 'sine', 0.1)
          setTimeout(() => tone(880, 0.08, 'sine', 0.1), 60)
          setTimeout(() => tone(1100, 0.1, 'sine', 0.1), 120)
        }
        function sndCrash() {
          tone(150, 0.2, 'sawtooth', 0.12)
          setTimeout(() => tone(120, 0.15, 'sawtooth', 0.1), 80)
          setTimeout(() => tone(90, 0.3, 'sawtooth', 0.08), 160)
        }
        function sndGameOver() {
          tone(400, 0.15, 'sawtooth', 0.1)
          setTimeout(() => tone(300, 0.15, 'sawtooth', 0.1), 150)
          setTimeout(() => tone(200, 0.3, 'sawtooth', 0.08), 300)
        }
        function sndLevelUp() {
          tone(523, 0.1, 'sine', 0.1)
          setTimeout(() => tone(659, 0.1, 'sine', 0.1), 80)
          setTimeout(() => tone(784, 0.12, 'sine', 0.1), 160)
        }
        function sndLifeLost() {
          tone(300, 0.12, 'square', 0.1)
          setTimeout(() => tone(200, 0.15, 'square', 0.08), 100)
        }

        // ---- CONSTS ----
        const LANE_Y = [165, 220, 275]
        const TRAIN_W = 76,
          TRAIN_H = 48
        const PLAYER_X = 130
        const COLLIDE_DIST = 30
        const PICKUP_DIST = 28
        const TOTAL_LEVELS = 40

        // ---- STATE ----
        let state = 'menu'
        let score = 0,
          lives = 3,
          level = 1
        let bestScore = parseInt(localStorage.getItem('grizzy_train_best')) || 0
        let scrollOffset = 0,
          worldLength = 0
        let speed = 2
        let playerLane = 1
        let laneChanging = false,
          laneChangeFrom = 1,
          laneChangeTo = 1,
          laneChangeTimer = 0
        let laneCooldown = 0
        let invulnerable = 0
        let passengers = 0
        let levelData = null
        let particles = []
        let floatingTexts = []
        let junctionActive = false
        let activeJunction = null
        let screenShake = 0
        let frameCount = 0
        let switchHintTimer = 0
        let progress = 0

        // Touch
        let touchStartY = 0,
          touchStartX = 0
        let swiped = false

        // ---- HELPERS ----
        function clamp(v, mn, mx) {
          return Math.max(mn, Math.min(mx, v))
        }
        function rand(mn, mx) {
          return mn + Math.random() * (mx - mn)
        }
        function randInt(mn, mx) {
          return Math.floor(rand(mn, mx + 1))
        }

        // ---- LEVEL GEN ----
        function genLevel(lv) {
          worldLength = 2800 + lv * 90
          speed = 1.8 + lv * 0.085
          const stationCount = Math.min(5 + Math.floor(lv * 0.35), 24)
          const enemyCount = Math.min(2 + Math.floor(lv * 0.5), 20)

          const junctions = []
          let jx = 350 + Math.random() * 80
          const jSpacing = Math.max(200, 300 - lv * 2.5)
          while (jx < worldLength - 300) {
            const up = playerLane > 0 && Math.random() < 0.7
            const down = playerLane < 2 && Math.random() < 0.7
            if (up || down) {
              junctions.push({ worldX: jx, up, down, used: false })
            }
            jx += jSpacing + rand(0, 120)
          }

          const stations = []
          for (let i = 0; i < stationCount; i++) {
            let wx
            let a = 0
            do {
              wx = 300 + rand(0, worldLength - 500)
              a++
            } while (
              a < 60 &&
              (stations.some((s) => Math.abs(s.worldX - wx) < 190) ||
                junctions.some((j) => Math.abs(j.worldX - wx) < 160))
            )
            stations.push({ worldX: wx, lane: randInt(0, 2), collected: false })
          }

          const enemies = []
          for (let i = 0; i < enemyCount; i++) {
            let wx
            let a = 0
            do {
              wx = 400 + rand(0, worldLength - 500)
              a++
            } while (
              a < 60 &&
              (enemies.some((e) => Math.abs(e.worldX - wx) < 240) ||
                stations.some((s) => Math.abs(s.worldX - wx) < 190) ||
                junctions.some((j) => Math.abs(j.worldX - wx) < 180))
            )
            enemies.push({ worldX: wx, lane: randInt(0, 2), hit: false })
          }

          return { junctions, stations, enemies }
        }

        // ---- PARTICLES & TEXTS ----
        function spawnParticles(x, y, color, count = 10) {
          for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2
            const sp = 0.8 + Math.random() * 2.5
            particles.push({
              x,
              y,
              vx: Math.cos(a) * sp,
              vy: Math.sin(a) * sp - 1,
              life: 1,
              decay: 0.015 + Math.random() * 0.02,
              r: 2 + Math.random() * 4,
              color,
            })
          }
        }
        function spawnText(x, y, text, color = '#FFD700') {
          floatingTexts.push({ x, y, text, color, life: 1, vy: -1.5 })
        }

        // ---- GAME OPS ----
        function startGame() {
          const s = localStorage.getItem('grizzy_train_best')
          if (s) {
            const d = parseInt(s)
            if (d > bestScore) bestScore = d
          }
          score = 0
          lives = 3
          level = 1
          passengers = 0
          playerLane = 1
          laneChanging = false
          laneCooldown = 0
          invulnerable = 0
          scrollOffset = 0
          particles = []
          floatingTexts = []
          screenShake = 0
          junctionActive = false
          activeJunction = null
          levelData = genLevel(level)
          state = 'playing'
          startScreen.style.display = 'none'
          gameOverScreen.style.display = 'none'
          sndWhistle()
        }

        function gameOver() {
          state = 'gameover'
          sndGameOver()
          if (score > bestScore) {
            bestScore = score
            localStorage.setItem('grizzy_train_best', bestScore.toString())
          }
          finalScoreEl.textContent = 'Puntuación: ' + score
          finalLevelEl.textContent = 'Nivel ' + level + '/' + TOTAL_LEVELS
          finalPassengersEl.textContent = 'Pasajeros: ' + passengers
          bestScoreEl.textContent = 'Mejor: ' + bestScore
          gameOverScreen.style.display = 'flex'
        }

        function levelUp() {
          if (level >= TOTAL_LEVELS) {
            gameOver()
            return
          }
          level++
          sndLevelUp()
          scrollOffset = 0
          playerLane = clamp(playerLane, 0, 2)
          laneChanging = false
          laneCooldown = 0
          invulnerable = 60
          levelData = genLevel(level)
          particles = []
          floatingTexts = []
          screenShake = 0
          junctionActive = false
          activeJunction = null
        }

        function changeLane(dir) {
          const nl = playerLane + dir
          if (nl < 0 || nl > 2) return
          if (laneChanging || laneCooldown > 0) return
          laneChanging = true
          laneChangeFrom = playerLane
          laneChangeTo = nl
          laneChangeTimer = 0
          laneCooldown = 18
        }

        function getPlayerY() {
          if (!laneChanging) return LANE_Y[playerLane]
          const t = laneChangeTimer / 12
          const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t
          return LANE_Y[laneChangeFrom] + (LANE_Y[laneChangeTo] - LANE_Y[laneChangeFrom]) * ease
        }

        // ---- UPDATE ----
        function update() {
          if (state !== 'playing') return
          frameCount++

          scrollOffset += speed
          progress = Math.min(scrollOffset / worldLength, 1)

          if (laneCooldown > 0) laneCooldown--

          if (laneChanging) {
            laneChangeTimer++
            if (laneChangeTimer >= 12) {
              laneChanging = false
              playerLane = laneChangeTo
            }
          }

          if (invulnerable > 0) invulnerable--

          const pWorldX = scrollOffset + PLAYER_X

          // Check junctions
          junctionActive = false
          activeJunction = null
          for (const j of levelData.junctions) {
            if (j.used) continue
            const diff = j.worldX - pWorldX
            if (diff > -15 && diff < 35) {
              junctionActive = true
              activeJunction = j
              break
            }
          }

          // Station pickup
          for (const s of levelData.stations) {
            if (s.collected) continue
            if (
              Math.abs(s.worldX - scrollOffset - PLAYER_X) < PICKUP_DIST &&
              s.lane === playerLane
            ) {
              s.collected = true
              passengers++
              score += 10
              sndPickup()
              spawnParticles(PLAYER_X, LANE_Y[s.lane], '#FFC107', 14)
              spawnText(PLAYER_X, LANE_Y[s.lane] - 35, '+10')
            }
          }

          // Enemy collision
          for (const e of levelData.enemies) {
            if (e.hit) continue
            const ex = e.worldX - scrollOffset
            if (ex < -120) continue
            const ppx = PLAYER_X
            const ppy = getPlayerY()
            const ey = LANE_Y[e.lane]
            if (Math.abs(ex - ppx) < COLLIDE_DIST && Math.abs(ey - ppy) < 28) {
              if (invulnerable <= 0) {
                e.hit = true
                lives--
                sndCrash()
                screenShake = 14
                spawnParticles(ppx, ppy, '#e74c3c', 22)
                spawnText(ppx, ppy - 35, '💥', '#e74c3c')
                if (lives <= 0) {
                  gameOver()
                  return
                }
                invulnerable = 60
                sndLifeLost()
              }
            }
          }

          // Level complete
          if (scrollOffset >= worldLength) {
            levelUp()
            return
          }

          // Particles
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i]
            p.x += p.vx
            p.y += p.vy
            p.vy += 0.06
            p.life -= p.decay
            if (p.life <= 0 || p.y > VH + 10) particles.splice(i, 1)
          }

          // Floating texts
          for (let i = floatingTexts.length - 1; i >= 0; i--) {
            const f = floatingTexts[i]
            f.y += f.vy
            f.life -= 0.018
            if (f.life <= 0) floatingTexts.splice(i, 1)
          }

          if (screenShake > 0) screenShake--
        }

        // ---- DRAWING ----
        function drawBackground() {
          const g = ctx.createLinearGradient(0, 0, 0, 140)
          g.addColorStop(0, '#4A90D9')
          g.addColorStop(1, '#87CEEB')
          ctx.fillStyle = g
          ctx.fillRect(0, 0, VW, 140)

          ctx.fillStyle = '#4CAF50'
          ctx.fillRect(0, 140, VW, VH - 140)

          ctx.fillStyle = '#6B8E23'
          ctx.fillRect(0, 140, VW, 3)

          // Sun
          const sunX = 510,
            sunY = 45
          const sg = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 55)
          sg.addColorStop(0, '#FFF8E1')
          sg.addColorStop(0.3, '#FFC107')
          sg.addColorStop(1, 'rgba(255,193,7,0)')
          ctx.fillStyle = sg
          ctx.beginPath()
          ctx.arc(sunX, sunY, 55, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#FFC107'
          ctx.beginPath()
          ctx.arc(sunX, sunY, 26, 0, Math.PI * 2)
          ctx.fill()
          ctx.strokeStyle = 'rgba(255,193,7,.25)'
          ctx.lineWidth = 2
          for (let i = 0; i < 12; i++) {
            const a = (i * Math.PI) / 6 + Math.sin(frameCount * 0.02) * 0.05
            ctx.beginPath()
            ctx.moveTo(sunX + Math.cos(a) * 30, sunY + Math.sin(a) * 30)
            ctx.lineTo(sunX + Math.cos(a) * 44, sunY + Math.sin(a) * 44)
            ctx.stroke()
          }

          // Mountains
          ctx.fillStyle = '#5D8A3C'
          ctx.beginPath()
          ctx.moveTo(0, 170)
          ctx.lineTo(55, 115)
          ctx.lineTo(120, 162)
          ctx.lineTo(190, 100)
          ctx.lineTo(270, 155)
          ctx.lineTo(350, 88)
          ctx.lineTo(420, 148)
          ctx.lineTo(500, 105)
          ctx.lineTo(560, 152)
          ctx.lineTo(VW, 135)
          ctx.lineTo(VW, 170)
          ctx.fill()
          ctx.fillStyle = '#6DA544'
          ctx.beginPath()
          ctx.moveTo(0, 160)
          ctx.lineTo(75, 125)
          ctx.lineTo(150, 158)
          ctx.lineTo(230, 118)
          ctx.lineTo(310, 153)
          ctx.lineTo(390, 108)
          ctx.lineTo(460, 148)
          ctx.lineTo(530, 115)
          ctx.lineTo(VW, 145)
          ctx.lineTo(VW, 160)
          ctx.fill()

          // Clouds
          const co = (frameCount * 0.12) % 720
          drawCloud(40 - co, 22, 1)
          drawCloud(210 - co, 38, 0.85)
          drawCloud(400 - co, 28, 0.9)
          drawCloud(580 - co, 18, 0.7)
          drawCloud(-130 - co, 32, 1.1)
          drawCloud(690 - co, 20, 0.75)

          // Grass details
          ctx.strokeStyle = '#3E8E41'
          ctx.lineWidth = 1.5
          for (let i = 0; i < 22; i++) {
            const gx = (i * 29 + frameCount * 0.15) % VW
            const gy = 146 + Math.sin(i * 2.5) * 2.5
            ctx.beginPath()
            ctx.moveTo(gx, gy)
            ctx.lineTo(gx - 3, gy - 7)
            ctx.moveTo(gx, gy)
            ctx.lineTo(gx + 2, gy - 9)
            ctx.moveTo(gx, gy)
            ctx.lineTo(gx + 5, gy - 6)
            ctx.stroke()
          }
        }

        function drawCloud(x, y, s) {
          ctx.fillStyle = 'rgba(255,255,255,0.8)'
          ctx.beginPath()
          ctx.arc(x, y, 14 * s, 0, Math.PI * 2)
          ctx.arc(x + 18 * s, y - 4 * s, 18 * s, 0, Math.PI * 2)
          ctx.arc(x + 36 * s, y, 12 * s, 0, Math.PI * 2)
          ctx.arc(x + 18 * s, y + 3 * s, 13 * s, 0, Math.PI * 2)
          ctx.fill()
        }

        function drawTracks() {
          for (let li = 0; li < 3; li++) {
            const y = LANE_Y[li]
            // Sleepers
            ctx.fillStyle = '#6B4226'
            for (let tx = -((scrollOffset * 1.2) % 32); tx < VW + 32; tx += 32) {
              ctx.fillRect(tx, y - 3, 26, 6)
            }
            // Rails
            ctx.fillStyle = '#666'
            ctx.fillRect(0, y - 4, VW, 2)
            ctx.fillRect(0, y + 2, VW, 2)
            ctx.fillStyle = '#999'
            ctx.fillRect(0, y - 3.5, VW, 1)
            ctx.fillRect(0, y + 2.5, VW, 1)
            // Gravel bed
            ctx.fillStyle = 'rgba(139,90,43,.15)'
            ctx.fillRect(0, y + 5, VW, 7)
          }
        }

        function drawJunctions() {
          if (!levelData) return
          for (const j of levelData.junctions) {
            const sx = j.worldX - scrollOffset
            if (sx < -120 || sx > VW + 120) continue
            const isActive = j === activeJunction
            const cx = sx + 18
            const cy = LANE_Y[playerLane]

            // Diagonal track preview
            ctx.strokeStyle = 'rgba(100,100,100,0.5)'
            ctx.lineWidth = 2
            ctx.setLineDash([4, 4])
            if (j.up && playerLane > 0) {
              ctx.beginPath()
              ctx.moveTo(sx + 5, cy - 5)
              ctx.lineTo(sx + 38, cy - 58)
              ctx.stroke()
              ctx.beginPath()
              ctx.moveTo(sx + 5, cy + 3)
              ctx.lineTo(sx + 38, cy - 50)
              ctx.stroke()
            }
            if (j.down && playerLane < 2) {
              ctx.beginPath()
              ctx.moveTo(sx + 5, cy + 5)
              ctx.lineTo(sx + 38, cy + 58)
              ctx.stroke()
              ctx.beginPath()
              ctx.moveTo(sx + 5, cy - 3)
              ctx.lineTo(sx + 38, cy + 50)
              ctx.stroke()
            }
            ctx.setLineDash([])

            // Junction pole
            ctx.fillStyle = '#5C3A1E'
            ctx.fillRect(sx + 15, cy - 30, 4, 60)

            // Indicator board
            ctx.fillStyle = isActive ? '#FFD700' : 'rgba(200,180,100,0.3)'
            ctx.fillRect(sx + 12, cy - 10, 10, 20)

            if (isActive) {
              ctx.fillStyle = '#FFD700'
              ctx.font = 'bold 12px sans-serif'
              ctx.textAlign = 'center'
              if (j.up && playerLane > 0) ctx.fillText('↑', cx, cy - 36)
              if (j.down && playerLane < 2) ctx.fillText('↓', cx, cy + 48)
            }

            // Glow when active
            if (isActive) {
              ctx.fillStyle = 'rgba(255,215,0,0.15)'
              ctx.beginPath()
              ctx.arc(cx, cy, 40, 0, Math.PI * 2)
              ctx.fill()
            }
          }
        }

        function drawPlayerTrain() {
          const px = PLAYER_X
          const py = getPlayerY()
          const sx = screenShake > 0 ? (Math.random() - 0.5) * screenShake * 1.2 : 0
          const sy = screenShake > 0 ? (Math.random() - 0.5) * screenShake * 0.8 : 0
          const dx = px + sx,
            dy = py + sy

          ctx.save()
          ctx.translate(dx, dy)

          // Wheels
          ctx.fillStyle = '#333'
          for (let wx of [-22, 10, 36]) {
            ctx.beginPath()
            ctx.arc(wx, 22, 8, 0, Math.PI * 2)
            ctx.fill()
            ctx.fillStyle = '#555'
            ctx.beginPath()
            ctx.arc(wx, 22, 5, 0, Math.PI * 2)
            ctx.fill()
            ctx.fillStyle = '#888'
            ctx.beginPath()
            ctx.arc(wx, 22, 2, 0, Math.PI * 2)
            ctx.fill()
            ctx.fillStyle = '#333'
          }

          // Shadow
          ctx.fillStyle = 'rgba(0,0,0,.12)'
          ctx.beginPath()
          ctx.ellipse(3, 28, 38, 6, 0, 0, Math.PI * 2)
          ctx.fill()

          // Locomotive body
          ctx.fillStyle = '#8B5E3C'
          ctx.beginPath()
          ctx.roundRect(-28, -22, 60, 42, 4)
          ctx.fill()
          ctx.fillStyle = '#7A4E2C'
          ctx.fillRect(-28, -22, 60, 2)
          // Cabin highlight
          ctx.fillStyle = '#A67C52'
          ctx.fillRect(-28, -22, 60, 7)

          // Cabin window
          ctx.fillStyle = '#B8E4F0'
          ctx.beginPath()
          ctx.roundRect(-5, -18, 10, 11, 2)
          ctx.fill()
          ctx.strokeStyle = '#5C3A1E'
          ctx.lineWidth = 1.2
          ctx.beginPath()
          ctx.roundRect(-5, -18, 10, 11, 2)
          ctx.stroke()

          // Chimney
          ctx.fillStyle = '#5C3A1E'
          ctx.fillRect(20, -28, 10, 12)
          ctx.fillRect(18, -30, 14, 4)

          // Smoke
          const puff = Math.sin(frameCount * 0.12) * 0.5 + 0.5
          ctx.fillStyle = `rgba(200,200,200,${puff * 0.25})`
          ctx.beginPath()
          ctx.arc(25, -36 + Math.sin(frameCount * 0.08) * 2, 5 + puff * 3, 0, Math.PI * 2)
          ctx.fill()

          // Grizzy face on front
          const fx = 26,
            fy = -1
          const sc = 1.1
          // Ears
          ctx.fillStyle = '#6B4226'
          ctx.beginPath()
          ctx.arc(fx - 7 * sc, fy - 14 * sc, 5 * sc, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(fx + 7 * sc, fy - 14 * sc, 5 * sc, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#C48B5C'
          ctx.beginPath()
          ctx.arc(fx - 7 * sc, fy - 14 * sc, 2.5 * sc, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(fx + 7 * sc, fy - 14 * sc, 2.5 * sc, 0, Math.PI * 2)
          ctx.fill()
          // Head
          ctx.fillStyle = '#C48B5C'
          ctx.beginPath()
          ctx.arc(fx, fy, 13 * sc, 0, Math.PI * 2)
          ctx.fill()
          // Eyes
          ctx.fillStyle = '#222'
          ctx.beginPath()
          ctx.arc(fx - 4 * sc, fy - 3 * sc, 2.5 * sc, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(fx + 4 * sc, fy - 3 * sc, 2.5 * sc, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.arc(fx - 3 * sc, fy - 4 * sc, 1 * sc, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(fx + 5 * sc, fy - 4 * sc, 1 * sc, 0, Math.PI * 2)
          ctx.fill()
          // Nose
          ctx.fillStyle = '#222'
          ctx.beginPath()
          ctx.ellipse(fx, fy + 2 * sc, 2.5 * sc, 2 * sc, 0, 0, Math.PI * 2)
          ctx.fill()
          // Smile
          ctx.strokeStyle = '#222'
          ctx.lineWidth = 1.2 * sc
          ctx.beginPath()
          ctx.arc(fx, fy + 5 * sc, 4.5 * sc, 0.1, Math.PI - 0.1)
          ctx.stroke()
          // Eyebrows
          ctx.strokeStyle = '#6B4226'
          ctx.lineWidth = 1.5 * sc
          ctx.beginPath()
          ctx.moveTo(fx - 7 * sc, fy - 8 * sc)
          ctx.lineTo(fx - 2 * sc, fy - 6 * sc)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(fx + 7 * sc, fy - 8 * sc)
          ctx.lineTo(fx + 2 * sc, fy - 6 * sc)
          ctx.stroke()

          // Underbody
          ctx.fillStyle = '#5C3A1E'
          ctx.fillRect(-28, 19, 60, 3)

          // Cowcatcher
          ctx.fillStyle = '#999'
          ctx.beginPath()
          ctx.moveTo(30, -3)
          ctx.lineTo(34, 5)
          ctx.lineTo(28, 5)
          ctx.fill()

          ctx.restore()
        }

        function drawEnemyTrain(e) {
          const ex = e.worldX - scrollOffset
          if (ex < -90 || ex > VW + 90) return
          const ey = LANE_Y[e.lane]

          ctx.save()
          ctx.translate(ex, ey)

          // Wheels
          ctx.fillStyle = '#333'
          for (let wx of [-20, 8, 34]) {
            ctx.beginPath()
            ctx.arc(wx, 22, 7, 0, Math.PI * 2)
            ctx.fill()
            ctx.fillStyle = '#555'
            ctx.beginPath()
            ctx.arc(wx, 22, 4.5, 0, Math.PI * 2)
            ctx.fill()
            ctx.fillStyle = '#888'
            ctx.beginPath()
            ctx.arc(wx, 22, 1.5, 0, Math.PI * 2)
            ctx.fill()
          }

          // Shadow
          ctx.fillStyle = 'rgba(0,0,0,.12)'
          ctx.beginPath()
          ctx.ellipse(3, 28, 35, 5, 0, 0, Math.PI * 2)
          ctx.fill()

          // Body
          ctx.fillStyle = '#7E8A9E'
          ctx.beginPath()
          ctx.roundRect(-26, -20, 54, 40, 4)
          ctx.fill()
          ctx.fillStyle = '#6B7588'
          ctx.fillRect(-26, -20, 54, 2)

          // Windows
          ctx.fillStyle = '#A0B0C8'
          ctx.fillRect(-16, -12, 8, 8)
          ctx.fillRect(8, -12, 8, 8)

          // Lemming face
          const fx = 24,
            fy = -2
          // Ears
          ctx.fillStyle = '#9EA8B8'
          ctx.beginPath()
          ctx.arc(fx - 5, fy - 11, 3.5, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(fx + 5, fy - 11, 3.5, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#D4A5A5'
          ctx.beginPath()
          ctx.arc(fx - 5, fy - 11, 1.5, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(fx + 5, fy - 11, 1.5, 0, Math.PI * 2)
          ctx.fill()
          // Head
          ctx.fillStyle = '#7E8A9E'
          ctx.beginPath()
          ctx.arc(fx, fy, 9, 0, Math.PI * 2)
          ctx.fill()
          // Eyes
          ctx.fillStyle = '#222'
          ctx.beginPath()
          ctx.arc(fx - 3, fy - 1, 1.8, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(fx + 3, fy - 1, 1.8, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.arc(fx - 2.5, fy - 2, 0.8, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(fx + 3.5, fy - 2, 0.8, 0, Math.PI * 2)
          ctx.fill()
          // Grin
          ctx.strokeStyle = '#222'
          ctx.lineWidth = 1
          ctx.beginPath()
          ctx.arc(fx, fy + 3, 2.5, 0.2, Math.PI - 0.2)
          ctx.stroke()
          ctx.fillStyle = '#fff'
          ctx.fillRect(fx - 1.5, fy + 2.5, 1, 1.5)
          ctx.fillRect(fx + 0.5, fy + 2.5, 1, 1.5)

          ctx.restore()
        }

        function drawStation(s) {
          const sx = s.worldX - scrollOffset
          if (sx < -90 || sx > VW + 90 || s.collected) return
          const sy = LANE_Y[s.lane]

          ctx.save()
          ctx.translate(sx, sy)

          // Shadow
          ctx.fillStyle = 'rgba(0,0,0,.1)'
          ctx.beginPath()
          ctx.ellipse(3, 26, 36, 4, 0, 0, Math.PI * 2)
          ctx.fill()

          // Platform
          ctx.fillStyle = '#8B6914'
          ctx.fillRect(-34, 22, 68, 7)
          ctx.fillStyle = '#A67C52'
          ctx.fillRect(-34, 22, 68, 3)

          // Posts
          ctx.fillStyle = '#6B4226'
          ctx.fillRect(-30, -18, 4, 40)
          ctx.fillRect(26, -18, 4, 40)

          // Roof
          ctx.fillStyle = '#C0392B'
          ctx.beginPath()
          ctx.moveTo(-36, -22)
          ctx.lineTo(0, -36)
          ctx.lineTo(36, -22)
          ctx.fill()
          ctx.fillStyle = '#E74C3C'
          ctx.beginPath()
          ctx.moveTo(-32, -20)
          ctx.lineTo(0, -33)
          ctx.lineTo(32, -20)
          ctx.fill()

          // Sign
          ctx.fillStyle = '#FFF8E1'
          ctx.fillRect(-9, -32, 18, 7)
          ctx.fillStyle = '#333'
          ctx.font = '6px sans-serif'
          ctx.textAlign = 'center'
          ctx.fillText('ESTACIÓN', 0, -27)

          // Passenger lemming
          const lx = 0,
            ly = 13
          // Body
          ctx.fillStyle = '#9EA8B8'
          ctx.beginPath()
          ctx.ellipse(lx, ly + 3, 5, 5.5, 0, 0, Math.PI * 2)
          ctx.fill()
          // Head
          ctx.fillStyle = '#7E8A9E'
          ctx.beginPath()
          ctx.arc(lx, ly - 4, 4.5, 0, Math.PI * 2)
          ctx.fill()
          // Ears
          ctx.fillStyle = '#9EA8B8'
          ctx.beginPath()
          ctx.arc(lx - 3.5, ly - 8, 2, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(lx + 3.5, ly - 8, 2, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#D4A5A5'
          ctx.beginPath()
          ctx.arc(lx - 3.5, ly - 8, 1, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(lx + 3.5, ly - 8, 1, 0, Math.PI * 2)
          ctx.fill()
          // Eyes
          ctx.fillStyle = '#222'
          ctx.beginPath()
          ctx.arc(lx - 1.5, ly - 5, 1, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(lx + 1.5, ly - 5, 1, 0, Math.PI * 2)
          ctx.fill()
          // Arms waving
          const wave = Math.sin(frameCount * 0.07) * 5
          ctx.strokeStyle = '#7E8A9E'
          ctx.lineWidth = 1.5
          ctx.beginPath()
          ctx.moveTo(lx - 5, ly + 1)
          ctx.lineTo(lx - 10 + wave, ly - 4)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(lx + 5, ly + 1)
          ctx.lineTo(lx + 10 - wave, ly - 4)
          ctx.stroke()
          // Feet
          ctx.fillStyle = '#7E8A9E'
          ctx.fillRect(lx - 3, ly + 8, 2.5, 2)
          ctx.fillRect(lx + 0.5, ly + 8, 2.5, 2)
          // Bounce
          const bounce = Math.sin(frameCount * 0.05) * 3
          ctx.fillStyle = '#FFD700'
          ctx.font = 'bold 10px sans-serif'
          ctx.textAlign = 'center'
          ctx.fillText('!', lx, ly - 13 + bounce)

          ctx.restore()
        }

        function drawParticles() {
          for (const p of particles) {
            ctx.globalAlpha = p.life
            ctx.fillStyle = p.color
            ctx.beginPath()
            ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2)
            ctx.fill()
          }
          ctx.globalAlpha = 1
        }

        function drawFloatingTexts() {
          for (const f of floatingTexts) {
            ctx.globalAlpha = f.life
            ctx.fillStyle = f.color
            ctx.font = 'bold 17px sans-serif'
            ctx.textAlign = 'center'
            ctx.fillText(f.text, f.x, f.y)
          }
          ctx.globalAlpha = 1
        }

        function drawHUD() {
          // Top bar
          ctx.fillStyle = 'rgba(0,0,0,.45)'
          ctx.fillRect(0, 0, VW, 30)

          // Lives
          ctx.fillStyle = '#fff'
          ctx.font = 'bold 15px sans-serif'
          ctx.textAlign = 'left'
          let livesStr = ''
          for (let i = 0; i < lives; i++) livesStr += '❤️'
          ctx.fillText('🚂 ' + livesStr, 6, 21)

          // Level
          ctx.textAlign = 'center'
          ctx.fillStyle = '#FFD700'
          ctx.font = 'bold 14px sans-serif'
          ctx.fillText('NIVEL ' + level + '/' + TOTAL_LEVELS, VW / 2, 21)

          // Score & passengers
          ctx.textAlign = 'right'
          ctx.fillStyle = '#fff'
          ctx.font = 'bold 15px sans-serif'
          ctx.fillText('🧑 ' + passengers + '  ⭐ ' + score, VW - 6, 21)

          // Progress bar background
          ctx.fillStyle = 'rgba(0,0,0,.2)'
          ctx.fillRect(20, VH - 14, VW - 40, 6)
          // Progress bar fill
          ctx.fillStyle = '#4CAF50'
          ctx.fillRect(20, VH - 14, (VW - 40) * progress, 6)
          // Progress border
          ctx.strokeStyle = 'rgba(255,255,255,.15)'
          ctx.lineWidth = 1
          ctx.strokeRect(20, VH - 14, VW - 40, 6)

          // Junction hint
          if (junctionActive) {
            ctx.fillStyle = 'rgba(255,215,0,.25)'
            ctx.fillRect(VW / 2 - 60, VH - 44, 120, 22)
            ctx.fillStyle = '#FFD700'
            ctx.font = 'bold 12px sans-serif'
            ctx.textAlign = 'center'
            let hint = ''
            if (activeJunction && activeJunction.up && playerLane > 0) hint += ' ↑ ARRIBA'
            if (activeJunction && activeJunction.down && playerLane < 2) hint += ' ↓ ABAJO'
            if (hint) ctx.fillText('CAMBIAR:' + hint, VW / 2, VH - 28)
          }

          // Speed indicator
          ctx.fillStyle = 'rgba(255,255,255,.5)'
          ctx.font = '10px sans-serif'
          ctx.textAlign = 'left'
          ctx.fillText('🚄 ' + speed.toFixed(1), 6, VH - 6)

          // Invulnerability flash
          if (invulnerable > 0) {
            ctx.fillStyle = `rgba(255,255,255,${Math.sin(frameCount * 0.3) * 0.1 + 0.1})`
            ctx.fillRect(0, 0, VW, VH)
          }
        }

        // ---- RENDER ----
        function render() {
          ctx.save()
          if (screenShake > 0) {
            ctx.translate(
              (Math.random() - 0.5) * screenShake * 1.5,
              (Math.random() - 0.5) * screenShake,
            )
          }
          drawBackground()
          drawTracks()
          if (levelData) {
            drawJunctions()
            for (const s of levelData.stations) drawStation(s)
            for (const e of levelData.enemies) drawEnemyTrain(e)
          }
          drawPlayerTrain()
          drawParticles()
          drawFloatingTexts()
          if (state === 'playing') drawHUD()
          ctx.restore()
        }

        // ---- MAIN LOOP ----
        function updateHUD() {}

        function gameLoop() {
          update()
          render()
          requestAnimationFrame(gameLoop)
        }

        // ---- INPUT ----
        document.addEventListener('keydown', (e) => {
          if (state === 'menu' && (e.key === ' ' || e.key === 'Enter')) {
            e.preventDefault()
            startGame()
            return
          }
          if (state === 'gameover' && (e.key === ' ' || e.key === 'Enter')) {
            e.preventDefault()
            startGame()
            return
          }
          if (state !== 'playing') return
          if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
            e.preventDefault()
            if (
              junctionActive &&
              activeJunction &&
              activeJunction.up &&
              playerLane > 0 &&
              !laneChanging
            ) {
              changeLane(-1)
            } else if (!junctionActive && !laneChanging && playerLane > 0) {
              changeLane(-1)
            }
          }
          if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
            e.preventDefault()
            if (
              junctionActive &&
              activeJunction &&
              activeJunction.down &&
              playerLane < 2 &&
              !laneChanging
            ) {
              changeLane(1)
            } else if (!junctionActive && !laneChanging && playerLane < 2) {
              changeLane(1)
            }
          }
        })

        // Touch
        let tx = 0,
          ty = 0
        c.addEventListener(
          'touchstart',
          (e) => {
            e.preventDefault()
            const t = e.touches[0]
            const r = c.getBoundingClientRect()
            tx = t.clientX
            ty = t.clientY
            swiped = false
            if (state === 'menu') {
              startGame()
              return
            }
            if (state === 'gameover') {
              startGame()
              return
            }
          },
          { passive: false },
        )

        c.addEventListener(
          'touchmove',
          (e) => {
            e.preventDefault()
            if (swiped || state !== 'playing') return
            const t = e.touches[0]
            const dy = t.clientY - ty
            const dx = t.clientX - tx
            if (Math.abs(dy) > 25 && Math.abs(dy) > Math.abs(dx) * 1.2) {
              swiped = true
              if (dy < 0 && playerLane > 0) changeLane(-1)
              else if (dy > 0 && playerLane < 2) changeLane(1)
            }
          },
          { passive: false },
        )

        c.addEventListener('touchend', (e) => e.preventDefault(), { passive: false })

        startBtn.addEventListener('click', startGame)
        restartBtn.addEventListener('click', startGame)

        // ---- RESIZE ----
        function resize() {
          const wrap = document.getElementById('wrapper')
          const mw = wrap.clientWidth,
            mh = wrap.clientHeight
          const sc = Math.min(mw / VW, mh / VH)
          c.style.width = Math.floor(VW * sc) + 'px'
          c.style.height = Math.floor(VH * sc) + 'px'
        }
        window.addEventListener('resize', resize)
        resize()

        // ---- START ----
        levelData = genLevel(1)
        startScreen.style.display = 'flex'
        gameOverScreen.style.display = 'none'
        bestScoreEl.textContent = 'Mejor: ' + bestScore
        gameLoop()
      })()
    </script>
  </body>
</html>
