<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Carrera de Dinosaurios - Grizzy & the Lemmings</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #gameContainer {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        max-width: 100%;
        max-height: 100%;
        border: 3px solid #5d4037;
        border-radius: 8px;
        box-shadow: 0 0 40px rgba(255, 183, 77, 0.3);
        cursor: pointer;
      }
      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #ui-overlay > * {
        pointer-events: auto;
      }
      .hidden {
        display: none !important;
      }
    </style>

    <script src="js/audio.js"></script>
    <script src="js/save.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/grizzy.js"></script>
    <script src="js/back.js"></script>
  </head>
  <body>
    <div id="gameContainer">
      <canvas id="gameCanvas" width="700" height="400"></canvas>
    </div>
    <script>
      const canvas = document.getElementById('gameCanvas')
      const ctx = canvas.getContext('2d')

      const W = 700,
        H = 400
      let gameState = 'title'
      let selectedDino = -1
      let score = 0
      let level = 1
      let highScore = 0
      let raceFrame = 0
      let raceStarted = false
      let raceFinished = false
      let resultsShow = false
      let winner = -1
      let animId = null
      let particles = []
      let crowdLemmings = []
      let obstacles = []
      let dinoPositions = [0, 0, 0, 0]
      let dinoFinished = [false, false, false, false]
      let finishOrder = []
      let soundEnabled = true

      const AUDIO_CTX = new (window.AudioContext || window.webkitAudioContext)()

      function playTone(freq, dur, type = 'square', vol = 0.15) {
        if (!soundEnabled) return
        try {
          const o = AUDIO_CTX.createOscillator()
          const g = AUDIO_CTX.createGain()
          o.type = type
          o.frequency.value = freq
          g.gain.setValueAtTime(vol, AUDIO_CTX.currentTime)
          g.gain.exponentialRampToValueAtTime(0.001, AUDIO_CTX.currentTime + dur)
          o.connect(g)
          g.connect(AUDIO_CTX.destination)
          o.start()
          o.stop(AUDIO_CTX.currentTime + dur)
        } catch (e) {}
      }
      function sndSelect() {
        playTone(660, 0.15, 'sine', 0.12)
        setTimeout(() => playTone(880, 0.15, 'sine', 0.12), 100)
      }
      function sndRace() {
        playTone(440, 0.3, 'square', 0.08)
        setTimeout(() => playTone(554, 0.3, 'square', 0.08), 150)
        setTimeout(() => playTone(659, 0.5, 'square', 0.1), 300)
      }
      function sndCrash() {
        playTone(200, 0.2, 'sawtooth', 0.15)
        setTimeout(() => playTone(150, 0.3, 'sawtooth', 0.1), 100)
      }
      function sndWin() {
        ;[0, 100, 200, 300, 400].forEach((d, i) =>
          setTimeout(() => playTone([523, 659, 784, 1047, 1319][i], 0.3, 'sine', 0.12), d),
        )
      }
      function sndLose() {
        playTone(400, 0.2, 'sine', 0.1)
        setTimeout(() => playTone(350, 0.3, 'sine', 0.1), 200)
        setTimeout(() => playTone(300, 0.4, 'sine', 0.08), 400)
      }

      function loadSave() {
        try {
          const d = localStorage.getItem('grizzy_dino_race')
          if (d) {
            const p = JSON.parse(d)
            score = p.score || 0
            level = p.level || 1
            highScore = p.highScore || 0
          }
        } catch (e) {}
      }
      function save() {
        try {
          localStorage.setItem(
            'grizzy_dino_race',
            JSON.stringify({ score, level, highScore: Math.max(highScore, score) }),
          )
        } catch (e) {}
      }

      loadSave()

      const DINO_NAMES = ['Grizzy-dino', 'Lemming-dino', 'Dino Rojo', 'Dino Verde']
      const DINO_COLORS = ['#8B5E3C', '#7E8A9E', '#E53935', '#4CAF50']

      function getDinoStats(idx, lvl) {
        const l = lvl || level
        const base = [
          {
            speed: 3.2 + (Math.random() * 0.2 * Math.min(l, 40)) / 40,
            distract: 0.25 + Math.random() * 0.05,
            stamina: 0.7 + Math.random() * 0.1,
            name: 'Grizzy-dino',
            color: '#8B5E3C',
          },
          {
            speed: 2.0 + (Math.random() * 0.1 * Math.min(l, 40)) / 40,
            distract: 0.02 + Math.random() * 0.02,
            stamina: 0.95 + Math.random() * 0.05,
            name: 'Lemming-dino',
            color: '#7E8A9E',
          },
          {
            speed: 2.5 + (Math.random() * 0.15 * Math.min(l, 40)) / 40,
            distract: 0.08 + Math.random() * 0.03,
            stamina: 0.85 + Math.random() * 0.05,
            name: 'Dino Rojo',
            color: '#E53935',
          },
          {
            speed: 2.2 + (Math.random() * 0.12 * Math.min(l, 40)) / 40,
            distract: 0.06 + Math.random() * 0.02,
            stamina: 0.9 + Math.random() * 0.05,
            name: 'Dino Verde',
            color: '#4CAF50',
          },
        ]
        const s = base[idx]
        const lvlBonus = 1 + (l - 1) * 0.01
        return {
          speed: s.speed * lvlBonus,
          distract: Math.max(0.01, s.distract - lvl * 0.002),
          stamina: s.stamina + Math.min(l * 0.002, 0.08),
          boost: 0.8 + Math.random() * 0.4,
        }
      }

      function initCrowd() {
        crowdLemmings = []
        for (let i = 0; i < 25; i++) {
          crowdLemmings.push({
            x: 60 + Math.random() * 580,
            y: 20 + Math.random() * 30,
            jump: Math.random() * Math.PI * 2,
            speed: 0.02 + Math.random() * 0.03,
            size: 3 + Math.random() * 3,
          })
        }
      }

      function initObstacles() {
        obstacles = []
        const numObs = 3 + Math.floor(level / 5)
        for (let i = 0; i < numObs; i++) {
          obstacles.push({
            lane: Math.floor(Math.random() * 4),
            x: 200 + Math.random() * 350,
            type: Math.random() > 0.5 ? 'rock' : 'log',
            w: 12 + Math.random() * 8,
            h: 8 + Math.random() * 6,
          })
        }
      }

      function initRace() {
        raceFrame = 0
        raceStarted = false
        raceFinished = false
        resultsShow = false
        winner = -1
        dinoPositions = [30, 30, 30, 30]
        dinoFinished = [false, false, false, false]
        finishOrder = []
        initCrowd()
        initObstacles()
        particles = []
      }

      const dinoData = []

      function resetDinoData() {
        dinoData.length = 0
        for (let i = 0; i < 4; i++) {
          const s = getDinoStats(i)
          dinoData.push({
            x: 30,
            y: 80 + i * 75,
            lane: i,
            ...s,
            currentSpeed: 0,
            stunned: 0,
            boostTimer: 0,
            finished: false,
            finishTime: 0,
            animFrame: 0,
            animTimer: 0,
          })
        }
      }

      let raceStartTime = 0
      let dinoTimes = [0, 0, 0, 0]

      function getTrackEndX() {
        return 650
      }

      function startRace() {
        if (raceStarted) return
        raceStarted = true
        raceStartTime = performance.now()
        sndRace()
        for (let i = 0; i < 4; i++) {
          const s = getDinoStats(i)
          Object.assign(dinoData[i], s)
          dinoData[i].currentSpeed = 0
          dinoData[i].stunned = 0
          dinoData[i].boostTimer = 0
          dinoData[i].finished = false
          dinoData[i].finishTime = 0
        }
        dinoPositions = [30, 30, 30, 30]
        dinoFinished = [false, false, false, false]
        finishOrder = []
      }

      function updateRace() {
        if (!raceStarted || raceFinished) return
        const endX = getTrackEndX()
        let allFinished = true
        for (let i = 0; i < 4; i++) {
          if (dinoFinished[i]) continue
          allFinished = false
          const d = dinoData[i]
          if (d.stunned > 0) {
            d.stunned -= 1
            d.currentSpeed *= 0.95
            dinoPositions[i] += d.currentSpeed * 0.3
            d.animTimer += 0.1
            continue
          }
          let spd = d.speed
          if (Math.random() < d.distract * 0.02 && i === 0) {
            spd *= 0.3 + Math.random() * 0.2
          }
          if (i === 1) spd *= d.stamina
          if (Math.random() < 0.005 * i) spd *= 1.5 + Math.random() * 0.5
          if (d.boostTimer > 0) {
            spd *= 1.3
            d.boostTimer--
          }
          d.currentSpeed = spd * (0.9 + Math.random() * 0.2)
          dinoPositions[i] += d.currentSpeed * 0.4
          d.animTimer += d.currentSpeed * 0.02
          for (const obs of obstacles) {
            if (obs.lane === i) {
              const dx = Math.abs(dinoPositions[i] - obs.x)
              if (dx < 15 && dinoPositions[i] > obs.x - 10 && dinoPositions[i] < obs.x + 10) {
                d.currentSpeed *= 0.3
                d.stunned = 12
                sndCrash()
                for (let p = 0; p < 8; p++)
                  particles.push({
                    x: dinoPositions[i],
                    y: d.y + 15,
                    vx: (Math.random() - 0.5) * 3,
                    vy: -Math.random() * 3 - 1,
                    life: 30,
                    color: '#8B7355',
                  })
              }
            }
          }
          if (dinoPositions[i] >= endX) {
            dinoPositions[i] = endX
            dinoFinished[i] = true
            d.finished = true
            d.finishTime = (performance.now() - raceStartTime) / 1000
            finishOrder.push(i)
          }
        }
        if (allFinished || finishOrder.length === 4 || raceFrame > 1800) {
          raceFinished = true
          winner = finishOrder[0]
          setTimeout(() => {
            resultsShow = true
            const guessed = selectedDino === winner
            if (guessed) {
              score += 50
              sndWin()
            } else {
              score += 10
              sndLose()
            }
            highScore = Math.max(highScore, score)
            save()
          }, 800)
        }
        raceFrame++
      }

      function drawBackground() {
        const grd = ctx.createLinearGradient(0, 0, 0, 200)
        grd.addColorStop(0, '#FF8A50')
        grd.addColorStop(0.3, '#FFB74D')
        grd.addColorStop(0.6, '#FFCC80')
        grd.addColorStop(1, '#FFE0B2')
        ctx.fillStyle = grd
        ctx.fillRect(0, 0, W, 200)
        ctx.fillStyle = '#4CAF50'
        ctx.beginPath()
        ctx.moveTo(0, 130)
        for (let x = 0; x <= W; x += 20)
          ctx.lineTo(x, 130 - Math.sin(x * 0.02) * 20 - Math.sin(x * 0.05) * 8)
        ctx.lineTo(W, 200)
        ctx.lineTo(0, 200)
        ctx.closePath()
        ctx.fill()
        ctx.fillStyle = '#388E3C'
        ctx.beginPath()
        ctx.moveTo(0, 150)
        for (let x = 0; x <= W; x += 25)
          ctx.lineTo(x, 150 - Math.sin(x * 0.03 + 1) * 18 - Math.sin(x * 0.07) * 5)
        ctx.lineTo(W, 200)
        ctx.lineTo(0, 200)
        ctx.closePath()
        ctx.fill()

        ctx.fillStyle = '#5D4037'
        ctx.fillRect(0, 200, W, 4)
        ctx.fillStyle = '#8B5E3C'
        ctx.fillRect(0, 204, W, 86)
        ctx.fillStyle = '#6D4C2A'
        for (let i = 0; i < 20; i++) {
          ctx.fillRect(i * 35 + 5, 210 + Math.sin(i) * 3, 2, 70)
        }
        ctx.fillStyle = 'rgba(255,255,255,0.15)'
        for (let i = 0; i < 12; i++) {
          ctx.fillRect(i * 58, 204, 2, 86)
        }
        ctx.fillStyle = 'rgba(255,255,255,0.1)'
        for (let i = 0; i < 6; i++) {
          ctx.fillRect(i * 116, 204, 1, 86)
        }

        ctx.fillStyle = '#5D4037'
        ctx.fillRect(0, 290, W, 4)
        ctx.fillStyle = '#4CAF50'
        ctx.fillRect(0, 294, W, 106)
        const grd2 = ctx.createLinearGradient(0, 294, 0, 400)
        grd2.addColorStop(0, '#66BB6A')
        grd2.addColorStop(1, '#388E3C')
        ctx.fillStyle = grd2
        ctx.fillRect(0, 294, W, 106)

        ctx.fillStyle = '#FFD54F'
        const t = Date.now() / 4000
        ctx.beginPath()
        ctx.arc(600, 50 + Math.sin(t) * 5, 22, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#FFF9C4'
        ctx.beginPath()
        ctx.arc(596, 44, 7, 0, Math.PI * 2)
        ctx.fill()

        ctx.fillStyle = 'rgba(255,255,255,0.3)'
        for (let i = 0; i < 5; i++) {
          const cx = 100 + i * 120 + Math.sin(t + i) * 20
          ctx.beginPath()
          ctx.arc(cx, 40 + Math.sin(t * 2 + i) * 10, 2 + Math.sin(t + i) * 1, 0, Math.PI * 2)
          ctx.fill()
        }
      }

      function drawFinishLine() {
        ctx.fillStyle = '#fff'
        for (let i = 0; i < 18; i++) {
          const y = 204 + i * 5
          const odd = i % 2
          for (let j = 0; j < 4; j++) {
            ctx.fillStyle = j % 2 ? '#222' : '#fff'
            ctx.fillRect(getTrackEndX() - 6 + j * 3, y, 3, 5)
          }
        }
        ctx.strokeStyle = '#E53935'
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.moveTo(getTrackEndX() - 3, 204)
        ctx.lineTo(getTrackEndX() - 3, 290)
        ctx.stroke()
      }

      function drawDino(idx) {
        const x = dinoPositions[idx]
        const y = 215 + idx * 18
        const col = DINO_COLORS[idx]
        const dark = darkenColor(col, 0.3)
        ctx.save()

        if (idx === 0) {
          ctx.fillStyle = col
          ctx.beginPath()
          ctx.ellipse(x + 22, y + 9, 22, 10, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = dark
          ctx.beginPath()
          ctx.ellipse(x + 30, y + 5, 8, 6, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = col
          ctx.beginPath()
          ctx.ellipse(x + 6, y + 12, 8, 6, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(x + 12, y + 11, 6, 5, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#5D4037'
          ctx.beginPath()
          ctx.ellipse(x + 24, y + 5, 8, 4, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#3E2723'
          ctx.beginPath()
          ctx.ellipse(x + 22, y + 6, 3, 3, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(x + 28, y + 6, 3, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.arc(x + 21, y + 5, 1.5, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(x + 27, y + 5, 1.5, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#E53935'
          ctx.beginPath()
          ctx.arc(x + 25, y + 9, 2, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#5D4037'
          ctx.beginPath()
          ctx.moveTo(x + 6, y + 6)
          ctx.lineTo(x + 2, y + 2)
          ctx.lineTo(x + 8, y + 4)
          ctx.closePath()
          ctx.fill()
          ctx.beginPath()
          ctx.moveTo(x + 10, y + 5)
          ctx.lineTo(x + 6, y + 1)
          ctx.lineTo(x + 12, y + 3)
          ctx.closePath()
          ctx.fill()
          ctx.fillStyle = '#3E2723'
          for (let i = 0; i < 6; i++) {
            ctx.fillRect(x + 20 + i * 4, y - 1, 2, 2)
          }
          ctx.strokeStyle = '#5D4037'
          ctx.lineWidth = 1
          ctx.beginPath()
          ctx.moveTo(x + 35, y + 10)
          ctx.lineTo(x + 45, y + 8)
          ctx.lineTo(x + 48, y + 11)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(x - 5, y + 12)
          ctx.lineTo(x - 15, y + 18)
          ctx.lineTo(x - 5, y + 15)
          ctx.stroke()
        } else if (idx === 1) {
          ctx.fillStyle = col
          ctx.beginPath()
          ctx.ellipse(x + 18, y + 10, 18, 10, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = dark
          ctx.beginPath()
          ctx.moveTo(x + 30, y + 2)
          ctx.lineTo(x + 38, y - 2)
          ctx.lineTo(x + 36, y + 5)
          ctx.closePath()
          ctx.fill()
          ctx.beginPath()
          ctx.moveTo(x + 30, y + 4)
          ctx.lineTo(x + 38, y + 2)
          ctx.lineTo(x + 36, y + 7)
          ctx.closePath()
          ctx.fill()
          ctx.beginPath()
          ctx.moveTo(x + 30, y + 6)
          ctx.lineTo(x + 38, y + 6)
          ctx.lineTo(x + 36, y + 10)
          ctx.closePath()
          ctx.fill()
          ctx.fillStyle = '#fff'
          ctx.fillRect(x + 28, y + 3, 3, 2)
          ctx.fillRect(x + 28, y + 6, 3, 2)
          ctx.fillRect(x + 28, y + 9, 3, 2)
          ctx.fillStyle = '#5D4037'
          ctx.beginPath()
          ctx.ellipse(x + 14, y + 7, 3, 3, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.arc(x + 13, y + 6, 1.5, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#3E2723'
          ctx.beginPath()
          ctx.arc(x + 13, y + 6, 0.8, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#B0BEC5'
          ctx.beginPath()
          ctx.arc(x + 14, y + 10, 3, 0, Math.PI)
          ctx.fill()
        } else if (idx === 2) {
          ctx.fillStyle = col
          ctx.beginPath()
          ctx.ellipse(x + 20, y + 10, 18, 9, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = dark
          for (let i = 0; i < 5; i++) {
            ctx.beginPath()
            ctx.moveTo(x + 20 + i * 7, y - 5)
            ctx.lineTo(x + 17 + i * 7, y - 12)
            ctx.lineTo(x + 23 + i * 7, y - 5)
            ctx.closePath()
            ctx.fill()
          }
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.arc(x + 12, y + 7, 4, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#3E2723'
          ctx.beginPath()
          ctx.arc(x + 12, y + 7, 2, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.arc(x + 18, y + 7, 4, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#3E2723'
          ctx.beginPath()
          ctx.arc(x + 18, y + 7, 2, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#B71C1C'
          ctx.beginPath()
          ctx.arc(x + 15, y + 12, 3, 0, Math.PI)
          ctx.fill()
          ctx.strokeStyle = dark
          ctx.lineWidth = 1.5
          ctx.beginPath()
          ctx.moveTo(x + 38, y + 9)
          ctx.lineTo(x + 48, y + 7)
          ctx.lineTo(x + 48, y + 11)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(x - 2, y + 11)
          ctx.lineTo(x - 12, y + 16)
          ctx.lineTo(x - 2, y + 14)
          ctx.stroke()
        } else {
          ctx.fillStyle = col
          ctx.beginPath()
          ctx.ellipse(x + 22, y + 10, 20, 9, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = dark
          ctx.beginPath()
          ctx.ellipse(x + 10, y + 6, 7, 6, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = col
          ctx.beginPath()
          ctx.ellipse(x + 10, y + 8, 6, 5, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.arc(x + 8, y + 6, 2, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(x + 12, y + 6, 2, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#3E2723'
          ctx.beginPath()
          ctx.arc(x + 8, y + 6, 1, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(x + 12, y + 6, 1, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#2E7D32'
          ctx.beginPath()
          ctx.arc(x + 10, y + 11, 2, 0, Math.PI)
          ctx.fill()
          ctx.strokeStyle = dark
          ctx.lineWidth = 1.5
          ctx.beginPath()
          ctx.moveTo(x + 42, y + 8)
          ctx.lineTo(x + 55, y + 6)
          ctx.lineTo(x + 55, y + 10)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(x - 2, y + 10)
          ctx.lineTo(x - 18, y + 14)
          ctx.lineTo(x - 10, y + 13)
          ctx.stroke()
        }
        ctx.restore()
      }

      function drawObstacles() {
        for (const obs of obstacles) {
          const y = 217 + obs.lane * 18
          const x = obs.x
          if (obs.type === 'rock') {
            ctx.fillStyle = '#9E9E9E'
            ctx.beginPath()
            ctx.ellipse(x, y + 8, obs.w / 2, obs.h / 2, 0, 0, Math.PI * 2)
            ctx.fill()
            ctx.fillStyle = '#757575'
            ctx.beginPath()
            ctx.ellipse(x - 2, y + 6, obs.w / 4, obs.h / 3, 0, 0, Math.PI * 2)
            ctx.fill()
            ctx.fillStyle = '#616161'
            ctx.beginPath()
            ctx.ellipse(x + 3, y + 9, obs.w / 5, obs.h / 4, 0, 0, Math.PI * 2)
            ctx.fill()
          } else {
            ctx.fillStyle = '#795548'
            ctx.fillRect(x - obs.w / 2, y + 4, obs.w, obs.h)
            ctx.fillStyle = '#5D4037'
            ctx.beginPath()
            ctx.arc(x - obs.w / 2, y + 6, 3, 0, Math.PI * 2)
            ctx.fill()
            ctx.fillStyle = '#8D6E63'
            for (let i = 0; i < 3; i++) {
              ctx.fillRect(x - obs.w / 2 + 2 + i * 4, y + 6, 2, obs.h - 4)
            }
          }
        }
      }

      function drawCrowd() {
        for (const l of crowdLemmings) {
          l.jump += l.speed
          const jumpY = Math.sin(l.jump) * 3
          ctx.fillStyle = '#9E9E9E'
          ctx.beginPath()
          ctx.ellipse(l.x, 28 + jumpY, l.size, l.size * 0.8, 0, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#B0BEC5'
          ctx.beginPath()
          ctx.ellipse(l.x - 1, 26 + jumpY, l.size * 0.4, l.size * 0.3, 0, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.arc(l.x - 2, 25 + jumpY, l.size * 0.15, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#3E2723'
          ctx.beginPath()
          ctx.arc(l.x - 2, 25 + jumpY, l.size * 0.08, 0, Math.PI * 2)
          ctx.fill()
          if (l.jump % 2 < 1) {
            ctx.fillStyle = '#fff'
            ctx.font = '5px sans-serif'
            ctx.fillText('✊', l.x - 3, 35 + jumpY)
          }
        }
      }

      function drawParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i]
          p.x += p.vx
          p.y += p.vy
          p.vy += 0.1
          p.life--
          ctx.globalAlpha = p.life / 30
          ctx.fillStyle = p.color
          ctx.fillRect(p.x - 1, p.y - 1, 2, 2)
          ctx.globalAlpha = 1
          if (p.life <= 0) particles.splice(i, 1)
        }
      }

      function drawTitleScreen() {
        drawBackground()
        ctx.fillStyle = 'rgba(0,0,0,0.5)'
        ctx.fillRect(0, 0, W, H)
        ctx.fillStyle = '#FFB74D'
        ctx.font = 'bold 36px sans-serif'
        ctx.textAlign = 'center'
        ctx.fillText('🏆 CARRERA DE DINOSAURIOS 🏆', W / 2, 60)
        ctx.fillStyle = '#E53935'
        ctx.font = 'bold 18px sans-serif'
        ctx.fillText('Grizzy & the Lemmings Edition', W / 2, 90)
        ctx.fillStyle = '#fff'
        ctx.font = '14px sans-serif'
        ctx.fillText(
          'Puntuación: ' + score + '  |  Nivel: ' + level + '  |  Record: ' + highScore,
          W / 2,
          120,
        )
        ctx.fillStyle = '#FFB74D'
        ctx.font = 'bold 16px sans-serif'
        ctx.fillText('¡Haz clic para comenzar!', W / 2, 180)
        ctx.font = '12px sans-serif'
        ctx.fillStyle = '#ddd'
        ctx.fillText('Elige tu dinosaurio y mira si gana la carrera', W / 2, 205)
        ctx.fillText(
          'Grizzy-dino: rápido pero se distrae  |  Lemming-dino: lento pero constante',
          W / 2,
          225,
        )
        ctx.fillText('Dino Rojo: equilibrado  |  Dino Verde: fuerte y resistente', W / 2, 240)
        ctx.fillStyle = '#FFB74D'
        ctx.font = 'bold 20px sans-serif'
        ctx.fillText('🎮 Presiona ESPACIO o haz clic para jugar', W / 2, 320)
      }

      function drawSelectionScreen() {
        drawBackground()
        ctx.fillStyle = 'rgba(0,0,0,0.4)'
        ctx.fillRect(0, 0, W, H)
        ctx.fillStyle = '#FFB74D'
        ctx.font = 'bold 24px sans-serif'
        ctx.textAlign = 'center'
        ctx.fillText('NIVEL ' + level + ' - ¡Elige tu dinosaurio!', W / 2, 45)
        ctx.fillStyle = '#fff'
        ctx.font = '13px sans-serif'
        ctx.fillText('Puntuación: ' + score + '  |  Gana +50pts  |  Pierde +10pts', W / 2, 70)
        const bx = 50,
          bw = 140
        for (let i = 0; i < 4; i++) {
          const x = 35 + i * 165
          const y = 90
          const s = getDinoStats(i)
          ctx.fillStyle = 'rgba(0,0,0,0.3)'
          ctx.strokeStyle = selectedDino === i ? '#FFD700' : '#555'
          ctx.lineWidth = selectedDino === i ? 3 : 1
          ctx.beginPath()
          ctx.roundRect(x, y, bw, 200, 8)
          ctx.stroke()
          ctx.fillStyle = 'rgba(0,0,0,0.2)'
          ctx.beginPath()
          ctx.roundRect(x, y, bw, 200, 8)
          ctx.fill()
          ctx.fillStyle = DINO_COLORS[i]
          ctx.font = 'bold 13px sans-serif'
          ctx.fillText(DINO_NAMES[i], x + bw / 2, y + 25)
          const dy = y + 50
          dinoPositions[i] = x + 20
          ctx.save()
          ctx.translate(x + 50, dy)
          ctx.fillStyle = DINO_COLORS[i]
          ctx.beginPath()
          ctx.ellipse(0, 0, 25, 12, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.restore()
          ctx.fillStyle = '#fff'
          ctx.font = '11px sans-serif'
          ctx.textAlign = 'center'
          ctx.fillText('⚡ Vel: ' + (s.speed * 2).toFixed(1), x + bw / 2, y + 130)
          ctx.fillText('🎯 Cons: ' + (s.stamina * 100).toFixed(0) + '%', x + bw / 2, y + 148)
          ctx.fillText('💨 Distr: ' + (s.distract * 100).toFixed(0) + '%', x + bw / 2, y + 166)
          ctx.fillStyle = '#FFB74D'
          ctx.font = '10px sans-serif'
          const names = { 0: 'Grizzy', 1: 'Lemming', 2: 'Rojo', 3: 'Verde' }
          ctx.fillText('Haz clic para elegir', x + bw / 2, y + 185)
        }
        if (selectedDino >= 0) {
          ctx.fillStyle = '#FFD700'
          ctx.font = 'bold 16px sans-serif'
          ctx.fillText('✓ Elegiste: ' + DINO_NAMES[selectedDino], W / 2, 325)
          ctx.fillStyle = '#FFB74D'
          ctx.font = 'bold 14px sans-serif'
          ctx.fillText('Presiona ESPACIO o haz clic aquí para CORRER', W / 2, 355)
        }
      }

      function drawRaceScreen() {
        drawBackground()
        drawCrowd()
        drawFinishLine()
        drawObstacles()
        for (let i = 0; i < 4; i++) {
          drawDino(i)
          ctx.fillStyle = '#fff'
          ctx.font = '9px sans-serif'
          ctx.textAlign = 'center'
          if (!dinoFinished[i]) {
            const pct = Math.min(100, (dinoPositions[i] / getTrackEndX()) * 100)
            ctx.fillText(Math.floor(pct) + '%', dinoPositions[i] + 18, 212 + i * 18)
          } else {
            ctx.fillStyle = '#FFD700'
            ctx.fillText('🏁', dinoPositions[i] + 18, 212 + i * 18)
          }
        }
        drawParticles()
        ctx.fillStyle = 'rgba(0,0,0,0.5)'
        ctx.fillRect(5, 5, 160, 22)
        ctx.fillStyle = '#fff'
        ctx.font = '11px sans-serif'
        ctx.textAlign = 'left'
        ctx.fillText('🏆 Nivel ' + level + '  Pts: ' + score, 10, 20)
        ctx.fillStyle = '#FFB74D'
        ctx.font = '10px sans-serif'
        ctx.textAlign = 'right'
        ctx.fillText('Elegiste: ' + DINO_NAMES[selectedDino], W - 10, 18)
        if (!raceStarted) {
          ctx.fillStyle = 'rgba(0,0,0,0.4)'
          ctx.fillRect(W / 2 - 80, H / 2 - 20, 160, 40)
          ctx.fillStyle = '#FFD700'
          ctx.font = 'bold 18px sans-serif'
          ctx.textAlign = 'center'
          ctx.fillText('¡Haz clic para empezar!', W / 2, H / 2 + 7)
        }
        if (finishOrder.length > 0) {
          for (let i = 0; i < finishOrder.length; i++) {
            ctx.fillStyle = '#FFD700'
            ctx.font = 'bold 12px sans-serif'
            ctx.textAlign = 'right'
            ctx.fillText('#' + (i + 1) + ' ' + DINO_NAMES[finishOrder[i]], W - 10, 220 + i * 16)
          }
        }
      }

      function drawResultsScreen() {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'
        ctx.fillRect(0, 0, W, H)
        ctx.fillStyle = '#FFD700'
        ctx.font = 'bold 28px sans-serif'
        ctx.textAlign = 'center'
        ctx.fillText('🏁 ¡CARRERA COMPLETADA! 🏁', W / 2, 50)
        for (let i = 0; i < finishOrder.length; i++) {
          const idx = finishOrder[i]
          const isWinner = i === 0
          const isSelected = idx === selectedDino
          ctx.fillStyle = isSelected ? '#FFD700' : '#fff'
          ctx.font = (isWinner ? 'bold 18px ' : '16px ') + 'sans-serif'
          const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  '
          const sel = isSelected ? ' ⬅️ TU ELECCIÓN' : ''
          ctx.fillText(medal + ' #' + (i + 1) + ' ' + DINO_NAMES[idx] + sel, W / 2, 90 + i * 28)
        }
        const won = selectedDino === winner
        ctx.fillStyle = won ? '#FFD700' : '#E53935'
        ctx.font = 'bold 22px sans-serif'
        ctx.fillText(won ? '🎉 ¡GANASTE! +50 puntos 🎉' : '😢 Perdiste... +10 puntos', W / 2, 220)
        ctx.fillStyle = '#fff'
        ctx.font = '16px sans-serif'
        ctx.fillText('Puntuación: ' + score + '  |  Nivel: ' + level, W / 2, 260)
        if (level < 40) {
          ctx.fillStyle = '#FFB74D'
          ctx.font = 'bold 14px sans-serif'
          ctx.fillText('¡Haz clic o presiona ESPACIO para el siguiente nivel!', W / 2, 310)
        } else {
          ctx.fillStyle = '#FFD700'
          ctx.font = 'bold 20px sans-serif'
          ctx.fillText('🎊 ¡COMPLETASTE LOS 40 NIVELES! 🎊', W / 2, 340)
          ctx.fillStyle = '#FFB74D'
          ctx.font = '14px sans-serif'
          ctx.fillText('Haz clic para volver a empezar', W / 2, 370)
        }
      }

      function darkenColor(col, amt) {
        const r = parseInt(col.slice(1, 3), 16)
        const g = parseInt(col.slice(3, 5), 16)
        const b = parseInt(col.slice(5, 7), 16)
        return (
          'rgb(' +
          Math.floor(r * (1 - amt)) +
          ',' +
          Math.floor(g * (1 - amt)) +
          ',' +
          Math.floor(b * (1 - amt)) +
          ')'
        )
      }

      CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        if (w < 2 * r) r = w / 2
        if (h < 2 * r) r = h / 2
        this.moveTo(x + r, y)
        this.lineTo(x + w - r, y)
        this.quadraticCurveTo(x + w, y, x + w, y + r)
        this.lineTo(x + w, y + h - r)
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
        this.lineTo(x + r, y + h)
        this.quadraticCurveTo(x, y + h, x, y + h - r)
        this.lineTo(x, y + r)
        this.quadraticCurveTo(x, y, x + r, y)
        return this
      }

      function gameLoop() {
        ctx.clearRect(0, 0, W, H)
        switch (gameState) {
          case 'title':
            drawTitleScreen()
            break
          case 'select':
            drawSelectionScreen()
            break
          case 'race':
            if (raceStarted) updateRace()
            drawRaceScreen()
            if (resultsShow) {
              gameState = 'results'
              resultsShow = false
            }
            break
          case 'results':
            drawResultsScreen()
            break
        }
        animId = requestAnimationFrame(gameLoop)
      }

      function handleClick(ev) {
        const rect = canvas.getBoundingClientRect()
        const scaleX = W / rect.width
        const scaleY = H / rect.height
        const mx = (ev.clientX - rect.left) * scaleX
        const my = (ev.clientY - rect.top) * scaleY
        switch (gameState) {
          case 'title':
            sndSelect()
            gameState = 'select'
            selectedDino = -1
            initRace()
            resetDinoData()
            break
          case 'select':
            for (let i = 0; i < 4; i++) {
              const x = 35 + i * 165,
                y = 90,
                w = 140,
                h = 200
              if (mx >= x && mx <= x + w && my >= y && my <= y + h) {
                selectedDino = i
                sndSelect()
                break
              }
            }
            if (selectedDino >= 0 && my > 300) {
              sndRace()
              gameState = 'race'
              startRace()
            }
            break
          case 'race':
            if (!raceStarted) {
              startRace()
              sndRace()
            }
            break
          case 'results':
            if (level < 40) {
              level++
            } else {
              level = 1
              score = 0
            }
            save()
            initRace()
            resetDinoData()
            selectedDino = -1
            gameState = 'select'
            sndSelect()
            break
        }
      }

      document.addEventListener('keydown', (ev) => {
        if (ev.key === ' ' || ev.key === 'Enter') {
          ev.preventDefault()
          switch (gameState) {
            case 'title':
              sndSelect()
              gameState = 'select'
              selectedDino = -1
              initRace()
              resetDinoData()
              break
            case 'select':
              if (selectedDino >= 0) {
                sndRace()
                gameState = 'race'
                startRace()
              }
              break
            case 'race':
              if (!raceStarted) {
                startRace()
                sndRace()
              }
              break
            case 'results':
              if (level < 40) {
                level++
              } else {
                level = 1
                score = 0
              }
              save()
              initRace()
              resetDinoData()
              selectedDino = -1
              gameState = 'select'
              sndSelect()
              break
          }
        }
      })

      function resizeCanvas() {
        const container = document.getElementById('gameContainer')
        const cw = container.clientWidth
        const ch = container.clientHeight
        const scale = Math.min(cw / W, ch / H)
        canvas.style.width = W * scale + 'px'
        canvas.style.height = H * scale + 'px'
      }

      window.addEventListener('resize', resizeCanvas)
      canvas.addEventListener('click', handleClick)
      canvas.addEventListener('touchstart', (ev) => {
        ev.preventDefault()
        const t = ev.touches[0]
        handleClick({ clientX: t.clientX, clientY: t.clientY })
      })

      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
          this.moveTo(x + r, y)
          this.lineTo(x + w - r, y)
          this.quadraticCurveTo(x + w, y, x + w, y + r)
          this.lineTo(x + w, y + h - r)
          this.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
          this.lineTo(x + r, y + h)
          this.quadraticCurveTo(x, y + h, x, y + h - r)
          this.lineTo(x, y + r)
          this.quadraticCurveTo(x, y, x + r, y)
        }
      }

      resizeCanvas()
      gameLoop()
    </script>
  </body>
</html>
